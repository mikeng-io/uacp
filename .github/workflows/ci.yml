name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale in-progress runs on PRs only. Main runs are not cancelled so
# rapid back-to-back merges don't silently drop the post-merge test-compat signal.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: quality (ruff + pyright)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the package so pyright resolves real dependency types (e.g.
          # pydantic's UacpConfig from config.py). ruff and pyright are pinned in
          # [project.optional-dependencies].dev — both are version-sensitive and
          # can redden unrelated PRs if unpinned. Bump deliberately.
          pip install -e '.[dev]'

      # Scoped to the paths kept clean under the full ruleset. Legacy modules are
      # intentionally NOT linted here (relaxed to pyflakes-only via per-file-ignores).
      - name: Ruff lint
        run: ruff check skills/uacp-core/scripts/engines/ tests/e2e/

      - name: Ruff format check
        run: ruff format --check skills/uacp-core/scripts/engines/ tests/e2e/

      # Strict type-checking is scoped to the freshly-extracted, fully-typed engine
      # packages. Grow this path list as each package is extracted and typed.
      - name: Pyright (strict-scoped engines)
        run: pyright skills/uacp-core/scripts/engines/guardian skills/uacp-core/scripts/engines/domain/paths.py skills/uacp-core/scripts/engines/heartgate/models.py skills/uacp-core/scripts/engines/heartgate/validators/helpers.py

  test:
    name: pytest (3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      # uv is needed so the plugin MCP boot test (TestMcpServerBoots) actually
      # runs instead of skipping — it provisions the server via `uv run --with …`,
      # exactly as the Claude Code plugin manifest does.
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # [mcp] pulls the mcp client SDK so the boot test can speak MCP to the
          # server; without it that high-value runtime check skips silently.
          pip install -e '.[dev,mcp]'

      - name: Run tests
        run: pytest tests/ -n auto -q

  # Forward-compatibility check — runs only after merge to main, not on PRs.
  # A 3.14 breakage is a follow-up ticket, not a merge blocker.
  test-compat:
    name: pytest (3.14 compat)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,mcp]'

      - name: Run tests
        run: pytest tests/ -n auto -q
