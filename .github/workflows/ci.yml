name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale in-progress runs on PRs only. Main runs are not cancelled so
# rapid back-to-back merges don't silently drop the post-merge test-compat signal.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: quality (ruff + pyright)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the package so pyright resolves real dependency types (e.g.
          # pydantic's UacpConfig from config.py). ruff and pyright are pinned in
          # [project.optional-dependencies].dev — both are version-sensitive and
          # can redden unrelated PRs if unpinned. Bump deliberately.
          pip install -e '.[dev]'

      # Paths and pyright scope are owned by the Makefile — CI just calls targets
      # so there is one source of truth for both local dev and CI.
      - name: Ruff lint
        run: make lint

      - name: Ruff format check
        run: make format

      - name: Pyright (strict-scoped engines)
        run: make types

  test:
    name: pytest (3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
          cache: 'pip'

      # uv is needed so the plugin MCP boot test (TestMcpServerBoots) actually
      # runs instead of skipping — it provisions the server via `uv run --with …`,
      # exactly as the Claude Code plugin manifest does.
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # [mcp] pulls the mcp client SDK so the boot test can speak MCP to the
          # server; without it that high-value runtime check skips silently.
          pip install -e '.[dev,mcp]'

      - name: Run tests
        run: make test

  # Forward-compatibility check — runs only after merge to main, not on PRs.
  # A 3.14 breakage is a follow-up ticket, not a merge blocker.
  test-compat:
    name: pytest (3.14 compat)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,mcp]'

      - name: Run tests
        run: make test
