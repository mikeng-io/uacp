name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - ".github/workflows/codeql.yml"
      - ".github/codeql/codeql-config.yml"
  # No paths filter on pull_request: the ruleset requires "Analyze (python)"
  # as a status check. If paths filters silence the workflow, GitHub never
  # creates the check run and the PR is permanently blocked.
  pull_request:
    branches: [main]
  # Weekly sweep catches vulnerabilities introduced via dependencies,
  # not just code changes.
  schedule:
    - cron: "0 2 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Actions analysis omitted: this repo's workflows are simple and the
        # Python codebase is the meaningful attack surface.
        language: [python]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
