name: PR Policy

on:
  pull_request:
    # 'edited' catches title changes after the PR is open.
    types: [opened, synchronize, reopened, labeled, unlabeled, assigned, unassigned, edited]

jobs:
  pr-policy:
    name: PR Policy
    # Only enforce on PRs targeting main — feature-branch PRs skip this check.
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Check assignee
        env:
          ASSIGNEES_JSON: ${{ toJson(github.event.pull_request.assignees) }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          assignees = json.loads(os.environ['ASSIGNEES_JSON'])
          if not assignees:
              print("::error title=Missing assignee::PR must have at least one assignee. Assign it before requesting a merge.")
              sys.exit(1)
          print(f"OK: {len(assignees)} assignee(s).")
          PYEOF

      - name: Check type label
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          labels = [l['name'] for l in json.loads(os.environ['LABELS_JSON'])]
          type_labels = [l for l in labels if l.startswith('type:')]
          if not type_labels:
              print("::error title=Missing type label::PR must have at least one 'type:' label.")
              print("::error title=Missing type label::Valid labels: type: feat, type: fix, type: chore, type: docs, type: design, type: test, type: refactor, type: verify, type: ci")
              sys.exit(1)
          print(f"OK: type labels = {type_labels}.")
          PYEOF

      - name: Check PR title (conventional commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys
          title = os.environ['PR_TITLE']
          # Match: type(scope)!: description  OR  Revert "original title"
          pattern = r'^(feat|fix|chore|docs|design|test|refactor|verify|ci)(\(.+\))?(!)?: .+|^Revert ".+"$'
          if not re.match(pattern, title):
              print("::error title=Invalid PR title::PR title must follow Conventional Commits format.")
              print("::error title=Invalid PR title::Format: type(scope): description  —  e.g.  feat: add oracle reranker, fix(kernel): correct heartgate timeout")
              print("::error title=Invalid PR title::Valid types: feat, fix, chore, docs, design, test, refactor, verify, ci")
              sys.exit(1)
          print(f"OK: title matches conventional commits.")
          PYEOF

      - name: Check branch name convention
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys
          branch = os.environ['HEAD_REF']
          # Two disjoint alternatives to avoid overlapping quantifiers (ReDoS):
          #   1. dependabot/<ecosystem>/<rest>  (underscores OK inside dependabot paths)
          #   2. Standard: lowercase, hyphens/slashes, no underscores
          #      Each segment: starts [a-z0-9], continues [a-z0-9-], separated by [-/]
          DEPENDABOT = r'dependabot/[a-z0-9_-]+/.+'
          # [a-z0-9]+ (no hyphen) eliminates the double-membership ReDoS:
          # hyphens between words are handled by the [/-] separator; segments
          # themselves contain only alphanumerics.
          STANDARD   = r'[a-z][a-z0-9]*(?:[/-][a-z0-9]+)*'
          pattern = rf'^(?:{DEPENDABOT}|{STANDARD})$'
          if not re.fullmatch(pattern, branch):
              print(f"::error title=Invalid branch name::Branch '{branch}' violates naming convention.")
              print("::error title=Invalid branch name::Format: type/description or type-description (lowercase, hyphens/slashes, no underscores)")
              print("::error title=Invalid branch name::Dependabot branches (underscores OK): dependabot/<ecosystem>/<package>")
              print("::error title=Invalid branch name::Examples: feat/add-oracle, fix-kernel-timeout, gitops/release-strategy, design/graph-engine-v2")
              sys.exit(1)
          print(f"OK: branch name '{branch}' is valid.")
          PYEOF
