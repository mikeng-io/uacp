name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tag matches pyproject.toml version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PYEOF'
          import re, os, sys
          tag_ver = os.environ['TAG_NAME'].lstrip('v')
          text = open('pyproject.toml').read()
          m = re.search(r'^version = "([^"]+)"', text, re.MULTILINE)
          if not m:
              print("::error::Cannot find version in pyproject.toml")
              sys.exit(1)
          pkg_ver = m.group(1)
          if tag_ver != pkg_ver:
              print(f"::error title=Version mismatch::Tag v{tag_ver} does not match pyproject.toml {pkg_ver}.")
              print(f"::error title=Version mismatch::Run make release-prep TYPE=..., merge the PR, then push the tag.")
              sys.exit(1)
          print(f"OK: tag v{tag_ver} matches pyproject.toml {pkg_ver}")
          PYEOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$TAG_NAME" == *-* ]]; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes --prerelease
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
          fi
