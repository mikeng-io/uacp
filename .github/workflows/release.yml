name: Release

on:
  push:
    tags:
      - 'v*.*.*'      # stable release:  v1.2.3, v10.20.30
      - 'v*.*.*-*'    # pre-release:     v1.2.3-alpha.1, v1.2.3-rc.1

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Verify the tag's commit is reachable from main.
      # Resolve the tag to its underlying commit first — for annotated tags,
      # GITHUB_SHA is the tag object SHA, not the commit SHA, which would make
      # merge-base fail or produce the wrong result.
      - name: Verify tag is reachable from main
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin main
          commit_sha=$(git rev-list -n 1 "$TAG_NAME")
          if ! git merge-base --is-ancestor "$commit_sha" origin/main; then
            echo "::error title=Tag not on main::Tag $TAG_NAME points to a commit not reachable from main."
            echo "::error title=Tag not on main::Merge the version bump PR first, then push the tag."
            exit 1
          fi
          echo "OK: tag $TAG_NAME (commit $commit_sha) is reachable from origin/main"

      # Verify the tag's semver RELEASE CORE (pre-release/build suffix stripped) matches pyproject
      # AND both plugin manifests. Single unit-tested source: scripts/verify_release_tag.py — a
      # pre-release tag like v0.2.0-rc.1 must match a repo at 0.2.0 (the workflow's own trigger
      # advertises pre-release tags; comparing the full string used to reject every one of them).
      - name: Verify tag matches pyproject + all manifests
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: python3 scripts/verify_release_tag.py

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "::error title=Release already exists::GitHub Release $TAG_NAME already exists."
            echo "::error title=Release already exists::Delete it first if you want to re-create it: gh release delete $TAG_NAME"
            exit 1
          fi
          if [[ "$TAG_NAME" == *-* ]]; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes --prerelease
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
          fi
