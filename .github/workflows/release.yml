name: Release

on:
  push:
    tags:
      - 'v*.*.*'      # stable release:  v1.2.3, v10.20.30
      - 'v*.*.*-*'    # pre-release:     v1.2.3-alpha.1, v1.2.3-rc.1

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Verify the tag's commit is reachable from main.
      # Resolve the tag to its underlying commit first — for annotated tags,
      # GITHUB_SHA is the tag object SHA, not the commit SHA, which would make
      # merge-base fail or produce the wrong result.
      - name: Verify tag is reachable from main
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin main
          commit_sha=$(git rev-list -n 1 "$TAG_NAME")
          if ! git merge-base --is-ancestor "$commit_sha" origin/main; then
            echo "::error title=Tag not on main::Tag $TAG_NAME points to a commit not reachable from main."
            echo "::error title=Tag not on main::Merge the version bump PR first, then push the tag."
            exit 1
          fi
          echo "OK: tag $TAG_NAME (commit $commit_sha) is reachable from origin/main"

      - name: Verify tag matches pyproject.toml version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PYEOF'
          import re, os, sys
          tag_ver = os.environ['TAG_NAME'].removeprefix('v')
          text = open('pyproject.toml').read()
          m = re.search(r'^version = "([^"]+)"', text, re.MULTILINE)
          if not m:
              print("::error::Cannot find version in pyproject.toml")
              sys.exit(1)
          pkg_ver = m.group(1)
          if tag_ver != pkg_ver:
              print(f"::error title=Version mismatch::Tag v{tag_ver} does not match pyproject.toml {pkg_ver}.")
              print(f"::error title=Version mismatch::Run make release-prep TYPE=..., merge the PR, then push the tag.")
              sys.exit(1)
          print(f"OK: tag v{tag_ver} matches pyproject.toml {pkg_ver}")
          PYEOF

      # Verify all three manifests agree — catches a partial bump_version.py run.
      - name: Verify all manifests agree on version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          tag_ver = os.environ['TAG_NAME'].removeprefix('v')
          errors = []

          try:
              plugin = json.loads(open('.claude-plugin/plugin.json').read())
              v = plugin.get('version', 'MISSING')
              if v != tag_ver:
                  errors.append(f".claude-plugin/plugin.json version={v!r}, expected {tag_ver!r}")
          except Exception as e:
              errors.append(f".claude-plugin/plugin.json: {e}")

          try:
              market = json.loads(open('.claude-plugin/marketplace.json').read())
              plugins = market.get('plugins', [])
              if not plugins:
                  errors.append(".claude-plugin/marketplace.json: plugins array is empty or missing")
              else:
                  v = plugins[0].get('version', 'MISSING')
                  if v != tag_ver:
                      errors.append(f".claude-plugin/marketplace.json plugins[0].version={v!r}, expected {tag_ver!r}")
          except Exception as e:
              errors.append(f".claude-plugin/marketplace.json: {e}")

          if errors:
              for e in errors:
                  print(f"::error title=Manifest drift::{e}")
              print("::error title=Manifest drift::Run make release-prep TYPE=... to sync all manifests, then re-push the tag.")
              sys.exit(1)
          print(f"OK: all manifests agree on {tag_ver}")
          PYEOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "::error title=Release already exists::GitHub Release $TAG_NAME already exists."
            echo "::error title=Release already exists::Delete it first if you want to re-create it: gh release delete $TAG_NAME"
            exit 1
          fi
          if [[ "$TAG_NAME" == *-* ]]; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes --prerelease
          else
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
          fi
