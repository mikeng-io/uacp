# UACP E2E acceptance harness — compose stack.
#
# Increment 0 (THIS): the `conformance` service only — prove the installed plugin is actionable in a
# clean container. No model/proxy/runner yet (those arrive with the lifecycle increments, design
# nodes 10/11/12): plugin conformance needs neither a model nor a real agent.
#
#   docker compose -f acceptance/compose.yml run --rm conformance
#
# Exit 0 + a conformance.json under ./acceptance/out == every expected capability is actionable.
services:
  conformance:
    build:
      context: ..
      dockerfile: acceptance/Dockerfile
    # offline at run — the build warmed the uv env; conformance launches the MCP server locally only.
    network_mode: none
    volumes:
      - ./out:/out
