# The four phase-transition schemas (scope, intent, evidence_disposition, lessons),
# the blast_radius enum, cross-check constants (evidence_disposition_minimum_content),
# and the run_registry schema have been codified as Pydantic models in:
#   skills/uacp-core/scripts/engines/domain/artifact_schema.py
#
# The two operator-tunable path tables (tool_path_capabilities, handler_refusals)
