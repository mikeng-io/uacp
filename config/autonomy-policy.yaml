schema_version: '0.1'
kind: uacp.autonomy_policy
enforcement_status: stub_only_phase_4
purpose: >
  Phase 4.2 — declares operating-mode policy for autonomous UACP runs.
  Each `uacp_mode` (manual | semi_auto | supervised_auto | full_auto)
  has a behavior profile and escalation triggers. Skills consult this
  file (mirror in their SKILL.md mode_behavior stubs) to decide which
  decisions require operator confirmation vs autonomous handling.

# --- Enforcement honesty (Phase 4 R1) ---
#
# Phase 4 R1 Codex review surfaced that this file's mode-behavior and
# escalation-trigger surfaces are NOT mechanically read by the kernel/adapter
# yet. To prevent "config in YAML's clothing" drift, every block below carries
# an explicit `enforcement_status` field:
#
#   stub_only_phase_4     — declared here for forward compatibility; no
#                           kernel reader; consumed by humans / future Phase 5
#   partial_phase_4       — some kernel readers exist for a subset
#   production            — fully consumed by kernel/adapter code
#
# Phase 5 will flip stub_only_phase_4 → production once kernel readers land
# (see pc_p4_* propagated constraints).
enforcement_status_legend:
  stub_only_phase_4: declared in YAML; no kernel reader; consumed by humans/skills as guidance
  partial_phase_4: some kernel readers exist; balance documented per field
  production: fully consumed by kernel/adapter at runtime

modes:
  enforcement_status: stub_only_phase_4
  # Phase 4 R1 honesty (GOV-P4-002 / SKEP-P4-003): the per-mode fields
  # below (autonomous_actions, requires_operator_confirmation, on_block,
  # on_warn, default_escalation_severity, run_registry_registration_required)
  # have ZERO kernel readers in Phase 4. Skills consult them as guidance.
  # Phase 5 will add the first kernel reader (see pc_p4_skep_003).
  manual:
    description: >
      Operator drives every transition. No autonomous decisions; UACP
      acts as a recording and validation layer.
    autonomous_actions: []
    requires_operator_confirmation:
      - propose_to_plan
      - plan_to_execute
      - execute_to_verify
      - verify_to_resolve
      - any_council_review
    on_block: pause_for_operator
    on_warn: pause_for_operator
    default_escalation_severity: info

  semi_auto:
    description: >
      Operator confirms phase transitions; UACP autonomously runs
      within-phase work (artifact writes, internal validations, PIV).
    autonomous_actions:
      - within_phase_artifact_write
      - within_phase_piv
      - within_phase_heartgate_check
    requires_operator_confirmation:
      - propose_to_plan
      - plan_to_execute
      - execute_to_verify
      - verify_to_resolve
    on_block: pause_for_operator
    on_warn: continue_with_recorded_warning
    default_escalation_severity: warn

  supervised_auto:
    description: >
      UACP autonomously runs the lifecycle until a registered
      escalation trigger fires. Operator is notified via
      state/escalations/{run_id}.jsonl. Council reviews run automatically
      but escalate on material findings.
    autonomous_actions:
      - within_phase_artifact_write
      - within_phase_piv
      - within_phase_heartgate_check
      - propose_to_plan
      - plan_to_execute
      - execute_to_verify
      - verify_to_resolve
      - agent_council_review
    requires_operator_confirmation:
      - destructive_operations
      - blast_radius_high_or_critical
      - escalation_triggered
    on_block: emit_escalation_then_pause
    on_warn: emit_escalation_continue
    default_escalation_severity: warn
    # Phase 4 hardening (pc_p3_gov_r1_004): supervised_auto runs MUST
    # register in state/run-registry.yaml via uacp_run_registry_update
    # after PLAN_VALIDATION and deregister at RESOLVE.
    run_registry_registration_required: true

  full_auto:
    description: >
      End-to-end autonomous. Operator engaged only on explicit escalation
      triggers (auth, irreversible_writes, sweeping changes, council
      block). All other lifecycle progresses without confirmation.
    autonomous_actions:
      - all_within_phase_actions
      - all_phase_transitions
      - all_council_reviews
    requires_operator_confirmation:
      - irreversible_writes_unbounded
      - cross_run_writes_unbounded
      - escalation_triggered
    on_block: emit_escalation_then_pause
    on_warn: emit_escalation_continue
    default_escalation_severity: warn
    run_registry_registration_required: true

# --- Escalation triggers ---

escalation_triggers:
  enforcement_status: stub_only_phase_4
  condition_language: prose_phase_4
  # Phase 4 R1 honesty (TECH-P4-003 / SKEP-P4-002): the conditions below
  # are prose strings, NOT machine-evaluable predicates. The
  # _handle_uacp_escalation_event handler does not validate `trigger`
  # against this registry yet. Phase 5 must (a) introduce a structured
  # condition DSL and (b) lock down trigger IDs at handler-init time.
  description: >
    Conditions that emit `uacp_escalation_event` records in
    state/escalations/{run_id}.jsonl. Severity controls whether the
    run pauses (block) or continues (info/warn) per the mode's
    on_block/on_warn rule.
  triggers:
    - id: trigger_blast_radius_high
      condition: scope.blast_radius in {high, critical}
      severity: block
      modes: [semi_auto, supervised_auto, full_auto]
      reason: high blast radius requires explicit operator authorization
    - id: trigger_council_material_finding
      condition: council_review.verdict == "block" or material_findings_count > 0
      severity: block
      modes: [supervised_auto, full_auto]
      reason: council surfaced material finding that requires operator review
    - id: trigger_pending_assumption_unowned
      condition: evidence_disposition has unowned 'pending' assumption
      severity: block
      modes: [supervised_auto, full_auto]
      reason: unowned pending assumption is a governance blocker
    - id: trigger_irreversible_write
      condition: scope.declared_side_effects contains kind=irreversible_write
      severity: block
      modes: [full_auto]
      reason: irreversible_write requires operator confirmation even in full_auto
    - id: trigger_run_registry_overlap_imminent
      condition: registry overlap detected during plan->execute
      severity: warn
      modes: [supervised_auto, full_auto]
      reason: another active run claims overlapping write_paths
    - id: trigger_piv_first_failure
      condition: first PIV attempt failed
      severity: warn
      modes: [supervised_auto, full_auto]
      reason: PIV failure may indicate phase work is incomplete
    - id: trigger_piv_second_failure
      condition: second PIV attempt failed (unconditional block)
      severity: block
      modes: [semi_auto, supervised_auto, full_auto]
      reason: PIV second failure is non-waivable

# --- Phase 4 R1 absorbed constraints ---

canonical_state_paths:
  enforcement_status: stub_only_phase_4
  # Phase 4 R1 honesty (TECH-P4-001 / SKEP-P4-008): this block is the
  # DECLARED single source of truth for canonical state paths, but the
  # kernel/adapter does NOT yet read it. Path literals are still hardcoded.
  # Phase 5 adds a _canonical_state_path(name) helper that all readers
  # use (pc_p4_skep_007).
  description: >
    Phase 4 declares the intent — canonical state file paths read from
    this single block by both kernel and adapters. Phase 5 adds the
    reader helper.
  state_dir: state/
  current_pointer: state/current.yaml
  kanban_binding: state/kanban.yaml
  run_manifests_dir: state/runs/
  gate_ledger_dir: state/gate-ledger/
  run_registry: state/run-registry.yaml
  escalations_dir: state/escalations/

advisory_field_convention:
  description: >
    Phase 4 absorbs pc_p3_gov_r1_003 — YAML fields not read by code
    must use the _advisory suffix or live under a documentation: block.
    Kernels and adapters MUST NOT depend on _advisory fields. Operators
    use them as authoritative human-readable annotations.
  rule: |
    Any YAML field name ending in '_advisory' is documentation-only.
    Any YAML field with no kernel reader after a Phase 4 audit should
    be renamed with the suffix OR have a kernel reader added.

# --- Hermes core seam ---

hermes_core_seam:
  enforcement_status: stub_only_phase_4
  push_notification_phase: 5
  current_mechanism: |
    Operator polls state/escalations/{run_id}.jsonl. uacp_escalation_event
    writes JSONL records, one per escalation, with severity + trigger +
    reason. Operator's polling cadence is out of scope; UACP guarantees
    the record exists and is readable.
  phase_5_deliverable: |
    Push notification surface (per the proposal's Phase 5 reserved slot).
    Replaces operator polling with active push to a configured endpoint.
