# cluster_states + artifact_schema codified in engines/domain/evidence_cluster.py (Slice 4a);
# families/registry/example retained as doctrine.
schema_version: '0.1'
kind: uacp.evidence_cluster_registry
status: seed
purpose: 'Defines reusable evidence cluster families and the artifact shape for context-selected
  UACP gate work. These families are available to the meta-gate; they are not a mandatory
  checklist.

  '
universal_cluster_families:
- id: scope
  purpose: Clarify requested work, boundaries, non-goals, and ambiguity.
  typical_phases:
  - triage
  - propose
  - plan
  default_concurrency: early-routing
- id: context
  purpose: Classify domains, artifacts, project conventions, and routing.
  typical_phases:
  - triage
  - propose
  - plan
  - verify
  default_concurrency: early-routing
- id: authority
  purpose: Verify explicit authority for requested side effects.
  typical_phases:
  - triage
  - propose
  - plan
  - execute
  - verify
  - resolve
  invariant: true
- id: side_effects
  purpose: Declare files, systems, people, services, or external surfaces affected.
  typical_phases:
  - triage
  - propose
  - plan
  - execute
  - verify
  - resolve
  invariant: true
- id: write_containment
  purpose: Confirm write boundaries and workspace containment.
  typical_phases:
  - plan
  - execute
  - verify
  invariant: true
- id: privacy_safety
  purpose: Check privacy, safety, and trust-boundary exposure.
  typical_phases:
  - triage
  - propose
  - plan
  - execute
  - verify
  - resolve
  invariant: true
- id: traceable_state
  purpose: Ensure state changes are recorded with authority and provenance.
  typical_phases:
  - plan
  - execute
  - verify
  - resolve
  invariant: true
- id: conservative_failure
  purpose: Block on missing authority, missing config, or unresolved critical uncertainty.
  typical_phases:
  - triage
  - propose
  - plan
  - execute
  - verify
  - resolve
  invariant: true
- id: grounding
  purpose: Retrieve source-backed evidence when current or external facts matter.
  typical_phases:
  - triage
  - propose
  - plan
  - verify
- id: feasibility
  purpose: Assess practical feasibility in the selected domain, not only software.
  typical_phases:
  - plan
- id: risk
  purpose: Identify failure modes, blast radius, reversibility, and stop conditions.
  typical_phases:
  - triage
  - propose
  - plan
  - verify
- id: architecture_design
  purpose: Check fit with existing architecture, design, constraints, or strategy.
  typical_phases:
  - plan
  - verify
- id: execution_strategy
  purpose: Define bounded execution units, Kanban shape, delegation, and observability.
  typical_phases:
  - plan
  - execute
- id: verification_strategy
  purpose: Define context-appropriate checks and acceptance evidence.
  typical_phases:
  - plan
  - verify
- id: memory_lessons
  purpose: Decide what becomes artifact, lesson, memory, or skill update.
  typical_phases:
  - resolve
  - id: handled_negative_result_followthrough
    purpose: Validate that handled negative findings do not silently pass without documented handling, required follow-up council evidence, and Heartgate-visible residual risk/next-phase obligations.
    typical_phases: [triage, propose, plan, execute, verify, resolve]
    required_when:
      - transition carries handled blockers, concerns, invariant failures, negative findings, or material warnings
    checks:
      - original finding is referenced
      - handling classification is valid
      - required follow-up council exists or accepted exception is recorded
      - warnings/deferred items have owner/residual_risk/next_phase_acceptance
      - Heartgate validation is recorded

evidence_domain_registry:
  status: seed_merge_target
  purpose: 'Merge adaptive UACP evidence cluster selection with static domain registry
    knowledge from downstream agent-skills. The registry selects domains, evidence
    clusters, expert roles, verification requirements, and council shape from phase,
    artifact type, risk, authority, and runtime context.

    '
  canonical_docs:
  - docs/lifecycle/lifecycle-reference.md
  - docs/lifecycle/orchestration-model.md
  merge_policy:
    static_domains_are_seed_knowledge: true
    adaptive_cluster_selection_remains_runtime_logic: true
    avoid_parallel_domain_doctrine: true
  selection_inputs:
  - phase
  - artifact_types
  - domains
  - risk_level
  - authority
  - side_effects
  - reversibility
  - runtime_context
  - council_mode
  - council_tier
  output_shape:
    selected_domains: []
    selected_cluster_families: []
    suggested_council_roles: []
    verification_requirements: []
    escalation_triggers: []
  initial_domain_bindings:
    software:
      common_cluster_families:
      - architecture_design
      - execution_strategy
      - verification_strategy
      - risk
      suggested_roles:
      - implementation_reviewer
      - verification_reviewer
      - devils_advocate
    infra:
      common_cluster_families:
      - risk
      - write_containment
      - verification_strategy
      - privacy_safety
      suggested_roles:
      - operator_proxy
      - verification_reviewer
      - devils_advocate
    research:
      common_cluster_families:
      - grounding
      - context
      - verification_strategy
      suggested_roles:
      - domain_expert
      - verification_reviewer
      - integrator_critic
    writing:
      common_cluster_families:
      - context
      - grounding
      - verification_strategy
      suggested_roles:
      - domain_expert
      - integrator_critic
    governance:
      common_cluster_families:
      - authority
      - traceable_state
      - conservative_failure
      - risk
      suggested_roles:
      - integrator_critic
      - operator_proxy
      - devils_advocate
  implementation_status: not_runtime_active
  verification_rule: PASS only means direction captured in config; do not treat as
    runtime implementation until selection logic exists and is verified.
  deferred_until: domain registry shape and runtime selector are reviewed in a later
    implementation phase
  phase6_decision: Runtime selector activation is explicitly deferred. Retrieval-led
    council protocol may reference this registry as design input, but must not claim
    it is runtime-active until a separate implementation phase adds and verifies selector logic.
example_artifact:
  kind: uacp.evidence_cluster
  cluster_id: verify.runtime_validation
  phase: verify
  family: verification_strategy
  purpose: Validate that a completed runtime-facing change behaves as intended.
  trigger_conditions:
  - Artifact changes runtime behavior or operational configuration.
  - The selected domain template marks runtime validation as relevant.
  required_inputs:
  - approved_plan_artifact
  - execution_history_artifact
  - changed_artifact_list
  allowed_tools:
  - local_test_runner
  - browser_or_runtime_probe_when_available
  - delegate_task_for_bounded_validation
  output_artifact_path: verification/<run-id>/runtime-validation.yaml
  decision_rules:
    pass: Expected behavior is observed and no blocker remains.
    warn: Non-critical issue remains with explicit owner and accepted follow-up.
    block: Expected behavior cannot be validated or a material regression is found.
    not_applicable: No runtime-facing artifact or side effect exists.
    deferred: Only allowed when the next phase records the exact deferred validation.
  concurrency:
    can_run_parallel: true
    fanout_group: verify
    max_parallelism_hint: bounded-by-tooling
  dependencies:
  - gate-selection artifact
  state: pass
  findings:
  - severity: info
    summary: Example only; replace with concrete validation evidence.
