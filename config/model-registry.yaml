---
# UACP Model Registry
# Canonical mapping from abstract UACP model aliases to concrete provider model IDs.
# This file is the single source of truth for model resolution across all bridges.
#
# DESIGN PRINCIPLES:
#   - Alias names are stable and version-agnostic (e.g. "claude-sonnet", not "sonnet-4-6").
#   - Concrete IDs carry version numbers and are updated here ONLY when providers
#     release new models or deprecate old ones.
#   - Skills read this file from UACP_ROOT at runtime.
#   - If resolution fails, skills fall back to the runtime's default model.
#   - OpenCode is an exception: it is multi-provider and discovers its own model
#     from local config; its aliases here are optional conveniences.
#
# LOCAL OVERRIDE:
#   Create `config/model-registry.local.yaml` (gitignored) to override any alias
#   without modifying this canonical file.
#
# LAST VERIFIED: 2026-06-07
#   Anthropic: claude-opus-4-8 (2026-05-28), claude-sonnet-4-6 (2026-02-17),
#              claude-haiku-4-5 (2025-10-15). Haiku 3 retired 2026-04-19.
#   OpenAI:    gpt-5.5 (2026-04-23), gpt-5.4 (2026-03-05),
#              gpt-5.4-mini (2026-03-17). GPT-4o/o3 retired Feb 2026.
#   Google:    gemini-3.5-flash (2026-05-19). gemini-3.5-pro expected June 2026.
#   Moonshot:  kimi-k2.6 (2026-04-20). K2.5 discontinued 2026-05-25.

schema_version: "0.1.0"
kind: uacp.model_registry
updated_at: "2026-06-07"
source: https://github.com/nortrix-labs/uacp/blob/main/config/model-registry.yaml

# =============================================================================
# PROVIDER MODELS
# =============================================================================
# Abstract alias → concrete provider model ID.
# Skills resolve aliases via the tier_mappings section below.

providers:
  anthropic:
    name: "Anthropic"
    base_url: "https://api.anthropic.com"
    models:
      claude-haiku:
        concrete_id: "claude-haiku-4-5"
        description: "Fast, lightweight Claude model for trivial tasks"
      claude-sonnet:
        concrete_id: "claude-sonnet-4-6"
        description: "Balanced reasoning and speed — daily driver"
      claude-opus:
        concrete_id: "claude-opus-4-8"
        description: "Highest capability Claude model"

  openai:
    name: "OpenAI"
    base_url: "https://api.openai.com"
    models:
      gpt-5-4-mini:
        concrete_id: "gpt-5.4-mini"
        description: "Fast, cost-effective GPT model for light tasks"
      gpt-5-4:
        concrete_id: "gpt-5.4"
        description: "Standard GPT model — frontier quality at lower cost"
      gpt-5-5:
        concrete_id: "gpt-5.5"
        description: "Highest capability GPT model for complex reasoning"

  google:
    name: "Google"
    base_url: "https://generativelanguage.googleapis.com"
    models:
      gemini-3-5-flash:
        concrete_id: "gemini-3.5-flash"
        description: "Fastest Gemini model — agentic coding & tool use"
      gemini-3-5-pro:
        concrete_id: "gemini-3.5-pro"
        description: "Highest capability Gemini model (expected June 2026)"

  moonshot:
    name: "Moonshot"
    base_url: "https://api.moonshot.cn"
    models:
      kimi-default:
        concrete_id: "kimi-k2.6"
        description: "Kimi K2.6 — Moonshot's current flagship model"

# =============================================================================
# TIER MAPPINGS
# =============================================================================
# Per-bridge mapping from abstract tier (0–4) to alias + reasoning level.
# These mappings are stable. When a provider releases a new model, update
# the concrete_id in the providers section above — never change alias names
# or tier mappings unless the capability model itself changes.
#
# OpenCode is intentionally absent. OpenCode is a user-configured multi-provider
# gateway; it discovers its own model from local config and is opaque to this
# registry.

tier_mappings:
  claude:
    0: { alias: claude-haiku,  reasoning: medium }
    1: { alias: claude-sonnet, reasoning: medium }
    2: { alias: claude-sonnet, reasoning: high }
    3: { alias: claude-opus,   reasoning: high }
    4: { alias: claude-opus,   reasoning: xhigh }

  codex:
    0: { alias: gpt-5-4-mini, reasoning: medium }
    1: { alias: gpt-5-4,      reasoning: medium }
    2: { alias: gpt-5-4,      reasoning: high }
    3: { alias: gpt-5-5,      reasoning: high }
    4: { alias: gpt-5-5,      reasoning: xhigh }

  gemini:
    0: { alias: gemini-3-5-flash, reasoning: medium }
    1: { alias: gemini-3-5-flash, reasoning: medium }
    2: { alias: gemini-3-5-flash, reasoning: high }
    3: { alias: gemini-3-5-flash, reasoning: high }
    4: { alias: gemini-3-5-pro,   reasoning: xhigh }

  kimi:
    0: { alias: kimi-default, reasoning: thinking }
    1: { alias: kimi-default, reasoning: thinking }
    2: { alias: kimi-default, reasoning: thinking }
    3: { alias: kimi-default, reasoning: thinking }
    4: { alias: kimi-default, reasoning: thinking }

# =============================================================================
# UPDATE WORKFLOW
# =============================================================================
# 1. Provider releases new model (e.g. Anthropic releases claude-sonnet-5-0).
# 2. Update concrete_id for the affected alias in providers.*.models.
# 3. Update the LAST VERIFIED header above with source citations.
# 4. Bridges read the updated registry locally from UACP_ROOT.
# 5. No bridge code changes required.
