schema_version: '0.1'
kind: uacp.phase_transition_config
status: seed
purpose: 'Defines stable lifecycle phase envelopes and the adaptive transition artifact
  shape. Transition decisions combine invariant checks, selected evidence cluster
  outcomes, and blocker synthesis.

  '
stages:
  triage:
    enters_from:
    - none
    exits_to:
    - propose
    - terminal
    purpose: Calibrate scope, score granularity, and route the request.
    can_terminate_without_full_lifecycle: true
    routing_outcomes:
      direct: terminal_direct
      lightweight: propose
      standard_uacp: propose
      full_governance: propose
      block_or_clarify: terminal_blocked
    allowed_tools:
    - uacp_artifact_write
    - uacp_state_write
    - uacp_run_registry_update
    - uacp_escalation_event
    - uacp_gate_ledger_append
    - uacp_heartgate_check
    - uacp_doc_write
    - uacp_config_write
    forbidden_tools:
    - terminal
    - execute_code
    phase_exit_invariants:
    - artifact_glob: "proposals/{run_id}-triage*.yaml"
      required: true
    - gate_ledger_entry: "TRIAGE_COMPLETE"
      required: true
  propose:
    enters_from:
    - triage
    exits_to:
    - plan
    purpose: Establish authority, scope, context, risk, and proposal viability.
    allowed_tools:
    - uacp_artifact_write
    - uacp_state_write
    - uacp_run_registry_update
    - uacp_escalation_event
    - uacp_gate_ledger_append
    - uacp_heartgate_check
    - uacp_doc_write
    forbidden_tools:
    - terminal
    - execute_code
    phase_exit_invariants:
    - artifact_glob: "proposals/{run_id}*.yaml"
      required: true
    - artifact_glob: "proposals/{run_id}*-gate-selection.yaml"
      required: false
    - artifact_glob: "proposals/{run_id}*-package-selection.yaml"
      required: false
      applies_when: adaptive_proposal_package_selected
      description: Machine bridge for adaptive proposal documentation selection; required for selected medium/high consequence work before PROPOSE->PLAN.
    - package_directory: "proposals/{run_id}/"
      required: false
      applies_when: adaptive_proposal_package_selected
      description: Human-reviewable proposal package; YAML proposal artifacts are lifecycle envelopes, not the complete proposal.
    - gate_ledger_entry: "TRIAGE->PROPOSE"
      required: true
  plan:
    enters_from:
    - propose
    exits_to:
    - execute
    purpose: Convert approved proposal into bounded execution and verification strategy.
    allowed_tools:
    - uacp_artifact_write
    - uacp_state_write
    - uacp_run_registry_update
    - uacp_escalation_event
    - uacp_gate_ledger_append
    - uacp_heartgate_check
    forbidden_tools:
    - terminal
    - execute_code
    phase_exit_invariants:
    - artifact_glob: "plans/{run_id}*"
      required: true
    - gate_ledger_entry: "PROPOSE->PLAN"
      required: true
  execute:
    enters_from:
    - plan
    exits_to:
    - verify
    purpose: Perform bounded work through UACP-authorized Agent Council orchestration,
      Hermes Kanban coordination, delegated workers, selected runtimes, and approved
      tool/evidence adapters.
    allowed_tools:
    - uacp_doc_write
    - uacp_config_write
    - uacp_state_write
    - uacp_run_registry_update
    - uacp_escalation_event
    - uacp_artifact_write
    - uacp_gate_ledger_append
    - uacp_contained_shell
    - uacp_sandbox_check
    - uacp_heartgate_check
    - terminal
    - execute_code
    forbidden_tools: []
    phase_exit_invariants:
    - artifact_glob: "executions/{run_id}*"
      required: true
    - gate_ledger_entry: "PLAN->EXECUTE"
      required: true
  verify:
    enters_from:
    - execute
    exits_to:
    - resolve
    purpose: Validate completed work with context-selected evidence clusters.
    allowed_tools:
    - uacp_artifact_write
    - uacp_state_write
    - uacp_run_registry_update
    - uacp_escalation_event
    - uacp_gate_ledger_append
    - uacp_heartgate_check
    - uacp_sandbox_check
    - uacp_contained_shell
    forbidden_tools:
    - terminal
    - execute_code
    phase_exit_invariants:
    - artifact_glob: "verification/{run_id}*"
      required: true
    - gate_ledger_entry: "EXECUTE->VERIFY"
      required: true
  resolve:
    enters_from:
    - verify
    exits_to:
    - terminal
    purpose: Finalize outputs, archive artifacts, and emit lessons.
    allowed_tools:
    - uacp_artifact_write
    - uacp_state_write
    - uacp_run_registry_update
    - uacp_escalation_event
    - uacp_gate_ledger_append
    - uacp_heartgate_check
    forbidden_tools:
    - terminal
    - execute_code
    phase_exit_invariants:
    - artifact_glob: "outputs/{run_id}*"
      required: true
    - gate_ledger_entry: "VERIFY->RESOLVE"
      required: true
transition_rule:
  required_inputs:
  - current_stage_or_phase_artifact
  - gate_selection_artifact
  - required_cluster_artifacts
  - triage_artifact
  - council_synthesis_artifact
  - declared_side_effects
  - write_containment_record
  - blocker_synthesis
  pass_condition: 'All non-waivable invariants pass, all required clusters are pass
    or accepted warn, no unresolved blocker remains, and the next phase explicitly
    accepts any deferred cluster.

    '
  warn_condition: 'Transition may proceed only when warnings are documented with owners,
    residual risk, and next-phase acceptance.

    '
  block_condition: 'Any invariant block, missing required evidence, unauthorized side
    effect, uncontained write, untraceable state change, or unresolved material risk.

    '
  heartgate_council_role: Heartgate may require a transition-boundary council that
    checks lifecycle coherence and cross-artifact consistency. This is distinct from
    phase-local Agent Council review of phase work products.

adaptive_proposal_package_gate:
  description: >
    PROPOSE documentation selection is adaptive and context-driven. Granularity
    scales rigor, evidence depth, and review pressure; it does not impose a
    fixed OpenSpec-style document list. For selected medium/high consequence
    work, the proposal is the human-reviewable package directory and the YAML
    proposal artifact is only a lifecycle envelope.
  applies_to_transition: propose->plan
  selected_when_any:
    routing_outcomes: [standard_uacp, full_governance]
    risk_levels: [high, critical]
    domains:
      - governance
      - runtime
      - schema_contracts
      - public_private_boundary
      - agent_lifecycle
      - validator_enforcement
      - heartgate_transition
      - guardian_policy
  required_artifacts:
    - proposals/{run_id}-package-selection.yaml
    - proposals/{run_id}/
  required_universal_core:
    - intent
    - authority
    - scope
    - containment
    - risk
    - verification
    - transition
    - artifact_map
  not_applicable_required_fields:
    - reason
    - accepted_by
    - owner
    - residual_risk
    - revisit_phase
  block_when:
    - yaml_only_proposal_for_selected_medium_high_consequence_work
    - missing_package_selection_artifact
    - missing_universal_core_concern
    - missing_selected_module_artifact
    - selected_module_artifact_missing_on_disk
    - weak_not_applicable_rationale
    - unresolved_material_council_findings

adaptive_plan_package_gate:
  description: >
    PLAN documentation/execution topology selection is adaptive and context-driven.
    Granularity scales rigor, evidence depth, and review pressure; it does not
    impose a fixed OpenSpec-style PLAN file list. For selected medium/high
    consequence work, the PLAN is the human-reviewable package directory and
    the YAML plan artifact is only a lifecycle envelope.
  applies_to_transition: plan->execute
  selected_when_any:
    routing_outcomes: [standard_uacp, full_governance]
    risk_levels: [high, critical]
    domains:
      - governance
      - runtime
      - schema_contracts
      - public_private_boundary
      - agent_lifecycle
      - validator_enforcement
      - heartgate_transition
      - guardian_policy
  required_artifacts:
    - plans/{run_id}-plan-selection.yaml
    - plans/{run_id}/
    - plans/{run_id}-scope.yaml
  required_universal_core:
    - work_breakdown
    - dependencies
    - authority_and_side_effects
    - tool_runtime_selection
    - artifact_write_surfaces
    - verification_strategy
    - rollback_recovery
    - council_review_topology
    - transition_readiness
  not_applicable_required_fields:
    - reason
    - accepted_by
    - owner
    - residual_risk
    - revisit_phase
    - revisit_trigger
  block_when:
    - yaml_only_plan_for_selected_medium_high_consequence_work
    - missing_plan_selection_artifact
    - missing_plan_package_directory
    - missing_plan_scope_artifact
    - missing_universal_core_concern
    - missing_selected_module_artifact
    - selected_module_artifact_missing_on_disk
    - weak_not_applicable_rationale
    - unresolved_material_council_findings

adaptive_execute_evidence_gate:
  description: >
    EXECUTE evidence selection is adaptive and context-driven. For selected
    non-trivial work, PLAN authors a Phase Intent Verification (PIV) contract;
    EXECUTE records checkpoints and semantic evidence against that contract;
    VERIFY consumes the evidence before accepting EXECUTE->VERIFY readiness.
    PIV verifies phase intent, not only software implementation. Low-risk/direct work is not forced into this gate unless PLAN explicitly creates a PIV contract or another selection predicate applies.
  applies_to_transition: execute->verify
  selected_when_any:
    plan_has_piv_contract: true
    routing_outcomes: [standard_uacp, full_governance]
    risk_levels: [high, critical]
    domains:
      - governance
      - runtime
      - schema_contracts
      - public_private_boundary
      - agent_lifecycle
      - validator_enforcement
      - heartgate_transition
      - guardian_policy
      - multi_agent_execution
      - profile_plugin_boundary
  required_artifacts:
    - plans/{run_id}-piv.yaml
    - executions/{run_id}-checkpoint-*.yaml
    - executions/{run_id}/
  required_semantic_concerns:
    - work_narrative
    - decision_log
    - evidence_map
    - intent_drift_and_deviations
    - verify_handoff
  block_when:
    - yaml_only_execute_checkpoint_for_selected_work
    - missing_piv_contract
    - missing_execution_package_directory
    - missing_execution_package_index
    - checkpoint_not_bound_to_piv_contract
    - checkpoint_work_unit_not_declared_in_piv
    - required_evidence_obligation_missing_or_unhandled
    - intent_drift_without_disposition
    - verify_handoff_claimed_ready_with_missing_required_evidence

adaptive_verify_evidence_gate:
  description: >
    VERIFY evidence selection is adaptive and context-driven. For selected
    governed/non-trivial work, VERIFY must produce a semantic verification
    package plus machine artifacts for PIV assessment and resolve readiness.
    VERIFY judges truth and cannot pass on artifact existence, unsupported
    facts, unowned assumptions, unresolved findings, or self-remediation.
  applies_to_transition: verify->resolve
  selected_when_any:
    execute_used_piv_contract: true
    routing_outcomes: [standard_uacp, full_governance]
    risk_levels: [high, critical]
    domains:
      - governance
      - runtime
      - schema_contracts
      - public_private_boundary
      - agent_lifecycle
      - validator_enforcement
      - heartgate_transition
      - guardian_policy
      - multi_agent_execution
      - profile_plugin_boundary
  required_artifacts:
    - verification/{run_id}-verify-selection.yaml
    - verification/{run_id}/
    - verification/{run_id}-resolve-readiness.yaml
  required_when_execute_used_piv:
    - verification/{run_id}-piv-assessment.yaml
  required_semantic_concerns:
    - piv_assessment
    - verified_facts
    - assumptions_and_deferred_items
    - findings_and_dispositions
    - council_review
    - resolve_readiness
  block_when:
    - missing_verification_package_directory
    - missing_verification_package_index
    - piv_used_but_missing_piv_assessment
    - verified_facts_without_source_evidence
    - assumptions_or_deferred_items_without_owner_or_next_phase_obligation
    - pass_with_open_blocker
    - council_concerns_without_disposition
    - verify_self_remediation_without_upstream_repair_or_independent_reverification
    - resolve_readiness_without_required_heartgate_coherence

plan_validation_gate:
  description: >
    Phase 3 Item 3.1: a deterministic structural check that runs at PLAN->EXECUTE
    BEFORE any EXECUTE work begins. Not a council — a pre-flight verification
    recorded as `gate: PLAN_VALIDATION` in the run's gate ledger. Heartgate
    treats the PLAN_VALIDATION ledger entry as a required predecessor to
    PLAN->EXECUTE; the entry must exist with result=pass.
  required_ledger_gate_for_transition: plan->execute
  ledger_gate_name: PLAN_VALIDATION
  # Phase 3 R1 (SKEP-001 / GOV-004): the ledger record must carry these
  # fields, must be tagged phase==plan, and its `checks` list must include
  # every pv_id below. The kernel verifies these before accepting the gate.
  ledger_required_fields: [phase, checks, result]
  ledger_required_phase: plan
  checks:
  - id: pv_1
    name: scope_artifact_present_and_parses
    description: plans/{run_id}-scope.yaml exists and parses as valid YAML with all required fields.
  - id: pv_2
    name: allowed_tools_registered
    description: All tools listed in scope.allowed_tools (if present) are registered in the Guardian tool registry.
  - id: pv_3
    name: write_paths_within_proposal_side_effects
    description: scope.write_paths is a subset of the proposal's declared side_effects.paths.
  - id: pv_4
    name: blast_radius_human_approval_when_high
    description: If blast_radius is high or critical, a human-involvement record exists in the triage artifact.
  - id: pv_5
    name: rollback_path_declared
    description: A rollback_path is declared (even if "none--write-only-artifact").
  - id: pv_6
    name: cluster_artifacts_referenced
    description: All required cluster artifacts from PROPOSE->PLAN transition are referenced in plan.
  enforcement: heartgate blocker on PLAN->EXECUTE if PLAN_VALIDATION ledger entry is absent or its result is not 'pass'

run_registry_rule:
  description: >
    Phase 3 Item 3.2: write-path overlap detection across concurrent runs.
    Heartgate consults state/run-registry.yaml at PLAN->EXECUTE; if another
    active run declares an overlapping write_paths entry, this transition
    blocks (enforce) or warns (observe).
  registry_path: state/run-registry.yaml
  enforcement: heartgate blocker on overlap with another active_run's write_paths
  # Phase 3 R1 (TECH-003): the transition this rule guards is read here, not
  # hardcoded in kernel. Extending overlap detection to other transitions
  # only requires a config edit.
  required_for_transition: plan->execute
  # Phase 3 R2 (GOV-R1-004): the actual mechanical writer for state/run-registry.yaml
  # is uacp_run_registry_update. uacp_state_write refuses direct writes
  # (see config/artifact-schemas.yaml#cross_checks.scope_write_paths_vs_layer_b.handler_refusals).
  writer_tool: uacp_run_registry_update
  # _advisory suffix marks fields that are documentation-only; the
  # mechanical enforcement comes from uacp_state_write refusing the path
  # AND from uacp_run_registry_update enforcing caller-binding (entry.run_id
  # == caller.uacp_run_id).
  exclusive_mutator_advisory: uacp-state skill

piv_rule:
  description: >
    Legacy Post-Phase Verification ledger rule. This is distinct from the newer
    Phase Intent Verification contract (`uacp.phase_intent_verification_contract`)
    used for PLAN-authored EXECUTE evidence. To avoid acronym collision in new
    artifacts, refer to this rule as the post_phase_verification_ledger rule; it
    remains recorded in the gate ledger as `gate: PIV` for backward compatibility.
    It is a deterministic 5-check self-evaluation run at the end of every phase
    BEFORE Heartgate is invoked. It may be retried at most once; a second failure
    blocks the transition unconditionally regardless of mode.
  checks:
  - id: piv_1
    name: artifacts_produced
    description: Did the phase produce all artifacts declared in phase_exit_invariants?
  - id: piv_2
    name: satisfies_plan
    description: Do produced artifacts satisfy the proposal/plan that authorized this phase?
  - id: piv_3
    name: handled_findings_chain
    description: Are all material council/review findings classified in handled_findings_chain?
  - id: piv_4
    name: non_waivable_invariants_intact
    description: Authority explicit, write containment honored, traceable state, conservative failure preserved.
  - id: piv_5
    name: no_new_unresolved_findings
    description: Did the phase introduce any new material findings still unresolved?
  max_attempts: 2
  second_failure_action: block_unconditional
  ledger_required: true
  ledger_required_fields: [piv_attempt, result, checks]
artifact_schema:
  kind: uacp.phase_transition
  required_fields:
  - transition_id
  - run_id
  - from_phase
  - to_phase
  - decision
  - invariant_summary
  - cluster_summary
  - blockers
  - warnings
  - deferred_items
  - authority
  - artifact_paths
  - phase_local_granularity
  - composite_granularity
  - human_involvement
  fields:
    transition_id: string
    run_id: string
    from_phase:
      type: enum
      values:
      - triage
      - propose
      - plan
      - execute
      - verify
      - resolve
    routing_outcome:
      type: enum
      values:
      - direct
      - lightweight
      - standard_uacp
      - full_governance
      - block_or_clarify
      description: TRIAGE routing outcome; terminal_kind uses the same vocabulary
        plus none.
    granularity_level:
      type: integer
      description: Legacy/current composite governance intensity. Prefer phase_local_granularity
        and composite_granularity when available.
    triage_artifact:
      type: string
    gate_selection_artifact:
      type: string
    terminal_kind:
      type: enum
      values:
      - none
      - direct
      - lightweight
      - standard_uacp
      - full_governance
      - block_or_clarify
      description: Disposition/terminal kind aligned with routing_outcome; use none
        for non-terminal transitions.
    to_phase:
      type: enum
      values:
      - propose
      - plan
      - execute
      - verify
      - resolve
      - terminal
    decision:
      type: enum
      values:
      - pass
      - warn
      - block
    invariant_summary:
      type: list
      item_type: map
      fields:
        id: string
        status: pass|block
        evidence: string
    cluster_summary:
      type: list
      item_type: map
      fields:
        cluster_id: string
        state: pass|warn|block|not_applicable|deferred
        artifact_path: string
    blockers:
      type: list
      item_type: string
    warnings:
      type: list
      item_type: string
    deferred_items:
      type: list
      item_type: map
    authority:
      type: map
      fields:
        requested_by: string
        authorization_source: string
    artifact_paths:
      type: list
      item_type: string
      description: UACP_ROOT-relative paths unless a symbolic external root is declared.
    declared_side_effects:
      type: list
      item_type: string
    write_containment_record:
      type: string
    blocker_synthesis:
      type: string
    council_synthesis_artifact:
      type: string
      description: UACP_ROOT-relative path to artifact matching council_synthesis_schema
        when council review/orchestration is selected or required.
    verification_artifact:
      type: string
    accepted_exceptions:
      type: list
      item_type: map
      fields:
        artifact_path: string
        rationale: string
        owner: string
    phase_local_granularity:
      type: map
      description: Phase-local granularity reassessment for the transition phase.
      fields:
        phase: string
        entry_estimate: integer
        exit_actual: integer
        delta_reason: string
        downstream_projection: map
    composite_granularity:
      type: integer
      description: Current run-level granularity derived from phase-local scores and
        cross-phase coupling.
    human_involvement:
      type: map
      fields:
        required: boolean
        reason: string
        authority_needed: string
        decision_owner: string
        accepted_risk_artifact: string
    source_negative_findings_present:
      type: boolean
      required_when: material findings are handled or handled_findings_chain is present
      description: True when the transition carries handled material council/gate findings or when source council findings required handling before phase movement.
    handled_findings_chain:
      type: list
      description: Traceability chain for handled blockers, concerns, invariant failures, negative findings, or material warnings before transition approval.
      item_fields:
        original_finding_id: string
        original_artifact_path: string
        finding_classification: blocker|concern|invariant_failure|negative_finding|material_warning
        handling_classification: remediated|expanded|justified|deferred|accepted_warning|rejected_with_reason
        handling_artifact_path: string
        followup_council_synthesis_artifact: string|null
        followup_required: boolean
        followup_depth: integer
        accepted_exception_artifact: string|null
        owner: string
        residual_risk: string
        next_phase_obligation: string|null
        heartgate_validation: pass|warn|block
    heartgate_coherence:
      type: map
      description: Optional transition-boundary coherence check or Heartgate Council
        synthesis summary. Records doctrine coherence, cross-artifact consistency,
        runtime-state alignment, warning/deferred-item honesty, authority-plane integrity,
        and next-phase readiness.
followthrough_gate:
  max_followup_depth_default: 1
  escalate_instead_of_recursing_after_depth: 1
  hard_followup_handling_classifications: [remediated, expanded, justified]
  conditional_followup_handling_classifications: [deferred, accepted_warning, rejected_with_reason]
  material_finding_classifications: [blocker, concern, invariant_failure, negative_finding, material_warning]
  fail_closed_when:
    - missing_required_handling_artifact
    - missing_required_followup_council
    - unowned_warning_or_deferred_item
    - non_waivable_invariant_warn_or_deferred
    - unaccepted_recursion_depth_exceeded

example_artifact:
  kind: uacp.phase_transition
  transition_id: uacp-bootstrap-001-plan-to-execute
  run_id: uacp-bootstrap-001
  from_phase: plan
  to_phase: execute
  routing_outcome: standard_uacp
  granularity_level: 5
  triage_artifact: proposals/uacp-bootstrap-stage-1-2-triage.yaml
  decision: pass
  terminal_kind: none
  invariant_summary:
  - id: authority.explicit
    status: pass
    evidence: Operator requested Stage 1 and Stage 2 implementation.
  - id: writes.contained
    status: pass
    evidence: All planned writes are under UACP_ROOT.
  cluster_summary:
  - cluster_id: scope
    state: pass
    artifact_path: docs/lifecycle/lifecycle-reference.md
  - cluster_id: verification_strategy
    state: pass
    artifact_path: config/phase-transitions.yaml
  blockers: []
  warnings: []
  deferred_items: []
  authority:
    requested_by: operator
    authorization_source: current task prompt
  artifact_paths:
  - config/gate-selection.yaml
  - config/evidence-clusters.yaml
  council_synthesis_artifact: ''
  verification_artifact: ''
  accepted_exceptions: []
  phase_local_granularity:
    phase: plan
    entry_estimate: 5
    exit_actual: 5
    delta_reason: No material delta in example artifact.
    downstream_projection:
      execute: 5
      verify: 5
  composite_granularity: 5
  human_involvement:
    required: false
    reason: Authority and containment are clear in example.
    authority_needed: none
    decision_owner: none
    accepted_risk_artifact: ''
council_synthesis_schema:
  kind: uacp.council_synthesis
  purpose: Minimum schema for Agent Council outputs consumed by phase transitions.
  required_fields:
  - council_id
  - mode
  - tier
  - phase
  - phase_local_granularity
  - roles
  - dispatch_surfaces
  - findings
  - verdict
  - artifact_paths
  - inspected_paths
  fields:
    council_id:
      type: string
    mode:
      type: enum
      values:
      - plan
      - propose
      - execute
      - verify
      - audit
      - review
      - research
      - brainstorm_design
      - resolve
    tier:
      type: enum
      values:
      - tier_0_single
      - tier_1_bounded
      - tier_2_role_diverse
      - tier_3_cross_runtime
      - tier_4_deep_council
    phase:
      type: enum
      values:
      - triage
      - propose
      - plan
      - execute
      - verify
      - resolve
    phase_local_granularity:
      type: map
    roles:
      type: list
    dispatch_surfaces:
      type: list
    findings:
      type: list
      item_schema: finding schema from docs/lifecycle/orchestration-model.md
    verdict:
      type: enum
      values:
      - pass
      - concerns
      - fail
    human_escalation:
      type: map
    artifact_paths:
      type: list
      description: Output, synthesis, and related artifact paths.
    inspected_paths:
      type: list
      description: Ground-truth files, directories, commands, or evidence artifacts inspected by retrieval-led council reviewers.
    rerun_of_findings:
      type: list
      description: Original finding IDs addressed by a rerun council, when applicable.
  artifact_conventions:
    phase_local_council: verification/<run-or-topic>-<phase>-council-synthesis-<date>.yaml
    heartgate_coherence: verification/<run-or-topic>-heartgate-coherence-<date>.yaml
    transition_reference_rule: council_synthesis_artifact references phase-local council evidence; heartgate_coherence.artifact_path references transition-boundary coherence evidence.
  heartgate_council_extension:
    purpose: When a council is attached to Heartgate rather than a phase work product,
      findings should focus on transition truthfulness, lifecycle contract satisfaction,
      coherence, consistency, and next-phase readiness.
heartgate_coherence_required_when:
  purpose: Require transition-boundary Heartgate coherence evidence for material runtime/governance
    transitions while keeping low-risk transitions lightweight.
  min_composite_granularity: 7
  phases:
  - execute
  - verify
  routing_outcomes:
  - full_governance
  domains:
  - runtime
  - governance
  - guardian
  - heartgate
  - kanban
  - agent_council
  - uacp
  required_field: heartgate_coherence
  required_lenses:
  - doctrine_coherence
  - cross_artifact_consistency
  - runtime_state_alignment
  - warning_and_deferred_item_honesty
  - authority_plane_integrity
  - next_phase_readiness

adaptive_resolve_closure_gate:
  description: >
    RESOLVE closure selection is adaptive and context-driven. For selected
    governed/non-trivial work, RESOLVE must consume run-bound VERIFY readiness,
    preserve residual risks/deferred items, classify lessons, and produce a
    semantic closure package plus final closure artifact.
  applies_to_phase: resolve
  selected_when_any:
    verify_readiness_present: true
    routing_outcomes: [standard_uacp, full_governance]
    risk_levels: [high, critical]
    domains:
      - governance
      - runtime
      - schema_contracts
      - public_private_boundary
      - agent_lifecycle
      - validator_enforcement
      - heartgate_transition
      - guardian_policy
      - multi_agent_execution
      - profile_plugin_boundary
  required_artifacts:
    - outputs/{run_id}-resolve-selection.yaml
    - outputs/{run_id}/
    - outputs/{run_id}-closure.yaml
  required_semantic_concerns:
    - closure_summary
    - final_decision
    - residual_risks
    - lessons_and_dispositions
    - state_and_memory_disposition
    - operator_handoff
  block_when:
    - missing_resolve_package_directory
    - missing_resolve_package_index
    - missing_or_unbound_verify_resolve_readiness
    - verify_readiness_not_ready
    - open_blockers_carried_to_closure
    - residual_risk_or_deferred_item_dropped
    - lesson_disposition_missing_or_ambiguous
    - final_decision_missing
    - raw_inventory_operator_handoff
