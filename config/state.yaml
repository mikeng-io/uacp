# ============================================================================
# config/state.yaml — UACP run-state configuration
#
# Codified to engines/domain (Slice 4a Task 3):
#   current_pointer_schema  → engines/domain/pointer.py
#                              CurrentPointer, CURRENT_POINTER_REQUIRED_FIELDS,
#                              UacpMode, MutationPolicy
#   gate_ledger.record_schema → engines/domain/ledger.py
#                              LedgerEntry, LedgerResult, LedgerReviewer
#   escalations.record_schema → engines/domain/escalation.py
#                              EscalationRecord, EscalationMode, EscalationSeverity
#   run_manifest_schema     → REMOVED (drifted; live schema is state_machine.RunManifest
#                              in skills/uacp-state/scripts/state_machine.py)
#
# Doctrine blocks (state_principles, lifecycle_skill_contracts, mutation_rules,
# version_control_binding) and example blocks remain in this file.
# ============================================================================

schema_version: "0.1"
kind: uacp.state_config
status: active
purpose: >
  Defines the initial file-based UACP state layer and version-control binding.
  Bootstrap is closed; governed runtime-state mutation is active through the
  uacp-state skill. Hermes uacp_guardian is live-bound as a user plugin for
  protected-path enforcement, while full production hardening remains incomplete.

state_layer:
  storage: file_based_yaml
  root: "state/"
  current_pointer: "state/current.yaml"
  run_manifests: "state/runs/"
  gate_ledger_root: "state/gate-ledger/"
  implementation_status: governed_mutation
  mutation_boundary: "uacp-state skill"
  bootstrap_closure_flag: true

gate_ledger:
  description: >
    Append-only JSONL record of every gate evaluation in a run. One file per
    run at state/gate-ledger/{run_id}.jsonl. Writes are governed by the
    uacp_gate_ledger_append tool which enforces append-only semantics.
  path_template: "state/gate-ledger/{run_id}.jsonl"
  writer_tool: uacp_gate_ledger_append
  append_only_enforcement:
    - reject_truncate
    - reject_seek
    - reject_overwrite
    - one_record_per_call

state_principles:
  - "State records current lifecycle position and pointers; artifacts carry detailed evidence."
  - "State does not replace canonical governance docs or config."
  - "State does not replace Hermes Kanban; Kanban task IDs are traceability references."
  - "State must use UACP_ROOT-relative paths or symbolic roots."
  - "Direct state edits were bootstrap-only; governed mutation now routes through uacp-state."
  - "Bootstrap mode ends only when bootstrap_closure_flag is true and governed_mutation_active is true."

lifecycle_skill_contracts:
  status: implemented
  creation_gate: "satisfied"
  creation_gate_status: satisfied
  implementation_root: "HERMES_ROOT/skills/devops/uacp/"
  enforcement_status: live_adapter_partial
  enforcement_gap: "Hermes uacp_guardian is live-bound and enforcing protected paths, but lifecycle Heartgate calls, governed doc/config writer surfaces, and production containment hardening remain incomplete."
  skills:
    uacp-state:
      responsibility: "Own governed state mutation, state transitions, and pointer updates."
      write_scope: "state/"
      notes:
        - "Exclusive mutator after bootstrap."
        - "Must not become a hidden source of truth."
    uacp-triage:
      responsibility: "Calibrate scope, score granularity, and route the request."
      write_scope: "proposals/triage artifacts"
    uacp-propose:
      responsibility: "Capture authority, scope, side effects, and proposal viability."
      write_scope: "proposals/"
    uacp-plan:
      responsibility: "Convert approved proposals into bounded execution and verification strategy."
      write_scope: "plans/"
    uacp-execute:
      responsibility: "Dispatch bounded work through Kanban or delegated workers."
      write_scope: "executions/"
    uacp-verify:
      responsibility: "Validate completed work with adaptive evidence clusters."
      write_scope: "verification/"
    uacp-resolve:
      responsibility: "Finalize outputs, lessons, and memory or skill update decisions."
      write_scope: "resolutions/ and knowledge/"

# --- Phase 4.4: escalation events ledger ---
escalations:
  path: state/escalations/
  description: >
    Phase 4.4 — append-only ledger of operator-facing escalations emitted
    by uacp_escalation_event. Each file is JSONL keyed by run_id; one
    record per escalation. Operators poll this directory (push notification
    is Phase 5).
  filename_template: "{run_id}.jsonl"
  # record_schema codified to engines/domain/escalation.py (Slice 4a Task 3)

mutation_rules:
  bootstrap:
    allowed: "closed"
    exit_rule: "Bootstrap direct edits ended when bootstrap_closure_flag became true and governed_mutation_active became true."
    required_evidence:
      - "docs/INDEX.md decision log"
      - "matching run manifest update"
      - "verification artifact when closing a milestone"
  governed:
    required: "uacp-state owns state mutation."
    direct_edit_policy: "block unless explicitly authorized for recovery."
  invariants:
    - "Every mutation points to an authority source or transition artifact."
    - "State paths are UACP_ROOT-relative unless a symbolic external root is declared."
    - "State never stores high-volume evidence inline when an artifact path can be referenced."
    - "State does not use hardcoded physical deployment paths."
    - "current_stage and current_phase must match exactly until a single canonical field replaces them."

version_control_binding:
  status: established
  recommended_binding: "Version UACP_ROOT as its own focused repository."
  repository_root: "UACP_ROOT"
  repository_commit: "e7fcb8e"
  versioned_by_git:
    - "docs/"
    - "config/"
    - "proposals/"
    - "plans/"
    - "executions/"
    - "verification/"
    - "resolutions/"
    - "knowledge/"
    - "state/"
  commit_required_for:
    - "canonical doc changes"
    - "config/schema changes"
    - "tombstone entries"
    - "milestone closure verification artifacts"
  commit_not_required_for:
    - "every intermediate runtime state mutation"
    - "scratch execution artifacts"
  tombstone_commit_rule: >
    git_commit points to the commit that deletes the legacy file and adds or
    updates the tombstone. Retrieve deleted content from that commit's parent
    at deleted_path.
  unresolved:
    - "Define commit cadence for active runtime state now that uacp-state exists."

historical_bootstrap_example_run_manifest:
  kind: uacp.run_state
  run_id: uacp-bootstrap-stage-3-state-binding
  status: active
  current_stage: plan
  current_phase: plan
  authority:
    status: pass
    source: "operator requested long-term UACP development goal"
  transition_artifact: "state/runs/uacp-bootstrap-stage-3-state-binding-transition.yaml"
  council_synthesis_artifact: "verification/uacp-bootstrap-stage-3-state-binding-council.yaml"
  bootstrap_closed: false
  governed_mutation_active: false
  artifacts:
    triage: "proposals/uacp-bootstrap-stage-1-2-triage.yaml"
    proposal: "proposals/uacp-bootstrap-stage-3-state-binding-proposal.yaml"
    plan: "plans/uacp-bootstrap-stage-3-state-binding-plan.yaml"
    execution: ""
    verification: "verification/uacp-bootstrap-stage-3-git-binding-verification.yaml"
    resolution: ""
    learning: ""
  selected_clusters:
    - document_authority
    - state_traceability
    - version_control_binding
  kanban:
    enabled: false
    board_slug: ""
    root_task_ids: []
    parent_child_graph: []
    assignee_profile: ""
    workspace:
      kind: scratch
      path_policy: "UACP_ROOT-relative"
    completion_summary_ref: ""
    metadata: {}
  invariants:
    - id: document_authority
      status: pass
      evidence: "docs/INDEX.md"
    - id: stage_phase_consistency
      status: pass
      evidence: "current_stage and current_phase both set to plan during bootstrap"
  deferred_items:
    - id: lifecycle_skills
      reason: "Create after state mutation boundary is stable."
  state_history:
    - event: initialized
      source: "bootstrap direct edit"
      artifact: "config/state.yaml"
    - event: checkpoint_blocked
      source: "agent council synthesis"
      artifact: "state/runs/uacp-bootstrap-stage-3-state-binding-transition.yaml"
    - event: git_binding_established
      source: "git commit e7fcb8e"
      artifact: "docs/INDEX.md"

current_closed_run_example:
  kind: uacp.run_state
  run_id: uacp-governed-lifecycle-dry-run
  status: closed
  current_stage: resolve
  current_phase: resolve
  bootstrap_closed: true
  governed_mutation_active: true
  current_pointer: "state/current.yaml"
  run_manifest: "state/runs/uacp-governed-lifecycle-dry-run.yaml"
  kanban_binding_artifact: "state/kanban.yaml"
  notes:
    - "This example reflects the post-bootstrap governed state."
    - "The dry-run itself kept Kanban unbound; the active Kanban binding was established later in state/kanban.yaml."
