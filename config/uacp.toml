# UACP Control Plane Configuration
# Central TOML configuration for the Universal Agent Control Plane.
# Override any section by creating a per-project `.uacp/config.toml` (gitignored) —
# local settings take precedence over this file.

schema_version = "0.2.0"
kind = "uacp.control_plane_config"
status = "active"

# =============================================================================
# PATHS
# =============================================================================
# All paths are relative to UACP_ROOT unless absolute.

[paths]
# Subdirectory names under the governed namespace root (`base`). Consumed by the
# config resolver in skills/uacp-core/scripts/config.py. Values are name segments
# resolved as `<base>/<segment>` under UACP_ROOT — not pre-prefixed paths.
base = ".uacp"
state = "state"
proposals = "proposals"
plans = "plans"
executions = "executions"
verification = "verification"
resolutions = "resolutions"   # replaces the old .outputs/
knowledge = "knowledge"
lessons = "lessons"
config = "config.toml"

[paths.bridge_artifacts]
root = "bridges"               # Bridge execution artifacts (JSONL + Markdown), resolved under .uacp/

[paths.council_artifacts]
root = "councils"              # Council session artifacts, resolved under .uacp/

# =============================================================================
# MODEL REGISTRY
# =============================================================================
# Model alias → concrete provider model IDs are now defined in this file
# under [models.providers.*] and [models.tier_mappings.*].
# config/model-registry.yaml was deleted in Slice 3 (config-collapse); this
# file is now the single source of truth for all model identifiers.
# This section precedes the [models.tiers.*] and behavioural bridge settings
# sections below.

# =============================================================================
# MODELS & TIER SYSTEM
# =============================================================================
# The tier system is the canonical way to match task complexity to model
# capability. Tiers are abstract (0–4). Each bridge maps tiers to its own
# provider-specific models and reasoning levels.
#
# Assignment flow:
#   1. Council assesses task → assigns tier (0–4) in bridge_input
#   2. Bridge reads tier → resolves model alias + reasoning from [models.tier_mappings]
#   3. Bridge resolves alias → concrete provider model ID from [models.providers]
#   4. If tier is absent, bridge derives it from task_type + intensity

[models.tiers.0]
name = "minimal"
description = "Very simple tasks — doc formatting, light editing, trivial refactors"
example = "Fix a typo, reformat markdown, update a comment"

[models.tiers.1]
name = "standard"
description = "Simple tasks — routine review, small edits, basic analysis"
example = "Review a single function, write a test case, explain an error"

[models.tiers.2]
name = "complex"
description = "Complex tasks — multi-file review, architecture decisions, debugging"
example = "Refactor across 5 files, design a new component, trace a bug"

[models.tiers.3]
name = "critical"
description = "Critical tasks — security audit, compliance, deep architecture"
example = "Security vulnerability analysis, API compatibility audit, cross-service design"

[models.tiers.4]
name = "maximum"
description = "Maximum capability — novel problems, cross-domain synthesis, highest stakes"
example = "Novel algorithm design, zero-day analysis, multi-system integration"

# Derivation rules when tier is not explicitly assigned
[models.tier_derivation]
# task_type → base tier
review = 1
analysis = 1
research = 2
planning = 2
implementation = 2
audit = 3

# intensity modifier (added to base tier, capped at 4)
quick = 0
standard = 1
thorough = 2

# =============================================================================
# BRIDGE RUNTIME SETTINGS
# =============================================================================
# Connection preference, tier-to-alias mappings, and model identifiers are
# defined in each bridge's SKILL.md and in [models.providers]/[models.tier_mappings]
# in this file (config/model-registry.yaml was deleted in Slice 3).
# This section contains only runtime-configurable parameters that skills
# actively read from config/uacp.toml.
#
# To see the full list of parameters a bridge reads, check its
# "Configuration Reference" section in `skills/uacp-bridge/references/<name>.md`.

# --- Claude (Anthropic) ---
[bridges.claude]
enabled = true
timeout_multiplier = 1.0
workflows_enabled = true

# --- Codex (OpenAI) ---
[bridges.codex]
enabled = true
timeout_multiplier = 1.2

# --- Gemini (Google) ---
[bridges.gemini]
enabled = true
timeout_multiplier = 1.0

# --- Kimi (Moonshot) ---
[bridges.kimi]
enabled = true
timeout_multiplier = 1.0
path = "auto"

# --- OpenCode (multi-provider) ---
# OpenCode is an exception: it is not bound to a specific model and uses
# provider/model format natively.  These settings control OpenCode behaviour
# only; model selection is delegated to the OpenCode runtime.
[bridges.opencode]
enabled = true
timeout_multiplier = 1.5
models = []

# =============================================================================
# BRIDGE DEFAULTS
# =============================================================================

[bridges.defaults]
enabled = true
timeout_multiplier = 1.0
reasoning_level = "medium"    # quick | medium | high | xhigh

# =============================================================================
# COUNCIL
# =============================================================================
# Agent Council bedrock configuration.

[council]
enabled = true
mode = "adaptive"             # adaptive | fixed | quick

[council.roles]
devils_advocate = true
integration_checker = true
domain_expert = true

[council.debate]
max_rounds_quick = 0          # Consolidation only
max_rounds_standard = 1       # 1 challenge + 1 response
max_rounds_thorough = 3       # Up to 3 rounds until convergence
convergence_threshold = 0     # No new findings or revisions vs previous round

[council.output]
prefix_claude = "C"
prefix_gemini = "G"
prefix_codex = "X"
prefix_opencode = "O"
prefix_kimi = "K"

# =============================================================================
# PHASES
# =============================================================================
# Lifecycle phase defaults. Per-phase tool allowlists and invariants
# remain in config/phase-transitions.yaml — this section controls
# phase-wide behavior and defaults.

[phases.defaults]
auto_execute_bounded = true   # Full autonomy for documented, bounded work
council_at_start = true       # Require council PASS before entering phase
council_at_end = true         # Require council PASS before phase exit

[phases.triage]
council_mode = "research"
[phases.propose]
council_mode = "design"
[phases.plan]
council_mode = "plan"
[phases.execute]
council_mode = "implement"
[phases.verify]
council_mode = "audit"
[phases.resolve]
council_mode = "resolve"

[phases.brainstorm]
council_mode = "research"  # reusing 'research' until council_mode gains a 'brainstorm' value

# =============================================================================
# GUARDIAN & HEARTGATE
# =============================================================================
# Runtime enforcement configuration.

# Faithful translation of config/guardian-policy.yaml (kind: uacp.guardian_policy).
# Canonical prose authority remains docs/runtime/runtime-enforcement.md and
# docs/lifecycle/lifecycle-reference.md. The YAML is the source of truth for
# structure; GuardianPolicy.__init__ is structure-driven (data.get(...)), so the
# top-level key shape under [guardian] mirrors the YAML exactly.
[guardian]
mode = "enforce"              # enforce | observe
schema_version = "0.1"

# --- Protected categories (decision surface) -------------------------------
# Each category: description, default_decision, optional allowed_tools.
[guardian.protected_categories."state.uacp"]
description = "Runtime lifecycle state under state/."
default_decision = "block"
allowed_tools = ["uacp_state_write", "uacp_gate_ledger_append", "uacp_run_registry_update", "uacp_escalation_event"]

[guardian.protected_categories."docs.uacp"]
description = "Canonical UACP Markdown docs under docs/."
default_decision = "block"
allowed_tools = ["uacp_doc_write"]

[guardian.protected_categories."config.uacp"]
description = "Canonical UACP YAML config under config/."
default_decision = "block"
allowed_tools = ["uacp_config_write"]

[guardian.protected_categories."file.write"]
description = "Local filesystem write outside explicit UACP state/config/doc boundaries."
default_decision = "require_approval"

[guardian.protected_categories."exec.shell"]
description = "Shell command execution."
default_decision = "block_pending_heartgate"

[guardian.protected_categories."exec.code_with_tool_proxy"]
description = "Code execution that can call filesystem or terminal tools."
default_decision = "block_pending_heartgate"

[guardian.protected_categories."exec.shell.contained"]
description = "bwrap-contained shell execution surface used to mint filesystem-containment attestations."
default_decision = "block"
allowed_tools = ["uacp_contained_shell"]

[guardian.protected_categories."artifact.uacp"]
description = "Non-state UACP artifact writes under plans/, proposals/, executions/, verification/, resolutions/, knowledge/, lessons/, brainstorm/. Includes adaptive proposal package directories under proposals/{run_id}/, adaptive PLAN package directories under plans/{run_id}/, brainstorm scope-package directories under brainstorm/{run_id}/ (e.g. brainstorm/{run_id}/07-scope-package.yaml), and top-level machine lifecycle envelopes such as proposals/{run_id}-proposal.yaml, proposals/{run_id}-package-selection.yaml, plans/{run_id}-plan.yaml, plans/{run_id}-scope.yaml, and plans/{run_id}-plan-selection.yaml."
default_decision = "block"
allowed_tools = ["uacp_artifact_write"]

[guardian.protected_categories."evidence.containment"]
description = "Read-only filesystem-containment evidence checks."
default_decision = "allow_with_audit"
allowed_tools = ["uacp_sandbox_check"]

[guardian.protected_categories."lifecycle.transition"]
description = "Heartgate phase-transition artifact validation (read-only)."
default_decision = "allow_with_audit"
allowed_tools = ["uacp_heartgate_check"]

[guardian.protected_categories."external.message"]
description = "Sending messages or commitments outside origin conversation."
default_decision = "require_approval"

[guardian.protected_categories."external.network_write"]
description = "Network mutation including APIs, posts, issues, PRs, pushes, deploys."
default_decision = "require_approval"

[guardian.protected_categories."external.network_read"]
description = "Network read or web retrieval."
default_decision = "allow_with_audit"

[guardian.protected_categories."runtime.extension"]
description = "Plugin or MCP-provided tool whose provenance must be classified before protected use."
default_decision = "block_pending_heartgate"

[guardian.protected_categories."read.local"]
description = "Local non-private file reads."
default_decision = "allow"

# --- Tool classification (tool name -> category) ---------------------------
[guardian.tool_classification]
read_file = "read.local"
search_files = "read.local"
skill_view = "read.local"
session_search = "read.local"
vision_analyze = "read.local"
browser_snapshot = "read.local"
browser_vision = "read.local"
browser_console = "read.local"
browser_get_images = "read.local"
uacp_state_write = "state.uacp"
uacp_doc_write = "docs.uacp"
uacp_config_write = "config.uacp"
uacp_artifact_write = "artifact.uacp"
uacp_sandbox_check = "evidence.containment"
uacp_contained_shell = "exec.shell.contained"
uacp_heartgate_check = "lifecycle.transition"
uacp_gate_ledger_append = "state.uacp"
uacp_run_registry_update = "state.uacp"
uacp_escalation_event = "state.uacp"
terminal = "exec.shell"
execute_code = "exec.code_with_tool_proxy"
send_message = "external.message"
cronjob = "external.message"
# uacp_oracle_query performs a NETWORK read via Honcho when enabled, so it is
# external.network_read (not read.local). Both categories are UNPROTECTED in
# core._is_protected, so the tool is still never blocked (allow_with_audit).
uacp_oracle_query = "external.network_read"

# --- Tool pattern classification (glob -> category) ------------------------
[guardian.tool_pattern_classification]
"spotify_*" = "external.network_write"
"github_*" = "external.network_write"
"browser_*" = "external.network_read"
"web_*" = "external.network_read"
"mcp_*" = "runtime.extension"

# --- Tool provenance (per-provider classification policy) ------------------
[guardian.tool_provenance.classification_by_provider]
core = "use_tool_classification"
plugin = "require_explicit_classification"
mcp = "require_explicit_classification"
inline_agent_loop = "require_control_plane_guard"
unknown = "block_pending_heartgate"

# --- Path rules ------------------------------------------------------------
[guardian.path_rules]
uacp_root_env = "UACP_ROOT"
protected_state_globs = ["state/**"]
protected_doc_globs = ["docs/**"]
protected_config_globs = ["config/**"]

[guardian.path_rules.protected_write_enforcement]
required_for = ["state.uacp", "docs.uacp", "config.uacp", "exec.shell", "exec.code_with_tool_proxy"]

# --- Self-attesting tools --------------------------------------------------
# Tools whose handlers perform their own path-bounded containment (governed
# writers, sandbox/heartgate checks, and the bwrap-backed contained shell
# itself). For these tools, Guardian treats `filesystem_guard_verified` as True
# without requiring an external bwrap attestation. The adapter reads this list
# at hook-evaluation time so authority remains in policy, not in inline code.
[guardian.self_attesting_tools]
description = "Tools whose handlers perform their own path-bounded containment (governed writers, sandbox/heartgate checks, and the bwrap-backed contained shell itself). For these tools, Guardian treats `filesystem_guard_verified` as True without requiring an external bwrap attestation. The adapter reads this list at hook-evaluation time so authority remains in policy, not in inline code.\n"
names = [
    "uacp_state_write",
    "uacp_doc_write",
    "uacp_config_write",
    "uacp_artifact_write",
    "uacp_sandbox_check",
    "uacp_heartgate_check",
    "uacp_contained_shell",
    "uacp_gate_ledger_append",
    "uacp_run_registry_update",
    "uacp_escalation_event",
]

# --- Runtime modes ---------------------------------------------------------
[guardian.runtime_modes.observe]
description = "Log decisions but allow unless non-waivable secret/private boundary is crossed."

[guardian.runtime_modes.enforce]
description = "Block protected actions that lack required authority, side-effect declaration, or Heartgate clearance."

# --- Audit -----------------------------------------------------------------
[guardian.audit]
log_path = "logs/uacp/guardian.jsonl"
required_fields = ["ts", "uacp_run_id", "uacp_phase", "tool_name", "decision", "authority_artifact", "side_effects", "runtime_commit", "uacp_commit"]

[heartgate]
enabled = true
coherence_check_on_transition = true
required_lenses = ["authority", "side_effects", "evidence", "rollback"]
# From guardian-policy.yaml heartgate block (validator needs allowed_transitions).
transition_config = "config/phase-transitions.yaml"
allowed_transitions = [
    "brainstorm->triage",
    "execute->verify",
    "plan->execute",
    "propose->plan",
    "resolve->terminal",
    "triage->propose",
    "triage->terminal",
    "verify->resolve",
]
decision_values = ["pass", "warn", "block"]

# Slice 4b T4c-1: the transition-boundary coherence-requirement POLICY. The
# structural grammar (which artifact field is demanded — heartgate_coherence —
# and the six lenses it must cover) is codified in code
# (skills/uacp-core/scripts/engines/domain/gate_rules.py) and is NOT tunable
# here. What IS operator-tunable lives in this table: the granularity threshold
# at/above which coherence evidence is mandatory, plus the phase / routing /
# domain selectors that pick which transitions the requirement applies to.
# Heartgate reads this via config.get_config(root). When this table is absent,
# the kernel falls back to these same values as a fail-closed code default
# (see gate_rules.heartgate_coherence_required_when_default).
[heartgate.coherence]
# Composite granularity at/above which transition-boundary coherence evidence
# is required. Lower = stricter (more transitions must carry coherence).
min_composite_granularity = 7
# Transitions whose from_phase is in this list require coherence evidence.
phases = ["execute", "verify"]
# TRIAGE routing outcomes that trigger the requirement.
routing_outcomes = ["full_governance"]
# Work domains that trigger the requirement when the transition declares them.
domains = ["runtime", "governance", "guardian", "heartgate", "kanban", "agent_council", "uacp"]

# Slice 4b T4c-1: write-path overlap detection at PLAN->EXECUTE. The rule
# grammar (registry path = state/run-registry.yaml, guarded transition =
# plan->execute, governed writer = uacp_run_registry_update) is codified in code
# (gate_rules.py) and is NOT tunable here. The enforcement field below is the
# one operator-facing string. Read via config.get_config(root); absent table
# falls back to the same default in code (run_registry_rule_default).
[heartgate.run_registry]
# Advisory disposition string for the overlap rule (the pre-slim production
# value). NOTE: this is currently documentation only — `_validate_run_registry_overlap`
# ALWAYS records a detected write-path overlap as a blocker regardless of this
# string; there is no block-vs-warn toggle wired yet. Editing this text does not
# change enforcement. Wiring an observe/warn mode is a future enhancement.
enforcement = "heartgate blocker on overlap with another active_run's write_paths"

# =============================================================================
# OUTPUT
# =============================================================================
# Output formatting and artifact generation.

[output]
format = "yaml_frontmatter"   # yaml_frontmatter | json | markdown
include_timestamp = true
include_run_id = true

[output.bridge]
jsonl_enabled = true
markdown_summary_enabled = true
max_prompt_size_chars = 32000

# =============================================================================
# TELEMETRY
# =============================================================================
# Optional telemetry and observability.

[telemetry]
enabled = false
level = "minimal"             # minimal | standard | verbose

# =============================================================================
# VERSION CONTROL
# =============================================================================
# Controls repository, branch, worktree, backup, and commit-boundary policy for
# UACP-owned doctrine, configs, audit artifacts, and runtime adapters.
# Collapsed from: config/version-control.yaml (kind: uacp.version_control)
# Canonical prose authority: none yet (self-documenting policy config).

[version_control]
schema_version = "0.1"

[version_control.repository]
root = "UACP_ROOT"
stable_branch = "main"
private_remote_required_for_backup = true
local_git_is_backup = false
push_policy = "external side effect; requires explicit operator confirmation"

[version_control.branch_policy]
# Pattern for active UACP run branches.
active_run_branch_pattern = "uacp/<run-id>/<topic>"
# Pattern for active UACP worktrees under the Hermes runtime root.
active_worktree_pattern = "HERMES_ROOT/worktrees/uacp/<run-id>/"
# The branch currently tracking the Hermes plugin porting effort.
# time-bound; updated per runtime-porting effort
current_runtime_porting_branch = "uacp/runtime-porting-20260513/hermes-plugin-port"

[version_control.commit_policy]
# Commit slices that carry meaningful governance signal and should be kept.
meaningful_slices = [
    "proposal_or_plan_artifacts",
    "runtime_adapter_source_import",
    "binding_config_or_sop",
    "verification_evidence",
    "resolution_or_lessons",
]
# Commit types that produce noise and should be squashed or skipped.
avoid_noisy_commits_for = [
    "high_frequency_runtime_state_churn",
    "unreviewed_temporary_probe_output",
]

[version_control.runtime_repositories.hermes_agent]
# Hermes Agent is a downstream runtime target — UACP_ROOT is the source of truth.
role = "downstream runtime target"
local_patch_policy = "single local patch commit while unavoidable"
ownership_rule = "UACP-specific plugin source should migrate to UACP_ROOT runtime-adapters after binding proof"
backup_rule = "do not use Hermes Agent commits as UACP backup"

# =============================================================================
# MEMORY
# =============================================================================
# RESERVED — Honcho/Knowledge-Bank wiring is a later slice; no kernel reader yet.
# Controls where UACP stores state, run artifacts, lessons, and long-lived memory.
# Gate-learning artifacts stay in local UACP knowledge first, then move to a
# standalone Knowledge Bank API.
# Collapsed from: config/memory-policy.yaml (kind: uacp.memory_policy)
# NOTE: learning_artifact_schema and example_artifact are omitted here — the
# schema will be relocated to docs/reference in a later phase.

[memory]
schema_version = "0.1"
status = "reserved"   # RESERVED — no kernel reader in Slice 3; Honcho wiring is Phase 5

# --- Storage boundaries -------------------------------------------------------
# What Honcho personal/peer memory may and may not hold.
[memory.storage_boundaries.honcho]
purpose = "Personal and peer memory, preferences, and conversation continuity."
allowed = [
    "operator preferences",
    "high-level architectural preferences",
    "stable facts about Mike/Norty",
]
forbidden = [
    "high-volume gate-learning artifacts",
    "active proposal state",
    "raw verification logs",
]

# Active and archived governed-run artifacts live under UACP_ROOT.
[memory.storage_boundaries.uacp_artifact_root]
path = "UACP_ROOT"
purpose = "Active and archived UACP governed-run artifacts."
allowed = [
    "proposals",
    "plans",
    "execution histories",
    "verification artifacts",
    "outputs",
    "local knowledge artifacts",
]

# Placeholder for the future shared retrieval/ranking substrate.
[memory.storage_boundaries.knowledge_bank_future]
purpose = "Shared retrieval and ranking substrate for scenarios, gates, and lessons."
status = "not implemented in Stage 1 or Stage 2"   # reserved slot; wired in a later phase
boundary = "Expose an API; do not make Cortex or Honcho sole owner."

# Cortex may consume or produce knowledge through APIs only.
[memory.storage_boundaries.cortex]
purpose = "Workflow/editorial/Discord consumer and producer of knowledge."
boundary = "May consume or produce through APIs; should not own all UACP knowledge."

# --- Local knowledge locations ------------------------------------------------
# Relative paths under UACP_ROOT for knowledge artifacts produced during runs.
[memory.local_knowledge_locations]
scenarios = "knowledge/scenarios/"       # NOT moved — config path unchanged (FIX 5)
gate_templates = "knowledge/gate-templates/"  # NOT moved — config path unchanged (FIX 5)
lessons = "lessons/"                     # -> .uacp/lessons/ (canonical key: [paths].lessons)
# NOTE: the canonical authority for the lessons path is [paths].lessons above.
#       Confirm the memory reader prepends ".uacp/" to these values
#       (i.e. "lessons/" -> .uacp/lessons/, not repo-root/lessons/).
indexes = "knowledge/indexes/"           # index home owned by Plan C [oracle] index_path; not a [paths] key

# --- Distillation / promotion thresholds (lesson -> knowledge) ----------------
# Recurrence-gated promotion knobs consumed by engines/domain/corpus.py
# (promotion_candidate). Code defaults in PROMOTION_DEFAULTS mirror these; the
# kernel falls back to those when this table is absent (fail-open: no promotion
# is non-destructive). Start conservative — design B "Open items".
[memory.distillation]
effective_bes_min = 0.85       # "consistently effective": BES cutoff
effective_eligible_min = 5     # N: eligible later runs required
chronic_recurrence_min = 3     # K: distinct recurrences -> "keeps biting us"

# =============================================================================
# AUTONOMY
# =============================================================================
# Declares operating-mode policy for autonomous UACP runs.
# Each uacp_mode (manual | semi_auto | supervised_auto | full_auto) has a
# behavior profile and escalation triggers.
# Collapsed from: config/autonomy-policy.yaml (kind: uacp.autonomy_policy)
# Canonical prose authority: docs/ (Phase 5 will add kernel readers).
#
# enforcement_status values (see [autonomy.enforcement_status_legend]):
#   stub_only_phase_4 — declared but no kernel reader yet; consumed as guidance
#   partial_phase_4   — subset has kernel readers; others documented per field
#   production        — fully consumed by kernel/adapter at runtime
#
# canonical_state_paths dropped — see live [paths]

[autonomy]
schema_version = "0.1"
# Honesty marker from Phase 4 R1 — must NOT be removed until kernel readers land.
enforcement_status = "stub_only_phase_4"

# Legend for enforcement_status values used throughout this section.
[autonomy.enforcement_status_legend]
stub_only_phase_4 = "declared in YAML; no kernel reader; consumed by humans/skills as guidance"
partial_phase_4 = "some kernel readers exist; balance documented per field"
production = "fully consumed by kernel/adapter at runtime"

# --- Advisory field convention ------------------------------------------------
# Absorbs pc_p3_gov_r1_003: YAML fields not read by code use _advisory suffix
# or live under a documentation: block. Kernels MUST NOT depend on _advisory fields.
[autonomy.advisory_field_convention]
description = "Phase 4 absorbs pc_p3_gov_r1_003 — YAML fields not read by code must use the _advisory suffix or live under a documentation: block. Kernels and adapters MUST NOT depend on _advisory fields. Operators use them as authoritative human-readable annotations."
rule = "Any YAML field name ending in '_advisory' is documentation-only. Any YAML field with no kernel reader after a Phase 4 audit should be renamed with the suffix OR have a kernel reader added."

# --- Operating modes (stub_only_phase_4 — no kernel reader yet) ---------------
# Per-mode fields (autonomous_actions, requires_operator_confirmation, on_block,
# on_warn, default_escalation_severity, run_registry_registration_required) have
# ZERO kernel readers in Phase 4. Skills consult them as guidance only.
[autonomy.modes.manual]
# Operator drives every transition. UACP is a recording and validation layer only.
enforcement_status = "stub_only_phase_4"
description = "Operator drives every transition. No autonomous decisions; UACP acts as a recording and validation layer."
autonomous_actions = []
requires_operator_confirmation = [
    "propose_to_plan",
    "plan_to_execute",
    "execute_to_verify",
    "verify_to_resolve",
    "any_council_review",
]
on_block = "pause_for_operator"
on_warn = "pause_for_operator"
default_escalation_severity = "info"

[autonomy.modes.semi_auto]
# Operator confirms phase transitions; UACP autonomously runs within-phase work.
enforcement_status = "stub_only_phase_4"
description = "Operator confirms phase transitions; UACP autonomously runs within-phase work (artifact writes, internal validations, PIV)."
autonomous_actions = [
    "within_phase_artifact_write",
    "within_phase_piv",
    "within_phase_heartgate_check",
]
requires_operator_confirmation = [
    "propose_to_plan",
    "plan_to_execute",
    "execute_to_verify",
    "verify_to_resolve",
]
on_block = "pause_for_operator"
on_warn = "continue_with_recorded_warning"
default_escalation_severity = "warn"

[autonomy.modes.supervised_auto]
# Runs the lifecycle autonomously until a registered escalation trigger fires.
# Operator is notified via state/escalations/{run_id}.jsonl.
enforcement_status = "stub_only_phase_4"
description = "UACP autonomously runs the lifecycle until a registered escalation trigger fires. Operator is notified via state/escalations/{run_id}.jsonl. Council reviews run automatically but escalate on material findings."
autonomous_actions = [
    "within_phase_artifact_write",
    "within_phase_piv",
    "within_phase_heartgate_check",
    "propose_to_plan",
    "plan_to_execute",
    "execute_to_verify",
    "verify_to_resolve",
    "agent_council_review",
]
requires_operator_confirmation = [
    "destructive_operations",
    "blast_radius_high_or_critical",
    "escalation_triggered",
]
on_block = "emit_escalation_then_pause"
on_warn = "emit_escalation_continue"
default_escalation_severity = "warn"
# Phase 4 hardening (pc_p3_gov_r1_004): supervised_auto runs MUST register in
# state/run-registry.yaml via uacp_run_registry_update after PLAN_VALIDATION and
# deregister at RESOLVE.
run_registry_registration_required = true

[autonomy.modes.full_auto]
# End-to-end autonomous. Operator engaged only on explicit escalation triggers.
enforcement_status = "stub_only_phase_4"
description = "End-to-end autonomous. Operator engaged only on explicit escalation triggers (auth, irreversible_writes, sweeping changes, council block). All other lifecycle progresses without confirmation."
autonomous_actions = [
    "all_within_phase_actions",
    "all_phase_transitions",
    "all_council_reviews",
]
requires_operator_confirmation = [
    "irreversible_writes_unbounded",
    "cross_run_writes_unbounded",
    "escalation_triggered",
]
on_block = "emit_escalation_then_pause"
on_warn = "emit_escalation_continue"
default_escalation_severity = "warn"
run_registry_registration_required = true

# --- Escalation triggers (stub_only_phase_4; prose conditions, not DSL yet) ---
# Conditions emit uacp_escalation_event records in state/escalations/{run_id}.jsonl.
# severity: block = run pauses; warn/info = run continues per mode's on_block/on_warn.
# Phase 5 must introduce a structured condition DSL and lock trigger IDs at init time.
[[autonomy.escalation_triggers.triggers]]
id = "trigger_blast_radius_high"
condition = "scope.blast_radius in {high, critical}"
severity = "block"
modes = ["semi_auto", "supervised_auto", "full_auto"]
reason = "high blast radius requires explicit operator authorization"

[[autonomy.escalation_triggers.triggers]]
id = "trigger_council_material_finding"
condition = "council_review.verdict == \"block\" or material_findings_count > 0"
severity = "block"
modes = ["supervised_auto", "full_auto"]
reason = "council surfaced material finding that requires operator review"

[[autonomy.escalation_triggers.triggers]]
id = "trigger_pending_assumption_unowned"
condition = "evidence_disposition has unowned 'pending' assumption"
severity = "block"
modes = ["supervised_auto", "full_auto"]
reason = "unowned pending assumption is a governance blocker"

[[autonomy.escalation_triggers.triggers]]
id = "trigger_irreversible_write"
condition = "scope.declared_side_effects contains kind=irreversible_write"
severity = "block"
modes = ["full_auto"]   # even full_auto requires operator for irreversible writes
reason = "irreversible_write requires operator confirmation even in full_auto"

[[autonomy.escalation_triggers.triggers]]
id = "trigger_run_registry_overlap_imminent"
condition = "registry overlap detected during plan->execute"
severity = "warn"
modes = ["supervised_auto", "full_auto"]
reason = "another active run claims overlapping write_paths"

[[autonomy.escalation_triggers.triggers]]
id = "trigger_piv_first_failure"
condition = "first PIV attempt failed"
severity = "warn"
modes = ["supervised_auto", "full_auto"]
reason = "PIV failure may indicate phase work is incomplete"

[[autonomy.escalation_triggers.triggers]]
id = "trigger_piv_second_failure"
condition = "second PIV attempt failed (unconditional block)"
severity = "block"
modes = ["semi_auto", "supervised_auto", "full_auto"]   # non-waivable across all non-manual modes
reason = "PIV second failure is non-waivable"

# --- Hermes core seam (stub_only_phase_4) ------------------------------------
# Describes the current operator-polling mechanism and the Phase 5 push target.
[autonomy.hermes_core_seam]
enforcement_status = "stub_only_phase_4"
push_notification_phase = 5   # push surface is reserved for Phase 5
current_mechanism = "Operator polls state/escalations/{run_id}.jsonl. uacp_escalation_event writes JSONL records, one per escalation, with severity + trigger + reason. Operator's polling cadence is out of scope; UACP guarantees the record exists and is readable."
phase_5_deliverable = "Push notification surface (per the proposal's Phase 5 reserved slot). Replaces operator polling with active push to a configured endpoint."

