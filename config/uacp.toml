# =============================================================================
# REVIEW
# =============================================================================
# SLIM — only operator knobs extracted here; council grammar, surfaces, profiles,
# checkpoint policy, and domain routing notes stay in config/review-routing.yaml
# (those are targeted for Slice 4).
# Collapsed from: config/review-routing.yaml (kind: uacp.review_routing_config)
# Canonical prose authority: docs/lifecycle/orchestration-model.md

[review]
# Current locked operating mode (from locked_current_operating_mode.mode).
# Status: active_until_superseded — change requires explicit canonical doc entry.
operating_mode = "manual_semi_auto"

# Minimum granularity level at which TRIAGE spawns a council before PROPOSE.
# From triage_council_trigger (phase_local_granularity >= 7 threshold).
triage_council_min_granularity = 7

# --- Intensity bands (granularity level → review intensity) ------------------
# Derived from review_intensity.*.use_when granularity annotations.
# none="1", lightweight="2-3", local_council="7-8", deep_council="9-10"
# Note: granularity 4-6 is covered by standard_uacp path (no dedicated band entry).
[review.intensity_bands]
none = "1"
lightweight = "2-3"
local_council = "7-8"
deep_council = "9-10"

# --- Escalation rules (8 condition → route mappings) -------------------------
# Extracted from escalation_rules lines ~679-697 of config/review-routing.yaml.
[[review.escalation_rules]]
condition = "checkpoint requires full_dimension local_council"
route = "local_council"

[[review.escalation_rules]]
condition = "any triage factor score is 9 or 10"
route = "deep_council"

[[review.escalation_rules]]
condition = "any non-waivable invariant is block"
route = "human_operator"

[[review.escalation_rules]]
condition = "risk_level is critical"
route = "deep_council"

[[review.escalation_rules]]
condition = "granularity_level is 9 or 10"
route = "deep_council"

[[review.escalation_rules]]
condition = "write containment cannot be proven"
route = "human_operator"

[[review.escalation_rules]]
condition = "external publication or irreversible action is requested"
route = "human_operator"

[[review.escalation_rules]]
condition = "review tool or council is unavailable"
route = "main_orchestrator"
# When unavailable, record the missing surface and apply conservative failure if risk requires it.
fallback = "record unavailable review surface and apply conservative failure if risk requires it"

# --- Follow-through routing --------------------------------------------------
[review.followthrough]
# Maximum follow-up council depth before escalating instead of recursing.
max_followup_depth = 1

# =============================================================================
# GATES — SCORING
# =============================================================================
# SLIM — triage scoring knobs only; non_waivable_invariants, artifact schemas,
# path_resolution, and generated_cluster_rules stay in config/gate-selection.yaml
# (those are targeted for Slice 4 / policy docs).
# Collapsed from: config/gate-selection.yaml (kind: uacp.gate_selection_config)
# Canonical prose authority: docs/ (governance principles).

[gates.scoring]
# Scoring method for composite granularity from triage factor scores.
# weighted_max_plus_average: max(factor*weight) + average, capped at 10.
method = "weighted_max_plus_average"

# Threshold: if any single factor is at or above this, route must be reviewed
# for full_governance or human clarification.
escalation_factor_threshold = 9

# --- Factor weights (must sum to 1.0) ----------------------------------------
# impact: material effect on systems, people, money, reputation, safety, future work
# reversibility: hard to undo, externally visible, destructive, costly to roll back
# domain_count: many distinct domains or specialist perspectives required
# runtime_count: many agents, tools, services, execution environments
# verification_difficulty: correctness hard to prove or requires indirect evidence
[gates.scoring.weights]
impact = 0.30
reversibility = 0.20
domain_count = 0.15
runtime_count = 0.15
verification_difficulty = 0.20

# --- Route bands (granularity_level → governance route) ----------------------
# direct="1", lightweight="2-3", standard_uacp="4-8", full_governance="9-10",
# block_or_clarify = authority/side-effects/critical factors unclear
[gates.scoring.route_bands]
direct = "1"
lightweight = "2-3"
standard_uacp = "4-8"      # stronger review + Kanban decomposition at 7-8
full_governance = "9-10"
block_or_clarify = "authority, side effects, or critical scoring factors are unclear"

# --- Risk weight multipliers -------------------------------------------------
# Applied when ranking evidence clusters by risk_level of the current context.
[gates.scoring.risk_weight]
low = 0.2
medium = 0.5
high = 0.8
critical = 1.0

# =============================================================================
# SCOPE — operator-tunable per-tool path tables (Slice 4a)
# =============================================================================
# These two tables are OPERATOR KNOBS: project operators may override them in
# <project>/.uacp/config.toml to reflect their governed-writer layout. Heartgate
# reads them at scope-validation time via get_config(root), NOT from
# artifact-schemas.yaml (which formerly housed them under cross_checks;
# codified in engines/domain/artifact_schema.py as of Slice 4a).
#
# tool_path_capabilities: per-tool UACP_ROOT-relative path prefixes that each
#   governed writer can reach. Shell/code execution surfaces (terminal,
#   execute_code, uacp_contained_shell) are deliberately omitted — they target
#   the workspace, not UACP_ROOT, and do not satisfy UACP-rooted write_paths.
#   Heartgate filters out metadata keys (description/purpose/notes/documentation)
#   and forbidden prefixes ("", "*", "**", "/", ".", "..", "./", "../").
#
# handler_refusals: per-tool prefixes the named tool will REFUSE at runtime
#   (even though a positive prefix-match would otherwise allow them). Heartgate
#   honors these so a scope cannot launder unreachable paths through a positive
#   prefix match (SKEP-008 remediation).

[scope.tool_path_capabilities]
uacp_state_write = ["state/"]
uacp_doc_write = ["docs/"]
uacp_config_write = ["config/"]
uacp_artifact_write = ["plans/", "proposals/", "executions/", "verification/", "resolutions/", "knowledge/", "lessons/", "brainstorm/"]
uacp_gate_ledger_append = ["state/gate-ledger/"]
# Global review R1 (TECH-G-002): governed append-only writers for run registry
# and escalation events; scope.write_paths may reference these surfaces in
# supervised_auto / full_auto modes.
uacp_run_registry_update = ["state/run-registry.yaml"]
uacp_escalation_event = ["state/escalations/"]

[scope.handler_refusals]
# uacp_state_write refuses sub-paths exclusively owned by other governed writers.
uacp_state_write = ["state/gate-ledger/", "state/run-registry.yaml", "state/escalations/"]
# The gate-ledger is governed through its own append-only channel; it is NOT
# part of the scope.write_paths footprint (any scope entry pointing here is a
# laundering attempt).
uacp_gate_ledger_append = ["state/gate-ledger/"]

