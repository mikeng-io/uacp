kind: design_index
title: UACP Artifact Content/Relation Model — Design Bundle
description: >-
  Defines the principled split between artifact content (Markdown, semantic) and artifact
  relations (YAML, deterministic). Grounds the design in a live boundary-violation bug
  (evidence_disposition unwriteable half) and a three-category as-built split where the
  council review surface barely overlaps the gate measure surface. Proposes an additive
  ratchet: YAML carries anchors + typed relations; Markdown carries all prose; field_present
  binds to an anchored MD section instead of a YAML prose field. The meaning-gate
  (class-underclaim) is retargeted to a claim-vs-witness pattern (codeflair as oracle).
  Slices 0-2 shipped in PR #70 / c7bd737 / 2026-06-29; Slices 3-5 are the forward plan.
status: building
governance: pre-governance-input
timestamp: '2026-06-30'
origin: >-
