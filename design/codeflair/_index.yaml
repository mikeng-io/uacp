# yaml-language-server: $schema=../graph-engine/schema/design-index.schema.json
#
# WHAT THIS IS:  the aggregate root of the Codeflair design bundle.
# WHAT IT DOES:  lists member nodes (reading order), declares the design's own
#                inter-node graph, and records status/governance/scope.
# WHAT IT DOES NOT DO: it does not validate the member nodes (each carries its own
#                frontmatter), does not perform cross-node closure (that is the
#                projection engine), and carries no node-level manifest data.
# VALIDATED BY:  ../graph-engine/schema/design-index.schema.json (shared schema).

kind: design_index
title: Codeflair — The Code Engine (Design Bundle)
description: >-
  Codeflair is a STANDALONE code-intelligence engine (runs on any git repo, zero
  UACP, CF-D9); embedded in UACP it serves as the 4th engine (the codespace plane,
  alongside State / Manifest / Oracle) via a thin adapter. It PRODUCES
  the code graph (SCIP per-commit + LSP live, emitting code_symbol/code_anchor),
  STORES it (SQLite, a rebuildable watermarked projection it owns), and QUERIES
  it (a deterministic Policy-D-scored expansion loop returning a read-only heatmap — blast
  radius + relations + gaps). It mechanizes the manual grep·LSP·SCIP
  comprehension chain into one shot, at scale. The build-side writes a derived
  index (not governed state); the query layer is read-only/hypothesis-only and
  never diagnoses. Closes the code_anchor producer gap; matches D44's Code engine.
status: design                      # enum: design|proposed|accepted|building|built
governance: pre-governance-input    # enum: pre-governance-input|governed|ratified
timestamp: '2026-06-24'             # ISO date (YYYY-MM-DD)
origin: session 2026-06-24 (brainstorm thread; sibling to design/graph-engine)
schema_dir: ../graph-engine/schema/  # reuses the graph-engine bundle's shared schema

members:
  - 00-overview.md
  - 01-contract.md
  - 01a-indexer.md
  - 01b-store.md
  - 02-probes.md
  - 03-expansion-loop.md
  - 04-outputs.md
  - 05-benchmark.md
  - 06-open-questions.md
  - 07-decisions.md
  - 08-council-review.md
  - 09-abstraction.md
  - 10-freshness.md
  - 11-substrate.md
  - 12-delivery.md
  - 13-multi-language.md

# Intra-bundle design graph. Mirrors each node's own `edges:` frontmatter (the node
# doc is canonical). Cross-bundle references (graph-engine D12/D29/D44) are expressed
# in prose in 00-overview, not as edges here, to keep the bundle closed-world.
edges:
  - {src: 01-contract, dst: 00-overview, rel: realizes, provenance: asserted}
  - {src: 02-probes, dst: 01-contract, rel: depends_on, provenance: asserted}
  - {src: 03-expansion-loop, dst: 02-probes, rel: consumes, provenance: asserted}
  - {src: 04-outputs, dst: 03-expansion-loop, rel: consumes, provenance: asserted}
  - {src: 05-benchmark, dst: 03-expansion-loop, rel: decides_on, provenance: asserted}
  - {src: 06-open-questions, dst: 05-benchmark, rel: relates_to, provenance: asserted}
  - {src: 01a-indexer, dst: 01b-store, rel: depends_on, provenance: asserted}
  - {src: 01b-store, dst: 00-overview, rel: realizes, provenance: asserted}
  - {src: 02-probes, dst: 01b-store, rel: consumes, provenance: asserted}
  - {src: 07-decisions, dst: 00-overview, rel: decides_on, provenance: asserted}
  - {src: 08-council-review, dst: 05-benchmark, rel: relates_to, provenance: asserted}
  - {src: 09-abstraction, dst: 00-overview, rel: realizes, provenance: asserted}
  - {src: 10-freshness, dst: 01b-store, rel: depends_on, provenance: asserted}
  - {src: 11-substrate, dst: 01b-store, rel: depends_on, provenance: asserted}
  - {src: 12-delivery, dst: 09-abstraction, rel: depends_on, provenance: asserted}
  - {src: 13-multi-language, dst: 02-probes, rel: depends_on, provenance: asserted}

# v1 scope guard (see 00-overview): a code-plane ENGINE — build (SCIP indexing) + store + a read-only
# query layer (heatmap). The build-side writes a rebuildable index (a derived cache, not governed state);
# the query layer promotes no manifest edge, diagnoses nothing, and synthesizes nothing.
scope:
  v1: [code-plane-engine, scip-indexer, code-graph-store, relation-finder-query, read-only-query]
  deferred: [edge-promotion, auto-trigger, diagnosis, synthesis]
