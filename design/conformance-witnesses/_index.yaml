kind: design_index
title: Conformance Architecture — Witness Model & Scoreboard
description: >-
  Defines UACP as a conformance architecture: every gate decides "does layer N conform to
  layer N-1", never "is N correct" (correctness = conformance-to-intent, an asymptote with no
  independent witness). Progress is a one-directional ratchet converting layers from
  self-attested to independently witnessed (LLM-independent or deterministic). Node 00 owns
  the model and the witness independence classes; node 01 owns the scoreboard row schema and
  the seeded as-built inventory (live state lives on the program board's Scoreboard view, not
  here). Names Scope/boundedness as the next conversion (epic #80, issues #82-#86); the seam
  decision node arrives with issue #84.
status: design
governance: pre-governance-input
timestamp: '2026-07-03'
origin: >-
  epic #80 (Conformance Architecture) + issue #81 (witness scoreboard model); authored
  2026-07-03 outside a governed run (lifecycle unavailable), grounded in the as-built engines
  sweep and the codeflair design bundle (CF-D9).
schema_dir: ../graph-engine/schema/

