# yaml-language-server: $schema=./schema/design-index.schema.json
#
# WHAT THIS IS:  the aggregate root of the graph-engine design bundle.
# WHAT IT DOES:  lists member nodes (reading order), declares the design's own
#                inter-node graph, and records status/governance/scope.
# WHAT IT DOES NOT DO: it does not validate the member nodes (each .md/.json has
#                its own schema), does not perform cross-node closure (that is the
#                projection engine), and carries no node-level manifest data.
# VALIDATED BY:  schema/design-index.schema.json (closed-world; enums enforced).

kind: design_index
title: UACP Manifest Graph Engine — Design Bundle
description: >-
  Make manifest cross-phase relations deterministic via a serialize/deserialize
  unified graph engine. Manifests are wiki nodes; edges are typed, provenance-tagged
  keys serialized at write-time; traversal is deterministic FK-walk, not semantic search.
status: design                      # enum: design|proposed|accepted|building|built
governance: pre-governance-input    # enum: pre-governance-input|governed|ratified
timestamp: '2026-06-19'             # ISO date (YYYY-MM-DD)
origin: session 2026-06-19 (design-only thread)
schema_dir: schema/                 # JSON-Schemas this bundle's YAML validates against

# Numbered to mirror the semantic->structural gradient the design itself describes:
# 00-02 = the "why" (high-semantic head), 10-16 = the contracts (structural body), 20 = roadmap.
members:
  - 00-overview.md
  - 01-context-intent.md
  - 02-decisions.md
  - 10-edge-schema.md
  - 11-node-taxonomy.md
  - 12-phase-granularity.md
  - 13-writer-contract.md
  - 14-projection-engine.md
  - 15-constraints-metrics.md
  - 16-schema-registry.md
  - 16a-control-plane-schema.md
  - 17-codeplane-substrate-bakeoff.md
  - 18-glossary.md
  - 19-storage-summary.md
  - 19a-operational-flows.md
  - 20-slices-readiness.md
  - 21-council-review.md
  - 22-context-loop.md
  - 23-final-review.md
  - 24-asbuilt-manifest-taxonomy.md
  - 25-schema-source-spec.md
  - 26-nomenclature.md
  - 27-directory-taxonomy.md
  - 28-component-registry.md
  - 29-ddd-ca-reference.md
  - 30-current-state-decomposition.md
  - 31-target-module-graph.md
  - 32-code-naming-conventions.md

# DERIVED (D21): regenerated by uacp-fmt from each node's `edges:` frontmatter — do NOT hand-edit.
# The node doc is canonical: the src node declares its outbound edge in its own frontmatter; this block
# is a collected mirror (src = the node that owns each `edges:` entry).
# rel enum: motivated_by|decides_on|realizes|depends_on|consumes|extends|sequences. provenance enum: derived|parsed|asserted|inferred.
edges:
  - {src: 00-overview, dst: 01-context-intent, rel: motivated_by, provenance: asserted}
  - {src: 02-decisions, dst: 01-context-intent, rel: decides_on, provenance: asserted}
  - {src: 10-edge-schema, dst: 02-decisions, rel: realizes, provenance: asserted}
  - {src: 11-node-taxonomy, dst: 10-edge-schema, rel: depends_on, provenance: derived}
  - {src: 12-phase-granularity, dst: 11-node-taxonomy, rel: depends_on, provenance: derived}
  - {src: 13-writer-contract, dst: 11-node-taxonomy, rel: depends_on, provenance: derived}
  - {src: 14-projection-engine, dst: 10-edge-schema, rel: consumes, provenance: derived}
  - {src: 15-constraints-metrics, dst: 11-node-taxonomy, rel: extends, provenance: derived}
  - {src: 16-schema-registry, dst: 10-edge-schema, rel: realizes, provenance: asserted}
  - {src: 16a-control-plane-schema, dst: 16-schema-registry, rel: extends, provenance: asserted}
  - {src: 17-codeplane-substrate-bakeoff, dst: 02-decisions, rel: realizes, provenance: derived}
  - {src: 19-storage-summary, dst: 14-projection-engine, rel: depends_on, provenance: derived}
  - {src: 19a-operational-flows, dst: 14-projection-engine, rel: depends_on, provenance: derived}
  - {src: 20-slices-readiness, dst: 02-decisions, rel: sequences, provenance: asserted}
  - {src: 21-council-review, dst: 02-decisions, rel: decides_on, provenance: asserted}
  - {src: 22-context-loop, dst: 11-node-taxonomy, rel: depends_on, provenance: derived}

# v1 scope guard (see 00-overview): lookup, not synthesis; governance+knowledge planes, code-plane deferred.
scope:
  v1: [relation-plane, knowledge-plane, lookup-only]
  deferred: [code-plane, synthesis]
