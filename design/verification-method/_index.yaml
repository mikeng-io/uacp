# yaml-language-server: $schema=../graph-engine/schema/design-index.schema.json
#
# WHAT THIS IS:  the aggregate root of the verification-method design bundle.
# WHAT IT DOES:  lists member nodes (reading order), declares the design's own
#                inter-node graph, and records status/governance/scope.
# WHAT IT DOES NOT DO: it does not validate the member nodes, performs no cross-node
#                closure, and carries no node-level manifest data.
# VALIDATED BY:  ../graph-engine/schema/design-index.schema.json (shared design_index
#                shape — this bundle EXTENDS the graph-engine initiative's thesis).

kind: design_index
title: UACP Verification Method — Design Bundle
description: >-
  Make verification + audit systematic across the UACP lifecycle as the VERIFICATION
  INSTANTIATION of CMS (comprehend -> measure -> serialize; canonical bundle
  ../comprehend-measure-serialize/, referenced not re-derived) — the generative gate
  looped to convergence, fail-closed, recorded in a revisable investigation ledger,
  phase-parameterized. Grounded in the Trustless #503 autopsy (7 review rounds, bugs
  survived) and the T9 verify-as-investigation handoff. Re-grounded 2026-06-24 against
  the merged CMS bundle + the as-built engines (run_all_engines, manifest projection,
  goal-driven convergence).
status: design                      # enum: design|proposed|accepted|building|built
governance: pre-governance-input    # enum: pre-governance-input|governed|ratified
timestamp: '2026-06-24'             # ISO date (YYYY-MM-DD)
origin: session 2026-06-20/21 (verification-method thread; lessons from Trustless #503 + T9, NOT Trustless work)
schema_dir: ../graph-engine/schema/ # reuses the graph-engine bundle's design_index schema

# Numbered by NATURE, not phase (UACP is in active development — no "Phase 4.5" naming):
#   00-01 = the spine + its evidence;  10-14 = the two layers (dynamic gate / fixed harness)
#   + their supports;  20 = the build/improvise/update roadmap.
members:
  - 00-the-primitive.md          # ROOT: verification as CMS (references ../comprehend-measure-serialize/, not re-derived)
  - 01-evidence-503.md           # the failure taxonomy this is built to prevent
  - 10-generative-gate.md        # LAYER 2 (dynamic): the gate whose actions are generated from content
  - 11-harness.md                # LAYER 1 (fixed activity): run / reconcile / loop / escalate
  - 12-phase-profiles.md         # per-phase instantiation (measure-mode + authority; EXECUTE excluded from generation)
  - 13-investigation-ledger.md   # the revisable, phase-rooted serialized trail
  - 14-council-method.md         # the council as generative-gate panel — narrowed to default-to-refute + serialize-to-ledger
  - 15-coverage-serialization.md # D43 as-built (keyed scope_items + derives_from already enforced) + the package-selection coverage residual
  - 20-build-improvise-update.md # what to BUILD vs IMPROVISE (existing engines) vs UPDATE

# DERIVED: mirror of each node's `edges:` frontmatter (src = the node that owns the edge).
# rel enum: motivated_by|decides_on|realizes|depends_on|consumes|extends|sequences. provenance enum: derived|parsed|asserted|inferred.
edges:
  - {src: 00-the-primitive, dst: 01-evidence-503, rel: motivated_by, provenance: asserted}
  - {src: 10-generative-gate, dst: 00-the-primitive, rel: realizes, provenance: asserted}
  - {src: 11-harness, dst: 00-the-primitive, rel: realizes, provenance: asserted}
  - {src: 12-phase-profiles, dst: 00-the-primitive, rel: depends_on, provenance: derived}
  - {src: 13-investigation-ledger, dst: 00-the-primitive, rel: depends_on, provenance: derived}
  - {src: 14-council-method, dst: 10-generative-gate, rel: depends_on, provenance: derived}
  - {src: 14-council-method, dst: 13-investigation-ledger, rel: depends_on, provenance: derived}
  - {src: 15-coverage-serialization, dst: 01-evidence-503, rel: motivated_by, provenance: asserted}
  - {src: 15-coverage-serialization, dst: 12-phase-profiles, rel: depends_on, provenance: derived}
  - {src: 20-build-improvise-update, dst: 00-the-primitive, rel: sequences, provenance: asserted}
