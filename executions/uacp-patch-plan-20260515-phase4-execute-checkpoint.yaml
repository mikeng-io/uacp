kind: uacp.execution_checkpoint
checkpoint_id: uacp-patch-plan-20260515-phase4-execute-checkpoint
run_id: uacp-patch-plan-20260515
phase: execute
sub_phase: phase_4
title: Phase 4 — autonomous-mode framework stub complete
purpose: |
  Records the close of Phase 4 of the UACP patch plan. Phase 4 delivered
  the stub framework for autonomous operating modes: a `uacp_mode` enum
  field in state schema (Item 4.1), the `config/autonomy-policy.yaml`
  authority surface (Item 4.2), mode_behavior stubs in all 7 SKILL.md
  files (Item 4.3), and the `uacp_escalation_event` tool stub (Item 4.4)
  with append-only `state/escalations/{run_id}.jsonl` ledger. Phase 4
  is HONESTLY framed as a stub — every decorative block carries an
  `enforcement_status: stub_only_phase_4` tag; the drift YAML uses
  honest classification keys; Phase 5 lands the kernel readers.

deliverables:
  item_4_1_uacp_mode:
    file: config/state.yaml
    field: current_pointer_schema.fields.uacp_mode
    enum_values: [manual, semi_auto, supervised_auto, full_auto]
    default: manual
    enforcement_status: stub_only_phase_4
    note: Phase 5 adds the first kernel reader.

  item_4_1_escalations_block:
    file: config/state.yaml
    block: escalations
    record_schema_required_fields: [run_id, phase, mode, trigger, severity, reason, authority_artifact, ts]
    filename_template: state/escalations/{run_id}.jsonl

  item_4_2_autonomy_policy:
    file: config/autonomy-policy.yaml
    enforcement_status: stub_only_phase_4
    blocks:
      - modes (4 modes; per-mode autonomous_actions, requires_operator_confirmation, on_block, on_warn)
      - escalation_triggers (7 declared triggers with prose conditions)
      - canonical_state_paths (declared single source of truth; Phase 5 adds reader helper)
      - advisory_field_convention (introduces _advisory suffix; retroactive audit DEFERRED_TO_PHASE_5)
      - hermes_core_seam (status: stub_only_phase_4; push notification is Phase 5)

  item_4_3_skill_mode_behavior_stubs:
    files:
      - skills/devops/uacp/uacp-triage/SKILL.md
      - skills/devops/uacp/uacp-propose/SKILL.md
      - skills/devops/uacp/uacp-plan/SKILL.md
      - skills/devops/uacp/uacp-execute/SKILL.md
      - skills/devops/uacp/uacp-verify/SKILL.md
      - skills/devops/uacp/uacp-resolve/SKILL.md
      - skills/devops/uacp/uacp-state/SKILL.md
    section: "mode_behavior (Phase 4.3 stub)"
    note: per-mode behavior tables consistent across 7 skills; trigger-ID coverage propagated to Phase 5.

  item_4_4_uacp_escalation_event:
    handler: runtime-adapters/hermes/plugins/uacp_guardian/__init__.py#_handle_uacp_escalation_event
    enforcement:
      - UACP context fields required (pc_p3_tech_r1_001)
      - mode REQUIRED (not silently empty) — TECH-P4-002 R1 fix
      - severity enum {info, warn, block}
      - mode enum {manual, semi_auto, supervised_auto, full_auto}
      - unsafe run_id rejected via _is_safe_run_id
      - escalations-dir containment check (TECH-P4-005 R1 fix)
      - embedded-newline refusal (TECH-P4-009 R1 fix)
      - PIPE_BUF (3584-byte) atomicity bound
    layer_a_category: state.uacp
    layer_b_admissible: all phases (triage, propose, plan, execute, verify, resolve)
    self_attesting: true

doc_inventory_updates:
  - docs/index.md — added state/escalations/, config/autonomy-policy.yaml rows
  - docs/skill-enforcement-spec.md — added uacp_escalation_event to all 7 skill Allowed-tools lines + 2 Mechanical-enforcement table rows
  - docs/lifecycle-trace-table.md — added "Escalation events (Phase 4.4 stub)" section

