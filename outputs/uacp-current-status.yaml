schema_version: '0.1'
kind: uacp.status.current
status: runtime_prototype
summary: >-
  UACP is an early runtime prototype with Hermes user-plugin live bindings active
  for thread_title_sync and uacp_guardian. Phase 4B is resolved: the governed
  contained shell seam exists and is live-verified; production hardening remains
  incomplete.
authority:
  registry: docs/index.md
  runtime_design: docs/runtime-enforcement.md
  latest_resolution: verification/phase4b-resolve-20260514.yaml
repositories:
  uacp:
    role: governance source of truth, durable artifacts, state, docs, config
    remote: git@github.com:nortrix-labs/uacp.git
    push_status: not_pushed_this_step
  hermes_agent:
    role: runtime host; duplicate UACP plugin source copies absent from local patch set
implemented:
  governance_foundation:
    - Artifact root, canonical docs, config, state layer, and git binding exist.
    - Lifecycle skill family exists for triage, propose, plan, execute, verify, resolve, and state.
    - Hermes Kanban binding exists for durable task graph traceability.
  live_user_plugin_bindings:
    - thread_title_sync is live-bound from UACP runtime-adapters into HERMES_ROOT/plugins and loads as an enabled user plugin.
    - uacp_guardian is live-bound from UACP runtime-adapters into HERMES_ROOT/plugins and loads as an enabled user plugin.
    - Live loader behavior was verified for both bindings.
  governed_canonical_writers:
    - uacp_doc_write writes canonical Markdown docs under docs/ with full UACP context and hardened path containment.
    - uacp_config_write writes canonical YAML config under config/ with full UACP context, hardened path containment, and YAML parse validation.
    - uacp_artifact_write writes non-state artifacts under governed artifact paths.
    - uacp_state_write writes UACP runtime state through the governed state mutation boundary.
  heartgate_transition_check_tool:
    - uacp_heartgate_check validates UACP phase-transition artifacts through Heartgate.
    - Phase 4B verify-to-resolve passed Heartgate with accepted warnings and no blockers.
  runtime_trust_boundary:
    - UACP governs declared runtime execution and evidence; it does not claim to prevent arbitrary manual or host-side edits outside that runtime boundary.
    - Out-of-band changes are treated as untrusted until revalidated through the relevant verification path.
    - Containment is a host/runtime property that UACP can require and Guardian can verify; it is not a permission that UACP self-declares.
  phase4_sandbox_check_evidence:
    - uacp_sandbox_check is implemented as a containment evidence tool in the UACP-owned Hermes Guardian adapter.
    - The live proof confirms bwrap read-only-root evidence can block writes to UACP_ROOT while keeping the sandbox workspace writable.
    - The standard Hermes terminal/execute_code paths remain fail-closed.
  phase4b_contained_shell_seam:
    - status: resolved_completed_with_hardening_followups
    - uacp_contained_shell is implemented as the governed contained-shell execution seam.
    - Live proof confirms the contained shell executes inside bwrap, rejects stale attestation reuse, and blocks write attempts to UACP_ROOT.
    - Standard terminal/execute_code remain blocked without containment evidence.
    - Resolution artifact: verification/phase4b-resolve-20260514.yaml
not_yet_done:
  hardening:
    - Reduce output capture pressure for uacp_contained_shell before heavy use.
    - Document and narrow the host read exposure threat model if contained commands may be untrusted.
    - Add optional persistence or cleanup for attestation state if restart continuity becomes necessary.
    - Add stronger boundaries for non-cooperative plugins or direct lower-level mutation paths.
    - Keep non-cooperative or out-of-band host/user mutation outside UACP's claimed enforcement boundary; require revalidation before trusting affected artifacts.
  lifecycle_wiring:
    - Ensure UACP lifecycle skills create Kanban tasks with required uacp_context.
  future_phases:
    - Phase 5 Kanban guard: mandatory evidence and Guardian metadata on task completion.
    - Phase 6 Agent Council operationalization.
    - Phase 7 runtime adapter portability.
repository_hygiene:
  hermes_agent_duplicate_plugin_sources: absent
  temporary_uacp_symlink_probe_runtime_adapter_source: absent
  generated_probe_cache: scripts/__pycache__/live_guardian_probe.cpython-313.pyc is present but non-authoritative
  push_policy: Do not push repository changes without explicit operator confirmation.
live_proof_tests_required:
  - Direct write to UACP state/ is blocked unless routed through the guarded state mutation path.
  - Plugin-dispatched protected write is blocked or audited by Guardian.
  - UACP-bound shell/code execution remains blocked unless verified containment exists.
  - uacp_state_write succeeds only with complete authority, workspace, run id, phase, policy version, and declared side effects.
  - uacp_doc_write, uacp_config_write, uacp_artifact_write, uacp_state_write, uacp_heartgate_check, uacp_sandbox_check, and uacp_contained_shell remain exposed after runtime/tool schema reload.
  - Manual/out-of-band edits are not claimed as preventable by UACP; affected artifacts must be revalidated before use.
backup_guidance:
  recommended_scope: full HERMES_ROOT snapshot before broader live runtime activation
  rationale:
    - UACP now spans governance artifacts, Hermes runtime plugin adapters, lifecycle skills, state, plugin config, and runtime settings.
    - Backing up only UACP_ROOT or hermes-agent can miss cross-layer state needed for rollback.
conclusion: Phase 4B is resolved. UACP has a live governed contained shell seam with accepted hardening follow-ups; no push, unbind, delete, or security weakening was performed during closure.
