- id: kanban-guardian-evidence
  severity: medium
  summary: UACP-bound Kanban worker completion needs reliable Guardian evidence propagation and VERIFY checks.
- id: runtime-adapter-contract
  severity: medium
  summary: Hermes is the reference adapter, but the cross-runtime adapter contract is not yet stabilized.
- id: out-of-band-revalidation
  severity: medium
  summary: Manual or host-side edits are outside UACP's enforcement boundary and must be revalidated before affected artifacts are trusted.
