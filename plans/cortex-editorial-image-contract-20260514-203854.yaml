design_decisions:
  artifact_graph:
    root_manifest: manifest.json
    image_plan: images/image_plan.json
    registry: images/registry.json
    per_image_metadata: images/<role_or_scope>/<image_id>.metadata.json
    prompt_file: images/<role_or_scope>/<image_id>.prompt.md
  image_plan_schema:
    location: images/image_plan.json
    schema_version: 1
    required_top_level:
      - schema_version
      - workflow_id
      - article
      - global_style_boundary
      - article_visual_theme
      - placements
      - budget_policy
      - provider_tier_recommendations
    placement_rules:
      - cover placement is mandatory and selected
      - inline placements are recommendations only unless config enables generation
      - max inline counts depend on slot and default to conservative zero or one values
  registry_schema:
    version: 2
    compatibility: v1 payloads remain readable and get safe defaults for missing v2 fields
    required_new_fields:
      - image_plan_path
      - placement_id
      - model_family
      - prompt_template_id
      - billing
      - generation
      - cost_summary
  prompt_model_strategy:
    layers:
      - global_style_boundary
      - article_visual_theme
      - placement_role
      - provider_model_constraints
    family_shapes:
      flux: compact subject-first prompt with strict word budget and positive guardrails
      imagen: natural-language layered prompt with composition, lighting, palette, and guardrails
    fallback_policy: fail closed or derive article-grounded anchors; never raw-thesis-only generic fallback
  pricing_strategy:
    config_source: config/image_models.yaml
    unknown_pricing: null cost plus unknown_pricing_count, never fake zero
    estimated_vs_actual: estimated cost required when price known; actual_cost_usd nullable/backfilled only
    rollup_source: checkpointed image metadata and registry activity returns, not workflow filesystem reads
  side_effect_strategy:
    image_plan_export: local artifact export, allowed in test_full as inspection contract
    prompt_rendering: local deterministic or activity-bound; no external paid call
    cover_generation: paid side effect, disabled unless side-effect policy permits
    registry_export: local artifact export after image bytes or plan metadata exists
    cost_rollup_persistence: local artifact metadata only in v1; DB table deferred unless EXECUTE proves unavoidable need
work_packages:
  - id: WP0-ground-truth-and-red-tests
    phase: EXECUTE
    purpose: Establish failing or targeted tests before implementation.
    tasks:
      - Add schema/topology tests for image_plan and registry v2.
      - Add prompt-family tests for flux and imagen prompt shapes.
      - Add cost-pricing tests for known, unknown, and rollup behavior.
      - Add dry-run tests proving no Replicate generation when disabled.
    acceptance:
      - Tests fail against current code for missing image plan, registry v2, prompt, or cost behavior.
  - id: WP1-schema-and-config
    depends_on: [WP0-ground-truth-and-red-tests]
    tasks:
      - Create _image_contracts.py with schema helpers.
      - Add config/image_models.yaml with provider, model-family, tier, pricing, and template metadata.
      - Define brand boundary object derived from mikeng.io Precision Dark vocabulary without forcing article-specific style uniformity.
    acceptance:
      - Unit tests pass for schema defaults, validation, and unknown pricing null behavior.
  - id: WP2-image-plan-activity
    depends_on: [WP1-schema-and-config]
    tasks:
      - Implement editorial_image_plan.py activity to create validated plan payload.
      - Add deterministic section placement scoring helper with cover mandatory and inline disabled by default.
      - Write images/image_plan.json through an activity-owned filesystem boundary.
    acceptance:
      - image_plan.json contains global boundary, article theme, placements, and provider tier recommendations.
      - No Replicate calls occur.
  - id: WP3-prompt-renderer
    depends_on: [WP1-schema-and-config, WP2-image-plan-activity]
    tasks:
      - Implement editorial_image_prompts.py renderer.
      - Render prompt from global boundary, article theme, placement, and provider/model family.
      - Capture prompt_template_id, template version, prompt_sha256, and guardrail flags.
    acceptance:
      - Flux prompts are compact, subject-first, and within configured word budget.
      - Imagen prompts are natural-language layered.
      - All prompts include no text, no watermark, and default no-face guardrails unless explicitly overridden by plan constraints.
  - id: WP4-registry-v2-and-cost
    depends_on: [WP1-schema-and-config, WP3-prompt-renderer]
    tasks:
      - Extend editorial_image_registry.py for registry v2 while accepting v1-style payloads.
      - Add billing and generation metadata fields and cost_summary rollup.
      - Preserve sha256 for image bytes and add prompt or metadata hash where practical.
    acceptance:
      - Registry v2 entries record placement, template, provider/model family, billing, generation, paths, and hashes.
      - Unknown pricing yields null estimated cost and increments unknown count.
  - id: WP5-workflow-wiring-cover-only
    depends_on: [WP2-image-plan-activity, WP3-prompt-renderer, WP4-registry-v2-and-cost]
    tasks:
      - Insert image_plan into canonical pass order at post-formatted/pre-image-brief boundary or other justified location.
      - Bump checkpoint signature/version fields as needed.
      - Thread plan-derived prompt/config into cover generation.
      - Ensure cover generation remains side-effect gated and inline generation remains off.
      - Return image plan, registry, and cost metadata in workflow result fields.
    acceptance:
      - Workflow contract tests pass for dry-run and test_full behavior.
      - Existing cover-only path remains compatible.
  - id: WP6-docs-and-operations
    depends_on: [WP5-workflow-wiring-cover-only]
    tasks:
      - Update docs/07-EDITORIAL-PIPELINE.md pass catalog and artifact contract.
      - Update artifacts/README.md topology.
      - Update docs/11-OPERATIONS.md cost-query guidance for image cost estimates.
    acceptance:
      - Docs match implemented behavior and explicitly state non-actions and live side-effect constraints.
  - id: WP7-verification-and-council
    depends_on: [WP0-ground-truth-and-red-tests, WP1-schema-and-config, WP2-image-plan-activity, WP3-prompt-renderer, WP4-registry-v2-and-cost, WP5-workflow-wiring-cover-only, WP6-docs-and-operations]
    tasks:
      - Run targeted tests and full suite.
      - Inspect git diff for unrelated files.
      - Run VERIFY Agent Council on implementation artifacts.
      - Record verification artifact.
    acceptance:
      - Full test suite passes.
      - Council blockers resolved or explicitly carried with owner and residual risk.
