phase: plan
kind: uacp.plan
plan_id: nora-identity-registry-plugin-20260518-203428-plan
run_id: nora-identity-registry-plugin-20260518-203428
proposal_artifact: proposals/nora-identity-registry-plugin-20260518-203428-proposal.yaml
gate_selection_artifact: proposals/nora-identity-registry-plugin-20260518-203428-gate-selection.yaml
objective: "Implement Nora inbound identity safe-card injection through a profile-local Hermes plugin."
work_breakdown:
  - id: wp1_inventory
    description: "Inspect Nora profile plugin discovery/config state and existing identity registry engine."
    phase: execute
    dependencies: []
    side_effects: "read-only"
  - id: wp2_plugin_files
    description: "Create profile-local plugin.yaml and __init__.py under Nora profile plugins/identity_registry."
    phase: execute
    dependencies: [wp1_inventory]
    side_effects: "write plugin files only"
  - id: wp3_tests
    description: "Run synthetic plugin import/fake-event tests, registry lookup checks, and runtime leak scan."
    phase: execute
    dependencies: [wp2_plugin_files]
    side_effects: "read-only test execution"
  - id: wp4_focused_audit
    description: "Run focused privacy/runtime audit council against plugin files, registry runtime, and test evidence."
    phase: verify
    dependencies: [wp3_tests]
    side_effects: "review artifacts only"
  - id: wp5_enablement_decision
    description: "If tests/audit pass, report restart boundary to Mike. Do not restart without approval."
    phase: verify
    dependencies: [wp4_focused_audit]
    side_effects: "none unless operator approves restart"
dependencies:
  hard:
    - "Existing identity_registry.py importable and lookup() works."
    - "Nora profile path exists."
    - "Hermes plugin kind standalone recognized."
  soft:
    - "If profile-local plugin discovery fails, PLAN allows switching to symlink under profile HERMES_HOME/plugins only after recording checkpoint."
authority_and_side_effects:
  allowed_write_paths:
    - "/home/norty/.hermes/profiles/nora/plugins/identity_registry/plugin.yaml"
    - "/home/norty/.hermes/profiles/nora/plugins/identity_registry/__init__.py"
    - "/home/norty/.hermes/profiles/nora/plugins/identity_registry/tests/"
  allowed_config_paths:
    - "/home/norty/.hermes/profiles/nora/config.yaml"
  config_write_condition: "Only add identity-registry to plugins.enabled if deterministic tests pass; gateway restart still requires approval."
  forbidden:
    - "No edits to identity_registry.source.yaml except explicit separate approval."
    - "No Hermes core edits unless EXECUTE checkpoint proves plugin seam insufficient."
    - "No live outbound dispatch."
    - "No gateway restart without Mike's approval."
tool_runtime_selection:
  main_orchestrator: "Norty main session"
  implementation_surface: "file/write/patch + terminal tests in local environment during EXECUTE"
  review_surface: "delegate_task focused audit after implementation"
  external_agent: "not selected unless plugin seam/core ambiguity arises"
artifact_write_surfaces:
  uacp_lifecycle: "uacp_artifact_write and uacp_gate_ledger_append"
  runtime_plugin: "normal file workflow under Nora profile in EXECUTE"
verification_strategy:
  deterministic:
    - "Compile registry and verify expected lookup count/card count."
    - "Known sender lookup returns Mike/Gabriel/Tommy cards as expected without raw private fields."
    - "Unknown sender causes no event.channel_prompt mutation."
    - "Known fake event appends compact Identity Registry Context to event.channel_prompt."
    - "Leak scan checks runtime JSON for private phone/email/operator_only fields."
    - "Plugin imports under HERMES_HOME=/home/norty/.hermes/profiles/nora."
  council:
    selected: true
    timing: "post-implementation before restart"
    roles:
      - privacy_boundary_reviewer
      - hermes_runtime_plugin_reviewer
      - identity_policy_coherence_reviewer
rollback_recovery:
  primary: "Disable/remove identity-registry from Nora plugins.enabled and/or remove plugin directory; restart only after approval."
  no_restart_state: "Before gateway restart, rollback is file/config revert only."
transition_readiness:
  plan_to_execute_requires:
    - "Plan and scope artifacts exist."
    - "PLAN_VALIDATION pass ledger entry exists."
    - "Human boundary for restart recorded."
