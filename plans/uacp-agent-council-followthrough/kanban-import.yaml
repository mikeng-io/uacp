kind: uacp.kanban_import_manifest
schema_version: '0.1'
board_slug: uacp
root_task:
  id: ROOT
  title: UACP Agent-Council Integration — Runtime/Validator Follow-through
  authority_artifacts:
  - plans/uacp-agent-council-followthrough/00-index.md
  - plans/uacp-skills-and-validator-alignment-phased-plan.md
  - .outputs/agent-skills-integration-current-handoff.md
  - verification/uacp-skills-validator-alignment-verify.yaml
  description: Durable coordination graph for remaining UACP Agent-Council runtime/validator
    follow-through.
tasks:
- id: T1
  slug: validator-hardening
  title: Harden lightweight UACP artifact validator
  parents:
  - ROOT
  allowed_files:
  - scripts/validate_uacp_artifacts.py
  - verification/fixtures/**
  - plans/uacp-agent-council-followthrough/**
  deliverable: validator improvements and fixtures
  verification:
  - run validator against pass/fail fixtures
  - no RESULT BLOCK for current valid artifacts
- id: T2
  slug: guardian-heartgate-validator-wiring-design
  title: Design Guardian/Heartgate validator wiring
  parents:
  - T1
  allowed_files:
  - plans/**
  - docs/runtime-enforcement.md
  - config/guardian-policy.yaml
  deliverable: design artifact naming integration point and fail mode
  verification:
  - design reviewed
  - no production enforcement claim without proof
- id: T3
  slug: agent-council-kanban-task-templates
  title: Create Agent Council Kanban task templates
  parents:
  - ROOT
  allowed_files:
  - plans/**
  - templates/**
  - docs/orchestration-model.md
  deliverable: task templates for execute/verify/audit council modes
  verification:
  - templates include mode tier roles dispatch surfaces authority side effects expected
    artifact
- id: T4
  slug: runtime-tool-evidence-adapter-manifest
  title: Define runtime/tool/evidence adapter manifest
  parents:
  - ROOT
  allowed_files:
  - config/**
  - docs/orchestration-model.md
  - plans/**
  deliverable: adapter manifest design/config seed
  verification:
  - examples classify Hermes Claude Code Codex browser computer-use Firecrawl Tavily
    SearXNG
- id: T5
  slug: evidence-domain-registry-selector
  title: Design or implement Evidence-Domain Registry selector
  parents:
  - T4
  allowed_files:
  - config/evidence-clusters.yaml
  - scripts/**
  - plans/**
  - verification/**
  deliverable: selector design or implementation with examples
  verification:
  - implementation_status not changed to active without tests and verification
- id: T6
  slug: downstream-agent-skills-extraction-plan
  title: Plan downstream agent-skills extraction from UACP
  parents:
  - T1
  - T2
  - T3
  - T4
  - T5
  allowed_files:
  - plans/**
  - HERMES_ROOT/skills/**
  deliverable: extraction map and drift checks
  verification:
  - UACP remains canonical authority
- id: T7
  slug: final-council-review-and-resolve
  title: Run final council review and RESOLVE
  parents:
  - T1
  - T2
  - T3
  - T4
  - T5
  - T6
  allowed_files:
  - verification/**
  - .outputs/**
  - knowledge/**
  - plans/**
  deliverable: final council report and resolve artifact
  verification:
  - no unresolved HIGH/CRITICAL without accepted risk or replan
- id: T8
  slug: execution-profile-persona-matrix
  title: Design UACP execution profile/persona matrix
  parents:
  - T4
  allowed_files:
  - plans/uacp-agent-council-followthrough/**
  - docs/orchestration-model.md
  - config/review-routing.yaml
  deliverable: profile/role matrix and decision on actual Hermes profile creation
  verification:
  - roles mapped to profile requirements
  - profile instructions stated downstream of UACP canonical docs
  - model/reasoning/tool/workdir dimensions covered
