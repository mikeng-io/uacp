kind: uacp.plan
plan_id: uacp-bootstrap-stage-3-state-binding
run_id: uacp-bootstrap-stage-3-state-binding
objective: >
  Make the state/version-control checkpoint coherent enough to review without
  claiming evidence that does not exist.
status: planned
steps:
  - step: "Create a proposal artifact for the state-binding checkpoint."
    status: done
  - step: "Create a bounded plan artifact that names the checkpoint scope and exclusions."
    status: done
  - step: "Create a blocked transition artifact that reflects the council findings."
    status: in_progress
  - step: "Create a council synthesis artifact that records the local review."
    status: in_progress
  - step: "Create a verification artifact that records the checkpoint as blocked."
    status: in_progress
  - step: "Patch the registry, alignment, and state schema to point to the new artifacts."
    status: in_progress
dependencies:
  - "docs/index.md"
  - "docs/lifecycle-reference.md"
  - "config/state.yaml"
checkpoint_policy:
  closure_condition: "Do not close this checkpoint until the manifest and state pointer match the actual artifact set."
  deferred_until_later:
    - "git repository binding"
    - "lifecycle skills"
    - "Kanban execution binding"
