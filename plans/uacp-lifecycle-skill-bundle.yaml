kind: uacp.plan
plan_id: uacp-lifecycle-skill-bundle
run_id: uacp-lifecycle-skill-bundle
objective: >
  Define the exact lifecycle skill files and their canonical contents so they
  can be written under /home/norty/.hermes/skills/devops/uacp/ immediately
  after explicit approval.
status: blocked
blocker: "External skill-tree writes require explicit approval."
external_target_root: "/home/norty/.hermes/skills/devops/uacp/"
files:
  - path: "SKILL.md"
    role: "canonical lifecycle skill registry"
    purpose: "Describe the UACP lifecycle skill family, read-first order, and creation rules."
  - path: "uacp-state/SKILL.md"
    role: "state mutation skill"
    purpose: "Own governed state mutation, state transitions, and pointer updates."
  - path: "uacp-triage/SKILL.md"
    role: "triage skill"
    purpose: "Calibrate scope, score granularity, and route the request."
  - path: "uacp-propose/SKILL.md"
    role: "propose skill"
    purpose: "Capture authority, scope, side effects, and proposal viability."
  - path: "uacp-plan/SKILL.md"
    role: "plan skill"
    purpose: "Convert approved proposals into bounded execution and verification strategy."
  - path: "uacp-execute/SKILL.md"
    role: "execute skill"
    purpose: "Dispatch bounded work through Hermes Kanban or delegated workers."
  - path: "uacp-verify/SKILL.md"
    role: "verify skill"
    purpose: "Validate completed work with adaptive evidence clusters."
  - path: "uacp-resolve/SKILL.md"
    role: "resolve skill"
    purpose: "Finalize outputs, lessons, and memory or skill update decisions."
writing_order:
  - "SKILL.md"
  - "uacp-state/SKILL.md"
  - "uacp-triage/SKILL.md"
  - "uacp-propose/SKILL.md"
  - "uacp-plan/SKILL.md"
  - "uacp-execute/SKILL.md"
  - "uacp-verify/SKILL.md"
  - "uacp-resolve/SKILL.md"
shared_contracts:
  read_first:
    - "UACP_ROOT/docs/index.md"
    - "UACP_ROOT/docs/constitution.md"
    - "UACP_ROOT/docs/lifecycle-reference.md"
    - "UACP_ROOT/config/state.yaml"
    - "UACP_ROOT/config/review-routing.yaml"
  global_rules:
    - "No hardcoded physical deployment paths."
    - "No hardcoded model names."
    - "Do not treat Hermes Kanban as UACP phase state."
    - "Do not create lifecycle skill files until the checkpoint policy is satisfied."
  write_boundaries:
    uacp-state: "state/"
    uacp-triage: "proposals/"
    uacp-propose: "proposals/"
    uacp-plan: "plans/"
    uacp-execute: "executions/"
    uacp-verify: "verification/"
    uacp-resolve: ".outputs/ and knowledge/"
implementation_notes:
  - "The external skill tree should mirror the contract in UACP_ROOT/docs/lifecycle-reference.md."
  - "The first external file should be SKILL.md, then uacp-state."
  - "After creation, verify each skill file references docs/index.md first and the canonical path rules."
