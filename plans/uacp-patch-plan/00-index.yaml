kind: uacp.plan
plan_id: uacp-patch-plan-20260515-plan-001
run_id: uacp-patch-plan-20260515
proposal_artifact: proposals/uacp-patch-plan-20260515.yaml
triage_artifact: proposals/uacp-patch-plan-20260515-triage.yaml

execution_model: sequential_with_codex_gate
phases_total: 5
phases_scheduled: 4
phases_reserved: 1

review_gate_spec:
  council_tier: tier_2_role_diverse
  evidence_clusters: all_15
  verdict_required: pass
  material_findings_allowed: 0
  artifact_kind: uacp.council_synthesis
  artifact_path_pattern: verification/uacp-patch-plan-phase{N}-codex-review.yaml

drift_propagation_rule: >
  Before each phase begins, read the previous phase's Codex review artifact.
  Classify all findings: remediated_in_phase, propagated_constraint, or accepted_risk.
  Update this phase's execution scope for any propagated_constraint findings.
  Record the drift-reconciliation step in the gate ledger entry for this phase.

allowed_tools_for_all_phases:
  - read_file
  - search_files
  - patch_file
  - write_file (UACP_ROOT and skills/ paths only, per declared scope)
  - execute_code (test runners and YAML validators only)
  - uacp_doc_write
  - uacp_config_write
  - uacp_state_write
  - uacp_artifact_write
  - uacp_heartgate_check (post-Phase-1)
  - delegate_task (Codex review council dispatch)

forbidden_tools_for_all_phases:
  - Any write outside UACP_ROOT or skills/devops/uacp/ paths
  - Production database mutation
  - External API calls without explicit proposal authorization
  - Honcho memory writes for gate artifacts

rollback_path: >
  Git revert per phase commit. Each phase produces one atomic commit after its
  Codex review gate passes. Revert sequence: Phase 4 → Phase 3 → Phase 2 → Phase 1 → Phase 0.
  State schema additions (gate-ledger, run-registry, uacp_mode) use additive fields;
  reverting the commit removes the field from new files but does not corrupt existing state.

phases:
  - id: phase_0
    label: Guardian bug fixes
    plan_file: plans/uacp-patch-plan/01-phase0-guardian-bugs.md
    estimated_granularity: 5
    plugin_only: true
    codex_gate: verification/uacp-patch-plan-phase0-codex-review.yaml

  - id: phase_1
    label: Mechanical pre-flight contracts
    plan_file: plans/uacp-patch-plan/02-phase1-mechanical-contracts.md
    estimated_granularity: 7
    plugin_only: true
    codex_gate: verification/uacp-patch-plan-phase1-codex-review.yaml
    drift_reads: [verification/uacp-patch-plan-phase0-codex-review.yaml]

  - id: phase_2
    label: Artifact structure
    plan_file: plans/uacp-patch-plan/03-phase2-artifact-structure.md
    estimated_granularity: 6
    plugin_only: true
    codex_gate: verification/uacp-patch-plan-phase2-codex-review.yaml
    drift_reads: [verification/uacp-patch-plan-phase1-codex-review.yaml]

  - id: phase_3
    label: Governance completeness
    plan_file: plans/uacp-patch-plan/04-phase3-governance-completeness.md
    estimated_granularity: 6
    plugin_only: true
    codex_gate: verification/uacp-patch-plan-phase3-codex-review.yaml
    drift_reads: [verification/uacp-patch-plan-phase2-codex-review.yaml]

  - id: phase_4
    label: Autonomous mode slot
    plan_file: plans/uacp-patch-plan/05-phase4-autonomous-mode-slot.md
    estimated_granularity: 7
    hermes_core_seam: escalation_surface_stub
    operator_confirm_required: true
    codex_gate: verification/uacp-patch-plan-phase4-codex-review.yaml
    drift_reads: [verification/uacp-patch-plan-phase3-codex-review.yaml]

  - id: phase_5
    label: Full autonomous mode
    status: reserved_slot
    plan_file: null
    prerequisites: [phase_4_complete, three_supervised_auto_runs, operator_phase5_authorization]
