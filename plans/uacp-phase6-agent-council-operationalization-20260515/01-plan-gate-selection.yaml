schema_version: '0.1'
kind: uacp.gate_selection
selection_id: uacp-phase6-agent-council-operationalization-20260515-plan-gate
run_id: uacp-phase6-agent-council-operationalization-20260515-012634
phase: plan
created_at: '2026-05-15T01:32:00+08:00'
domains:
  - governance
  - agent_council
  - lifecycle
  - heartgate
  - artifact_management
  - validator
artifact_types:
  - uacp.plan
  - uacp.verification
  - uacp.council_synthesis
  - possible_docs_config_script_changes
risk_level: high
granularity_level: 7
routing_outcome: full_governance
invariant_checks:
  - id: authority.explicit
    status: pass
    reason: Mike instructed continue and PROPOSE_TO_PLAN Heartgate accepted warnings.
  - id: side_effects.declared
    status: pass
    reason: Plan declares potential docs/config/skills/validator changes and gates external actions.
  - id: writes.contained
    status: pass
    reason: Plan artifacts written through governed writer; later docs/config/state writes must use governed tools.
  - id: privacy_safety.constrained
    status: pass
    reason: No private data/credentials; external/public pushes out of scope.
  - id: state.traceable
    status: pass
    reason: Triage, proposal, council synthesis, transition, and plan artifacts are linked.
  - id: failure.conservative
    status: pass
    reason: PLAN carries warnings as explicit work-package requirements.
  - id: mutation.visible
    status: pass
    reason: All changes are artifact/state tracked.
selected_clusters:
  required:
    - id: surface_inventory
      reason: Required before exact docs/config/scripts/skills edits.
    - id: retrieval_led_council_protocol
      reason: Core Phase 6 deliverable.
    - id: council_artifact_separation
      reason: Prevent phase-local/Heartgate artifact collapse.
    - id: blocker_concern_rerun_protocol
      reason: Proposal council identified rerun handling as underspecified.
    - id: validator_coverage_decision
      reason: Proposal/triage validator gap must be closed or explicitly accepted.
    - id: evidence_domain_registry_decision
      reason: Must include or defer not-runtime-active registry/selector.
  optional:
    - id: skill_alignment
      reason: Required if lifecycle skills encode stale council protocol.
    - id: runtime_automation
      reason: Deferred unless surface inventory/council proves necessary.
transition_requirements:
  plan_to_execute:
    - surface inventory artifact exists
    - plan council synthesis exists or explicit low-risk waiver exists
    - exact target surfaces listed with write tools and rollback
    - Heartgate check returns pass/warn with no blockers
reasoning:
  summary: >-
    PLAN keeps execution bounded by requiring a surface inventory first, then exact target decisions.
    It carries proposal council concerns as plan requirements rather than treating them as vague future warnings.
