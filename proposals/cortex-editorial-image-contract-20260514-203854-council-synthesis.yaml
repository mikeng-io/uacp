findings:
  - id: schema-image-plan-missing
    role: schema_contract_reviewer
    severity: blocker
    state: open
    summary: image_plan.json is declared but no schema/model/activity/pass exists.
    required_handling: PLAN must specify JSON/Pydantic schema, writer activity, validation, and workflow checkpoint placement.
  - id: schema-registry-v2-migration
    role: schema_contract_reviewer
    severity: blocker
    state: open
    summary: registry v1 exists; v2 adds required billing/template/placement fields without migration/compatibility contract.
    required_handling: PLAN must define v1 reader compatibility, v2 defaults, migration or sidecar strategy, and tests.
  - id: workflow-pass-order-determinism
    role: temporal_workflow_reviewer
    severity: blocker
    state: open
    summary: image_plan/cost/prompt passes need explicit CANONICAL_PASS_ORDER placement and replay-safe boundaries.
    required_handling: PLAN must place image_plan, define checkpoint/version bump, and keep cost rollup derived from checkpointed metadata or activity results.
  - id: workflow-dry-run-side-effects
    role: temporal_workflow_reviewer
    severity: blocker
    state: open
    summary: new image plan/export/cost surfaces need side-effect policy treatment; generate_cover_image lacks a dry_run parameter.
    required_handling: PLAN must add or classify side-effect sinks and tests proving no Replicate call in dry-run/test modes.
  - id: cost-pricing-config-missing
    role: cost_provider_reviewer
    severity: blocker
    state: open
    summary: No canonical image pricing config or lookup exists; unknown pricing must not default to zero.
    required_handling: PLAN must define image pricing config, null/unknown behavior, cost_summary shape, and rollup strategy.
  - id: cost-prediction-metadata-not-plumbed
    role: cost_provider_reviewer
    severity: concern
    state: open
    summary: Replicate prediction_id/duration/status are not returned into registry metadata.
    required_handling: PLAN must update generation result contract to carry provider prediction metadata.
  - id: provider-adapter-seam
    role: cost_provider_reviewer
    severity: concern
    state: open
    summary: Current generation is Replicate/model-string centric and rejects non-Replicate providers.
    required_handling: PLAN should introduce a provider adapter seam while allowing Replicate-only v1 execution.
  - id: prompt-brand-css-drift
    role: prompt_brand_reviewer
    severity: blocker
    state: open
    summary: Site CSS, OG cards, and image prompt style vocabulary have drift; global style boundary is not formally coupled to mikeng.io visual tokens.
    required_handling: PLAN must define a brand boundary contract and note OG/image/site accent alignment as in-scope or deferred.
  - id: prompt-fallback-generic-risk
    role: prompt_brand_reviewer
    severity: blocker
    state: open
    summary: Current fallback prompt uses raw thesis and can generate generic AI tropes.
    required_handling: PLAN must make fallback fail closed or inject article-grounded anchors with tests.
  - id: prompt-provider-template-tests
    role: prompt_brand_reviewer
    severity: concern
    state: open
    summary: No provider/model-family prompt templates or tests exist for Flux vs Imagen prompt shapes.
    required_handling: PLAN must add prompt rendering templates and tests for required guardrails and model-family shape.
verdict:
  status: concerns
  advance_to_plan: blocked_until_remediated
  summary: >-
    The proposal is viable, but PROPOSE cannot cleanly transition to PLAN until the proposal/gate artifacts are patched to carry council blockers as explicit PLAN requirements and transition conditions.
recommended_next_actions:
  - Patch proposal with accepted council blockers and PLAN obligations.
  - Patch gate-selection transition requirements with schema, side-effect, pricing, and prompt/brand blockers.
  - Validate artifacts, then prepare PROPOSE→PLAN transition/Heartgate check.
