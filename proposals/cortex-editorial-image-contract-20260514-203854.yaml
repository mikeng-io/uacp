kind: uacp.proposal
phase: propose
proposal_id: cortex-editorial-image-contract-20260514-203854
run_id: cortex-editorial-image-contract-20260514-203854
triage_artifact: state/runs/cortex-editorial-image-contract-20260514-203854-triage.yaml
objective: >-
  Add a governed Cortex editorial image contract that separates global mikeng.io
  style boundaries, article-specific visual themes, placement decisions,
  provider/model-specific prompt rendering, filesystem topology, registry
  provenance, and image-generation cost accounting before enabling expanded
  image generation.
authority:
  status: pass
  source: Mike approved entering a general UACP lifecycle in the Cortex Discord thread.
  notes:
    - Granularity is governed by UACP phase-local assessment, not pre-decided outside the lifecycle.
    - Human approval is required before EXECUTE and before paid/live side effects.
human_involvement:
  required: true
  decision_owner: Mike
  authority_needed:
    - approve PLAN before code mutation
    - approve any paid Replicate generation or live publish workflow run
scope:
  in_scope:
    - Cortex editorial image planning contract (`image_plan.json`).
    - Global site boundary derived from mikeng.io Precision Dark constraints, kept as a boundary not a fixed article style.
    - Article-specific visual theme generated from final article content.
    - Section/placement scoring and optional inline-image recommendations, with inline generation disabled by default.
    - Provider/model-specific prompt template abstraction for Replicate image models and future providers.
    - Image registry schema v2 with placement, prompt-template, generation, and billing provenance.
    - Filesystem topology under `artifacts/editorial/YYYY/MM/DD/<workflow_id>/images/` with cover/sections/social subtrees.
    - Image-generation cost estimation and run-level cost rollup metadata.
    - Tests and docs proving dry-run/test behavior and schema/topology guarantees.
  out_of_scope:
    - Live editorial workflow rerun.
    - Publishing a blog article or opening a mikeng.io PR.
    - Enabling inline image generation by default.
    - Storing image binaries or markdown blobs in Postgres.
    - Hardcoding transient model choices as doctrine.
    - UACP/Hermes runtime or Guardian changes.
declared_side_effects:
  proposed:
    - local Cortex code/config/docs/test changes after PLAN approval
    - local artifact schema/docs updates
    - optional DB migration only if PLAN proves filesystem-only cost ledger is insufficient
  prohibited_without_explicit_approval:
    - Replicate paid image generation
    - live blog publish/delivery
    - production DB migration
    - external messages or public posts
contracts:
  image_plan_json:
    required_sections:
      - schema_version
      - workflow_id
      - article
      - global_style_boundary
      - article_visual_theme
      - placements
      - budget_policy
      - provider_tier_recommendations
  registry_v2:
    required_sections:
      - schema_version
      - workflow_id
      - image_plan_path
      - images
      - cost_summary
    per_image_required_fields:
      - id
      - placement_id
      - role
      - status
      - provider
      - model
      - model_family
      - prompt_template_id
      - prompt_path
      - artifact_path
      - metadata_path
      - sha256
      - mime_type
      - billing
  prompt_templates:
    layers:
      - global_style_boundary
      - article_visual_theme
      - placement_role
      - provider_model_constraints
    examples:
      flux_family: compact subject-first prompt with short word budget
      imagen_family: natural-language layered editorial prompt
  cost_accounting:
    fields:
      - billing_unit
      - unit_price_usd
      - quantity
      - estimated_cost_usd
      - actual_cost_usd
      - pricing_source
      - pricing_confidence
      - provider_prediction_id
      - duration_ms
      - status
execution_constraints:
  - Workflow owns when artifacts are exported; activities own filesystem I/O.
  - LLMs may generate structured plan/theme/prompt data but must not orchestrate filenames or execution order.
  - Dry-run/test modes must not call Replicate unless an explicit side-effect flag allows it.
  - Unknown image pricing must be represented as null/unknown, not fake zero.
  - Registry and plan artifacts must be backward-compatible or explicitly versioned.
agent_council:
  selected: true
  phases:
    - PROPOSE critique before PLAN transition
    - VERIFY implementation audit before RESOLVE
  requested_roles:
    - schema_contract_reviewer
    - workflow_temporal_reviewer
    - cost_provider_reviewer
    - prompt_model_reviewer
    - publication_brand_reviewer
phase_local_granularity:
  phase: PROPOSE
  entry_estimate: 7
  exit_actual: null
  downstream_projection:
    PLAN: 7
    EXECUTE: 7
    VERIFY: 8
    RESOLVE: 5
success_criteria:
  - Proposal and gate-selection artifacts pass validation.
  - PLAN decomposes work into bounded implementation and verification tasks.
  - Tests prove schema, topology, prompt rendering, cost rollup, and dry-run side-effect behavior.
  - No live/publish/paid side effects occur until explicitly approved.
audit_trail:
  - timestamp_utc: '2026-05-14T20:38:54Z'
    actor: Norty
    event: TRIAGE artifact created after Mike selected general UACP lifecycle.
  - timestamp_utc: '2026-05-14T20:38:54Z'
    actor: Norty
    event: PROPOSE artifact drafted for Cortex editorial image contract.
