transition_requirements:
  propose_to_plan:
    - "Proposal accepted by operator or non-blocking review."
    - "Gate-selection artifact exists and invariants pass."
    - "Local role-diverse proposal council or explicit operator waiver before PLAN if proceeding immediately."
    - "PLAN must use split planning package under plans/cortex-x-draft-revamp/ rather than one mega-doc."
    - "PLAN must decide whether stance ledger is DB-backed, config-backed, artifact-backed, or derived from existing x_originals/editorial indexes."
    - "PLAN must define rollback: preserve current x_casual behavior behind feature flag/config or branch boundary until verified."
reasoning:
  - "The core risk is not destructive action today, but public-reputation drift after implementation."
  - "Existing code already has meaningful safety gates; new design must be additive/minimal-delta."
  - "Hybrid language and coherence cannot be verified by generic tests only; fixtures and human-readable Discord metadata are required."
