selected_clusters:
  required:
    - cluster_id: scope
      family: scope
      purpose: "Bound content diversity, non-goals, and implementation surface."
      expected_artifact: "proposals/cortex-x-draft-revamp-20260514.yaml"
    - cluster_id: grounding
      family: grounding
      purpose: "Ground plan in current Cortex x_casual_composer code/docs and observed behavior."
      expected_artifact: "plans/cortex-x-draft-revamp/01-ground-truth.md"
    - cluster_id: architecture_design
      family: architecture_design
      purpose: "Design ContentIntentContract, language profile selection, and stance/coherence guard without breaking existing AngleContract gates."
      expected_artifact: "plans/cortex-x-draft-revamp/04-design.md"
    - cluster_id: privacy_safety
      family: privacy_safety
      purpose: "Prevent private doctrine/memory leakage and public fake/contradictory content."
      expected_artifact: "plans/cortex-x-draft-revamp/03-requirements.md"
    - cluster_id: verification_strategy
      family: verification_strategy
      purpose: "Define fixtures/dry-run tests for content types, language modes, and contradiction/evolution cases."
      expected_artifact: "plans/cortex-x-draft-revamp/06-verification.md"
    - cluster_id: review_routing
      family: generated
      purpose: "Use role-diverse local council for proposal/plan critique before execution due to granularity 7."
      expected_artifact: "verification/cortex-x-draft-revamp-propose-council-synthesis-20260514.yaml"
  optional:
    - cluster_id: execution_strategy
      family: execution_strategy
      purpose: "Needed in PLAN to choose worktree, subagents/external runtime, and task graph."
    - cluster_id: memory_lessons
      family: memory_lessons
