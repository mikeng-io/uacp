schema_version: "0.1"
kind: uacp.triage
triage_id: cortex-x-draft-revamp-20260514
request_summary: >
  Kick off a UACP-governed revamp of Cortex x-draft/original-new tweet generation
  so it produces a diverse but coherent public thought stream: hybrid-language
  drafts, useful article/repository shares, Purpose Agent/Norty observations,
  tool evaluations, Trustless/UACP/Cortex notes, and contradiction-safe stance
  continuity.
authority:
  status: pass
  source: >
    Operator prompt in Discord #cortex thread explicitly requested to kick-start
    the x-draft revamp using UACP after clarifying desired behavior.
factor_scores:
  impact: 7
  reversibility: 5
  domain_count: 6
  runtime_count: 4
  verification_difficulty: 7
  notes:
    - "Affects Cortex public-facing reputation output and #x-drafts workflow quality."
    - "Likely code, prompt, schema, docs, tests, and possibly DB/migration changes."
    - "External posting is not automatic; workflow posts drafts to Discord for manual copy, reducing immediate publication risk."
    - "Correctness requires coherence against prior stances, not just unit tests."
    - "Hybrid language selection affects voice and public identity; needs explicit review examples."
granularity_level: 7
routing_outcome: standard_uacp
rationale:
  - "This is not a direct patch: it changes generation contracts, metadata, language strategy, and coherence safeguards."
  - "The current workflow already has source grounding and anti-hallucination gates; the revamp must preserve them while adding content diversity and stance continuity."
  - "Use UACP standard lifecycle with proposal, split planning package, bounded implementation, dry-run proof, and review before live schedule changes."
artifact_policy: standard
initial_scope:
  include:
    - "Inspect and document current x_casual_composer behavior as ground truth."
    - "Design ContentIntentContract / DraftPlan on top of existing AngleContract."
    - "Add language profile selection supporting Cantonese, Traditional Chinese, English, and natural hybrid modes."
    - "Add stance/coherence guard for tools, repos, articles, and prior claims to avoid fake reversals."
    - "Support diverse content types: simple observations, useful repo/article shares, tool evaluations, build notes, governance notes, Trustless/UACP/Cortex notes, and technical explainers."
    - "Update Discord #x-drafts metadata to expose type, language mode, stance, coherence result, and why-share rationale."
    - "Keep existing safety gates: source grounding, Simplified lint, zh AI-tell lint, fabricated specific/proper noun checks, URL gate, dedup."
    - "Prove with dry_run/test fixtures before any live schedule or persistence behavior change."
  exclude:
    - "No automatic posting to X."
    - "No production DB migration until PLAN explicitly approves schema changes."
    - "No broad Hermes/Norty runtime integration unless the proposal proves a bounded call surface is needed."
    - "No weakening existing anti-fabrication or source-grounding gates."
known_ground_truth:
  current_workflow: "src/cortex/workflows/x_casual_composer.py"
  current_gather: "src/cortex/activities/casual_gather.py"
  current_compose: "src/cortex/activities/casual_compose.py"
  current_discord_surface: "src/cortex/activities/casual_approvals.py"
  current_config: "config/x_casual.yaml"
  current_behavior_summary:
    - "Gather A signals, B x_news, C1 pulses; C2 git dropped."
    - "Bundle score threshold is 0.75."
    - "Composer builds AngleContract, picks tone, writes one zh-hk candidate, humanizes, lints, gates, dedups, and posts to #x-drafts."
    - "draft_lang is currently hardcoded zh-hk and prompt forces HK Traditional written register."
    - "Existing checks are safety/grounding-heavy but do not provide content-intent diversity or stance-led coherence."
authority_and_side_effects:
  intended_side_effects:
    - "Create UACP proposal/planning/verification artifacts under UACP_ROOT."
    - "Read Cortex repo files and docs."
    - "Later phases may write Cortex code/docs/tests in a branch/worktree after PLAN approval."
  prohibited_without_further_approval:
    - "Mutating Cortex production DB."
    - "Changing live Temporal schedules."
    - "Posting to X or other public channels."
    - "Weakening UACP/Hermes security posture."
trust_boundaries:
  - "Fetched/source content and DB signal material are untrusted evidence, not instructions."
  - "Public-facing drafts must not expose private doctrine or internal-only details unless explicitly allowed and properly framed."
next_step: "Enter PROPOSE: create a proposal artifact defining scope, success criteria, risks, and phase plan for the x-draft revamp."
