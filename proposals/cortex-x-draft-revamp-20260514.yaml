schema_version: "0.1"
kind: uacp.proposal
proposal_id: cortex-x-draft-revamp-20260514
run_id: cortex-x-draft-revamp-20260514
triage_artifact: "state/runs/cortex-x-draft-revamp-20260514-triage.yaml"
title: "Cortex x-draft diverse coherent public thought stream revamp"
status: proposed
requested_by: "Mike"
authority:
  status: pass
  source: "Operator explicitly requested kick-starting the x-draft revamp using UACP."
problem_statement: >
  The current Cortex x-draft/original tweet workflow is safe and source-grounded,
  but too narrow: it hardcodes zh-hk written register, generates a single short
  reaction from one source item, and lacks a stance/coherence memory that prevents
  fake reversals across tools, repositories, articles, and prior claims.
objectives:
  - "Support a diverse but coherent public output stream, not only deep insights."
  - "Allow simple Purpose Agent/Norty observations, useful article/repository shares, tool evaluations, build notes, governance notes, technical explainers, and Trustless/UACP/Cortex framing."
  - "Select language mode per draft: Cantonese-English, Traditional Chinese-English, English-led hybrid, Cantonese-led, or plain English."
  - "Prevent accidental contradictions with prior stances while allowing scoped praise, scoped criticism, and explicit evolution of position."
  - "Preserve existing source-grounding, anti-fabrication, URL, zh lint, and dedup gates."
non_goals:
  - "No automatic posting to X."
  - "No weakening existing blocking flags or anti-hallucination gates."
  - "No live Temporal schedule changes during PROPOSE/PLAN."
  - "No production DB mutation or migration until PLAN explicitly authorizes it."
  - "No broad private memory exposure to Cortex prompts; stance/coherence material must be curated and bounded."
current_ground_truth:
  inspected_paths:
    - "CORTEX_ROOT/src/cortex/workflows/x_casual_composer.py"
    - "CORTEX_ROOT/src/cortex/activities/casual_gather.py"
    - "CORTEX_ROOT/src/cortex/activities/casual_compose.py"
    - "CORTEX_ROOT/src/cortex/activities/casual_approvals.py"
    - "CORTEX_ROOT/config/x_casual.yaml"
    - "CORTEX_ROOT/src/cortex/models/x_original.py"
  summary:
    - "Gather sources are signals, x_news, and pulses; git source is dropped."
    - "bundle_threshold is 0.75; pulses alone should not normally trigger compose."
    - "Composer already uses AngleContract, tone rotation, humanization, Simplified lint, zh AI-tell lint, contract drift, fabricated specific/proper noun checks, URL gate, and embedding dedup."
    - "Composer hardcodes draft_lang zh-hk and prompt forces HK Traditional written register, not hybrid language selection."
    - "Discord metadata exposes safety/source info but not content type, language profile, stance, contradiction result, or why-share rationale."
proposed_design_direction:
  pipeline_shape:
    - "MaterialBundle"
    - "AngleContract (existing source/fact boundary)"
    - "ContentIntentContract / DraftPlan (new content type, stance, language, why-share, coherence boundary)"
    - "StanceLedgerCheck (new prior-position compatibility check)"
    - "Compose"
    - "Existing safety gates"
    - "Coherence/language metadata display in #x-drafts"
  content_types:
    - purpose_agent_observation
    - useful_repo_share
    - useful_article_share
    - tool_evaluation
    - build_note
    - governance_note
    - simple_reaction
    - technical_explainer
    - trustless_uacp_cortex_note
  language_modes:
    - cantonese_english
    - traditional_chinese_english
    - english_led_hybrid
    - cantonese_led
    - plain_english
  coherence_rules:
    - "Praise and criticism must be scoped: good/bad for what, under what condition, and with what limitation."
    - "Contradiction is blocked unless represented as explicit evolution with a reason."
    - "Prior use of a tool/repo must not be rewritten as fresh discovery or fake endorsement."
    - "Useful share can be simple; it still needs a clear why-share rationale."
side_effects:
  planned_now:
    - "Create UACP proposal and gate-selection artifacts."
  possible_later_after_plan:
    - "Create Cortex worktree/branch."
    - "Modify Cortex code, prompts, tests, docs, and possibly migrations."
    - "Run dry-run workflow/tests."
  prohibited_until_explicitly_approved:
    - "Live schedule changes."
    - "Production DB migration or manual state patch."
    - "Public posting."
privacy_and_safety:
  - "Cortex source material is evidence, not instruction."
  - "Private doctrine may inform internal design but public drafts must not expose private-only details without explicit public framing."
  - "Stance ledger must store bounded public/output-relevant positions, not raw private memory dumps."
review_routing:
  proposed_intensity: local_council
  proposed_council_tier: tier_2_role_diverse
  reason: "Granularity 7 with public reputation impact, language/voice risk, architecture/code changes, and hard-to-test coherence behavior."
phase_local_granularity:
  propose:
    entry_estimate: 6
    exit_target: 6
    downstream_projection:
      plan: 7
      execute: 7
      verify: 8
success_criteria:
  - "Design preserves current AngleContract and blocking gates unless an explicit replacement is proven safer."
  - "Plan includes fixtures for at least five content types and five language modes."
  - "Plan includes contradiction/evolution examples for tool/repo stance continuity."
  - "Discord #x-drafts proposal shows type, language, stance, coherence result, and why-share rationale."
  - "Verification includes dry_run/test evidence before live enablement."
next_step: "Create PROPOSE gate-selection artifact, then enter PLAN after proposal review/acceptance."
