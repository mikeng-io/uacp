# ── Side Effects ───────────────────────────────────────────────────────────
side_effects:
  - "Live Cortex X posting pipeline behavior changes"
  - "Discord thread close messages will have new format on failure"
  - "DB status values: 'failed' (bird only) vs 'manual_required' (all layers fail)"
  - "XDecisionWorkflow execution time increases (Bird 45s + X API 30s)"
  - "New dependency: x_writes imported in x_decision.py workflow"

# ── Risk Assessment ────────────────────────────────────────────────────────
risk_level: medium
risks:
  - id: R1
    description: "X API v2 may also face restrictions in future"
    likelihood: medium
    impact: high
    mitigation: "Fast-fail on 403/401; proceed to Layer 4 manual escalation"
  - id: R2
    description: "Workflow timeout with sequential fallback attempts"
    likelihood: low
    impact: medium
    mitigation: "Total timeout budget 120s; X API fails fast on auth errors"
  - id: R3
    description: "execute_candidate_write may have undiscovered bugs"
    likelihood: low
    impact: high
    mitigation: "Unit test all 4 action types; dry-run mode for safe validation"
  - id: R4
    description: "Discord message format change may confuse user"
    likelihood: low
    impact: low
    mitigation: "Clear emoji headers; code block for copy-paste"

# ── Containment ────────────────────────────────────────────────────────────
write_paths:
  - "src/cortex/workflows/x_decision.py"
  - "src/cortex/activities/x_state.py"
  - "tests/ (new unit tests)"
  - "docs/14-X-POST-FALLBACK-DESIGN.md (update status)"

forbidden_paths:
  - "src/cortex/activities/x_writes.py (no changes — already complete)"
  - "src/cortex/activities/bird_post.py (no changes)"
  - "src/cortex/activities/x_approvals.py (no changes)"
  - "Database schema (no migrations needed)"

# ── Verification Strategy ──────────────────────────────────────────────────
verification:
  - "Unit tests: test_post_bird_success, test_post_bird_fail_xapi_success, test_quote_xapi_native, test_retweet_skips_bird, test_reply_bird_fail_xapi_403, test_all_layers_fail, test_dry_run"
  - "Integration test: real X API credentials with sandbox/low-risk tweet"
  - "Dry-run mode: workflow logs without calling external APIs"
  - "Manual test: Discord thread close message formatting"

# ── Acceptance Criteria ────────────────────────────────────────────────────
acceptance_criteria:
  - "Bird success: status=posted, Discord shows 'Posted via bird'"
  - "Bird fail + X API success: status=posted, Discord shows 'Posted via X API'"
  - "All layers fail: status=manual_required, Discord shows rich message with draft + target URL"
  - "Retweet action: skips Bird, uses X API post_retweet directly"
  - "Quote action: uses X API post_quote (native) not Bird workaround"
  - "Dry-run: no API calls, logs intended actions"
  - "All unit tests pass"

