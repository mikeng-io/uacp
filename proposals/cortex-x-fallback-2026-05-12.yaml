# ── Scope ──────────────────────────────────────────────────────────────────
title: "Cortex X Post Fallback Chain Implementation"
summary: >
  Wire existing X API v2 activities (x_writes.py) into XDecisionWorkflow
  as Layer 2 fallback when Bird CLI fails. Implement rich manual escalation
  (Layer 4) with formatted Discord messages. Refactor record_bird_failure
  into generic record_failure for multi-layer error tracking.

in_scope:
  - "XDecisionWorkflow tone_pick path: add Layer 2 fallback after Bird failure"
  - "Action-specific routing: post/quote/retweet via x_writes, reply with mention check"
  - "record_bird_failure → record_failure refactor with layer parameter"
  - "Rich Discord manual escalation message (draft + target URL + action + errors)"
  - "Unit tests for fallback chain logic"
  - "Dry-run mode support for safe testing"

non_goals:
  - "Layer 3 (Browser Automation / Playwright) — deferred to future"
  - "X API credential rotation or health check endpoint"
  - "Metrics dashboard for layer success rates"
  - "Cleanup of 460+ stale pending candidates (separate task)"
  - "Changes to x_writes.py internals (already complete)"

# ── Affected Domains ───────────────────────────────────────────────────────
domains:
  - temporal_workflows
  - x_api_integration
  - discord_integration
  - database_state

