status: proposed_patched_after_council
summary: >
  Establish a mandatory follow-through gate for UACP phase progression whenever
  Agent Council or Heartgate-adjacent evidence reports blockers, concerns,
  invariant failures, negative findings, or material warnings. The gate requires
  documented handling and context-selected follow-up Agent Council review before
  Heartgate/Guardian may approve the next phase transition.
authority:
  status: pass
  operator: Mike
  source: "Telegram instruction: use existing UACP lifecycle and proceed."
  canonical_mutation_authority: "not_yet_granted_beyond_proposal_artifacts"
problem_statement: >
  Current UACP doctrine distinguishes phase-local Agent Council and Heartgate coherence,
  but the lifecycle needs an explicit fail-closed follow-through rule for negative
  council results after they are remediated, expanded, justified, deferred, rejected,
  or accepted as warnings. Without this gate, a run could summarize a concern as
  handled and move forward without renewed council scrutiny where appropriate or
  transition-level coherence evidence.
goals:
  - "Make negative council result follow-through explicit, mandatory, and fail-closed."
  - "Preserve separation between phase-local Agent Council review and Heartgate/Guardian transition enforcement."
  - "Require follow-up Agent Council review after remediation, expansion, or justification of material negative findings."
  - "Require Heartgate visibility for deferred, rejected, and accepted-warning findings, with follow-up council selected by severity/routing."
  - "Require transition artifacts to reference the original finding, handling artifact, and follow-through evidence."
  - "Keep the gate lightweight and adaptive; avoid fixed numbered bureaucracy or hardcoded model/runtime names."
non_goals:
  - "Do not replace Heartgate with Agent Council."
  - "Do not replace phase-local Agent Council with Heartgate coherence."
  - "Do not turn every minor comment into a deep council; routing remains context-selected."
  - "Do not mutate canonical docs/config/runtime code during PROPOSE without the next phase transition."
proposed_rule:
  trigger:
    hard_followup_council_required_when: >
      A blocker, concern, invariant failure, negative finding, or material warning is marked
      remediated, expanded, or justified, and the finding affects lifecycle authority,
      non-waivable invariants, phase transition readiness, runtime enforcement, artifact
      schema, side-effect containment, or cross-phase coherence.
    conditional_followup_council_when: >
      A finding is marked deferred, accepted_warning, or rejected_with_reason. These always
      require Heartgate visibility, owner/residual-risk encoding, and next-phase obligation
      where applicable. Follow-up Agent Council is required when severity is material,
      residual risk is medium or higher, the item touches a non-waivable invariant, or
      review-routing selects council based on phase-local granularity/risk.
    material_warning_definition: >
      A warning is material when it can alter lifecycle progression, authority, invariant
      status, trust boundary, side-effect containment, runtime enforcement, artifact schema,
      or the next phase's obligations. Pure typo/style/lint observations are not material
      unless they obscure one of those fields.
  handling_classifications:
    - remediated
    - expanded
    - justified
    - deferred
    - accepted_warning
    - rejected_with_reason
  recursion_control:
    max_followup_depth_default: 1
    deeper_chain_rule: >
      If the follow-up council itself produces a new blocker or material concern, do not
      recurse indefinitely. Heartgate must block the transition or escalate to operator/
      selected council routing for an explicit decision.
  followup_council_scope: >
    The follow-through council is a bounded mandatory rerun/follow-up under the existing
    Agent Council routing model, not a new optional review type and not a single-agent
    summary. It reviews the handling artifact and affected transition evidence only;
    it may reopen the original finding scope only when new evidence shows the handling
    changed the underlying risk.
  minimum_council_tier: >
    Minimum tier is bounded local Agent Council for material concerns. Role-diverse council
    is required for original blockers, invariant failures, authority-boundary changes, or
    lifecycle schema/runtime changes. Cross-runtime/deep council is selected only when
    runtime diversity or independent verification materially improves confidence.
  required_handling:
    - "finding classification: blocker | concern | invariant_failure | negative_finding | material_warning"
    - "handling classification: remediated | expanded | justified | deferred | accepted_warning | rejected_with_reason"
    - "handling artifact with unique artifact_id, run_id, timestamp, evidence, owner, residual risk, and next-phase obligation if any"
    - "owner block for warning/deferred/rejected items: entity, ttl_or_review_point, escalation_contact_or_operator, next_phase_obligation"
    - "follow-up Agent Council synthesis artifact with unique artifact_id, run_id, timestamp, and explicit references to original finding artifact_id and handling artifact_id when council is required"
    - "transition artifact references original finding, handling artifact, follow-up council synthesis when required, and carried warnings/deferred items"
    - "Heartgate/Guardian transition artifact contains explicit approval/block status, reason, and timestamp"
  pass_condition: >
    Follow-up Agent Council, when required, finds no unresolved blocker in the handling;
    all non-waivable invariants are pass; accepted warnings/deferred/rejected items are
    explicit, owned, and visible to the next phase; and Heartgate/Guardian validates the
    transition artifact independently.
  block_condition: >
    Missing handling evidence, missing required follow-up Agent Council review, unresolved
    blocker, invariant block, rejected finding without documented escalation path, unowned
    warning/deferred item, unauthorized side effect, recursion beyond default depth without
    operator/Heartgate routing, or Heartgate/Guardian rejection.
  heartgate_independence: >
    Heartgate evaluates the handling artifact and follow-up council synthesis independently.
    A follow-up Agent Council synthesis is evidence for Heartgate, not transition approval.
    Heartgate may require its own Heartgate Council when the handling changes lifecycle
    semantics, schema, runtime enforcement, or authority boundaries.
