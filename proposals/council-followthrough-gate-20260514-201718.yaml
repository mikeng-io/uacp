    - "PLAN must identify canonical docs/config/runtime/validator patches needed, including handled_findings_chain or equivalent transition evidence fields."
    - "VERIFY must include schema validation of handling artifacts, a synthetic negative-finding test using mock council synthesis, and a regression test proving a handled blocker without required follow-up council is rejected by the transition validator."
constraints:
  - "Use governed writer tools for future docs/config/state/artifact mutation."
  - "Keep canonical language model-agnostic and runtime-neutral."
  - "Do not use fixed numbered gates as doctrine; implementation should be adaptive."
  - "Granularity scores are advisory only; implementation must not expose gate levels as fixed runtime enforcement or user-facing routing logic."
  - "Non-waivable invariant statuses remain pass/block; transition validators must reject warn/deferred statuses on non-waivable invariants."
  - "Encode accepted concerns as warnings/deferred items where Heartgate vocabulary requires it."
