title: "Agent Council negative-result follow-through gate"
objective: >
  Add a lightweight but mandatory, fail-closed UACP gate for handled negative
  council findings so phase progression requires documented handling, context-selected
  follow-up Agent Council review, and independent Heartgate/Guardian transition approval.
scope:
  in_scope:
