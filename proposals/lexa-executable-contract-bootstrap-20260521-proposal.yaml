kind: uacp.proposal
phase: propose
run_id: lexa-executable-contract-bootstrap-20260521
proposal_id: lexa-executable-contract-bootstrap-20260521-proposal
triage_artifact: proposals/lexa-executable-contract-bootstrap-20260521-triage.yaml
objective: >-
  Bootstrap a minimal executable LEXA contract surface where documentation,
  schemas, fixtures, validator code, and a bounded reference packet builder
  co-evolve under one UACP lifecycle to prove or falsify the current draft
  contract without creating a daemon, API service, or live integrations.
authority:
  status: pass
  source: current Telegram operator instruction from Mike on 2026-05-21
  summary: >-
    Mike authorized proceeding from TRIAGE into UACP PROPOSE for a minimal
    bootstrapping/init lifecycle after clarifying that UACP should govern
    simultaneous code/document/evidence convergence rather than docs-first or
    implementation-first sequencing.
human_involvement:
  required: true
  mode: transition_confirmations_and_external_side_effects
  decision_owner: Mike
scope:
  in_scope:
    - Create or stage a minimal LEXA project/bootstrap surface.
    - Bring reviewed draft architecture into the bootstrap as input documentation.
    - Create or refine source registry, context packet, event, entity, relation, and common schemas.
    - Create valid and invalid fixtures for Nora public-safe and Cortex editorial examples.
    - Implement a local validator for schemas and fixtures.
    - Implement a bounded mock-source reference packet builder only if useful for pressure-testing the contract.
    - Patch docs based on executable findings during the same lifecycle.
    - Verify private/public leakage, provenance, source registry, cross-workspace authorization, and derived-state invariants.
  out_of_scope:
    - Full LEXA runtime implementation.
    - Daemon or API service.
    - Live Nora integration.
    - Live Cortex integration.
    - Private memory ingestion or shared private-memory index.
    - Production source registry state.
    - Standalone SEF or SGRN services.
    - Pushes, external publication, or production deployment without explicit authorization.
declared_side_effects:
  - local_file_writes_under_uacp_outputs_or_later_approved_project_surface
  - local_schema_fixture_validator_and_reference_code_creation
  - no_network_or_external_side_effects_by_default
  - no_commits_or_pushes_without_explicit_operator_authorization
non_goals:
  - Use code as accidental canonical truth.
  - Promote Vault draft docs to canonical architecture by implication.
  - Wire LEXA into any live assistant, memory, Cortex, or public channel.
  - Resolve all future storage/runtime/backend choices.
proposal_decision: >-
  Choose an integrated executable-contract bootstrap. This rejects a false binary
  between documentation-first and code-first. The lifecycle will intentionally
  co-evolve docs, schemas, fixtures, validator, and bounded reference code, with
  VERIFY checking convergence.
artifact_strategy:
  initial_surface: outputs/lexa-executable-contract-bootstrap-20260521/
  rationale: >-
    Use governed UACP staging first so the bootstrap can be audited before a
    dedicated LEXA repo/project surface is created. PLAN may revise this if Mike
    explicitly chooses a repo location.
  vault_input: /home/norty/vault/02-architecture/LEXA/
  vault_status: draft_input_only
risks:
  - id: accidental_canonical_code
    severity: high
    mitigation: docs and code remain candidate/draft until VERIFY/RESOLVE records proven contract scope.
  - id: scope_creep_to_runtime
    severity: high
    mitigation: daemon/API/live integrations/private memory ingestion are explicit out-of-scope blockers.
  - id: public_private_leakage
    severity: high
    mitigation: negative fixtures and validator checks must cover private source leakage and cross-workspace authorization.
  - id: architecture_theatre
    severity: medium
    mitigation: executable fixtures and validator must prove or falsify contract claims.
verification_requirements:
  - schemas_parse_and_reference_resolution_checked
  - valid_fixtures_pass
  - invalid_leakage_provenance_cross_workspace_and_advisory_canonicality_fixtures_fail
  - reference_packet_builder_outputs_validate_if_builder_is_selected
  - docs_updated_to_match_executable_findings
  - no_runtime_integration_or_private_memory_ingestion_occurred
transition_requirements:
  propose_to_plan:
    - proposal artifact exists
    - gate selection artifact exists
    - proposal package exists with intent/scope/containment/risk/verification/artifact-map
    - PLAN must decide exact project/staging surface, work packages, validation commands, and rollback/cleanup
