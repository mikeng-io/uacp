kind: uacp.triage
triage_id: lexa-executable-contract-bootstrap-20260521-triage
run_id: lexa-executable-contract-bootstrap-20260521
request_summary: >-
  Start a UACP lifecycle for a minimal LEXA bootstrap/init where docs, schemas,
  fixtures, validator code, and a bounded reference implementation co-evolve
  under one governed lifecycle rather than splitting documentation-first and
  implementation-first tracks.
authority:
  status: pass
  source: current Telegram operator instruction from Mike on 2026-05-21
  summary: >-
    Mike explicitly authorized starting the UACP lifecycle after clarifying that
    UACP should solve the chicken-and-egg problem by governing simultaneous
    document/code/evidence co-evolution.
factor_scores:
  impact: 7
  reversibility: 6
  domain_count: 7
  runtime_count: 3
  verification_difficulty: 7
  notes:
    - Touches LEXA architecture, future source registry contracts, public/private context boundaries, schemas, fixtures, and minimal code.
    - Does not yet authorize live Nora/Cortex integration, private memory ingestion, daemon/API service, or production runtime state.
phase_local_granularity:
  phase: triage
  entry_estimate: 7
  exit_actual: 7
  delta_reason: >-
    Scope is medium/high because it creates a project bootstrap surface spanning
    docs, schemas, fixtures, validator, and bounded reference code, but excludes
    live integrations and protected runtime mutation.
  downstream_projection:
    propose: 8
    plan: 8
    execute: 8
    verify: 8
    resolve: 6
composite_granularity: 8
routing_outcome: standard_uacp
artifact_policy: standard
council:
  required: false
  reason: >-
    TRIAGE-local council is not required before PROPOSE because the operator has
    already clarified the lifecycle intent and the immediate decision is routing,
    not semantics acceptance. PROPOSE or PLAN may select council if proposal
    quality, public/private risk, or scope compression concerns appear.
human_involvement:
  required: true
  reason: >-
    Operator confirmation is required for phase transitions and for any decision
    about canonical repo/location, commits, pushes, or runtime side effects.
  authority_needed: >-
    PROPOSE must confirm scope, side effects, non-goals, artifact location, and
    whether the bootstrap creates a new repo/project surface or stages inside an
    existing workspace.
  decision_owner: Mike
in_scope_candidate:
  - Create a minimal LEXA bootstrap/init lifecycle proposal.
  - Co-evolve docs, schemas, fixtures, validator, and bounded reference packet builder.
  - Use mock/local sources only.
  - Preserve Vault draft packet as input evidence, not canonical truth.
  - Verify private/public leakage, source provenance, cross-workspace authorization, and derived-state constraints through fixtures/tests.
out_of_scope_candidate:
  - Full LEXA runtime implementation.
  - Daemon or API service.
  - Live Nora integration.
  - Live Cortex integration.
  - Private memory ingestion or shared private-memory index.
  - Standalone SEF or SGRN services.
  - Production source registry state.
  - Pushes or external publication without explicit operator authorization.
next_step: >-
  Enter PROPOSE for lexa-executable-contract-bootstrap-20260521. Draft a proposal
  package that rejects the false docs-first/code-first split and defines an
  integrated executable-contract bootstrap lifecycle.
