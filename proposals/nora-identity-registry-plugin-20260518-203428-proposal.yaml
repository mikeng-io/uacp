phase: propose
kind: uacp.proposal
proposal_id: nora-identity-registry-plugin-20260518-203428-proposal
run_id: nora-identity-registry-plugin-20260518-203428
triage_artifact: proposals/nora-identity-registry-plugin-20260518-203428-triage.yaml
objective: >-
  Implement a Nora profile-local Hermes plugin that performs inbound reverse identity lookup
  against the existing Nora Identity Registry engine and injects only the current sender's
  sanitized runtime identity card into ephemeral prompt context.
authority:
  status: pass
  authorization_source: "Mike explicitly directed: use UACP, not informal UACP Lite."
  decision_owner: Mike
scope:
  in_scope:
    - "Create or update Nora profile-local plugin: /home/norty/.hermes/profiles/nora/plugins/identity_registry/."
    - "Use existing engine: /home/norty/.hermes/operator-data/nora/identity-registry/identity_registry.py."
    - "Hook into pre_gateway_dispatch for inbound platform messages."
    - "Resolve sender via platform user_id first, username/handle second when available."
    - "Append compact safe-card context to event.channel_prompt."
    - "Synthetic tests for known/unknown sender and leak checks against runtime JSON."
    - "Focused post-implementation audit before live Nora gateway restart."
  out_of_scope:
    - "Outbound live dispatch or actual third-party sends."
    - "Hermes core edits unless plugin seam proves insufficient."
    - "Changing platform tokens, profile secrets, memory, session_search, or toolsets."
    - "Injecting raw source YAML or operator_only fields into Nora."
    - "Gateway restart without explicit operator approval."
declared_side_effects:
  - "Lifecycle artifacts written under UACP proposals/state ledger."
  - "Future PLAN/EXECUTE may write Nora profile-local plugin files only."
  - "No live gateway restart until operator approval."
risks:
  - id: identity_leak
    level: high
    mitigation: "Use runtime JSON only; leak scan for raw phone/email/normalized private values; inject compact allowlisted fields."
  - id: wrong_sender_context
    level: medium
    mitigation: "Lookup only current event.source; unknown sender gets no card; synthetic fake-event tests."
  - id: prompt_injection_confusion
    level: medium
    mitigation: "Frame identity card as private runtime context and not user-provided instructions."
  - id: runtime_hook_incompatibility
    level: medium
    mitigation: "Test plugin import and fake pre_gateway_dispatch event before enabling/restart."
human_involvement:
  required: true
  reason: "Approval required before Nora gateway restart and before any future live outbound dispatch."
  next_authority_boundary: "restart_nora_gateway"
verification:
  required_checks:
    - "identity_registry.py compile returns expected card/lookup counts."
    - "known Discord user_id resolves to expected safe card."
    - "unknown sender produces no prompt injection."
    - "runtime JSON contains no raw private phone/email/operator_only values."
    - "plugin import works under HERMES_HOME=/home/norty/.hermes/profiles/nora."
    - "fake MessageEvent receives event.channel_prompt identity context only for matched sender."
    - "focused audit PASS before restart."
proposal_viability: viable
next_phase_obligations:
  - "PLAN must define exact plugin files, enablement path, test commands, rollback path, and audit roles."
  - "EXECUTE must not restart gateway unless Mike explicitly approves after VERIFY."
