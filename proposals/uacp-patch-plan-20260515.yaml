kind: uacp.propose
proposal_id: uacp-patch-plan-20260515-proposal-001
run_id: uacp-patch-plan-20260515
triage_artifact: proposals/uacp-patch-plan-20260515-triage.yaml
gate_selection_artifact: proposals/uacp-patch-plan-20260515-gate-selection.yaml

title: UACP Long-Term Patch Plan — Mechanical Enforcement and Autonomous Mode Slot

purpose: >
  Close the gap between UACP's aspirational governance model and its mechanical
  enforcement reality. Deliver five phases: Guardian bug fixes, mechanical pre-flight
  contracts, structured artifact formats, governance completeness, and the autonomous
  mode slot. Each phase is governed by its own Codex review gate (full-dimension,
  full-perspective, pass-only) before the next phase begins.

authority:
  requested_by: operator (Mike, iam@mikeng.io)
  authorization_source: >
    Explicit operator statements on 2026-05-15:
    "proceed and execute as u recommend" (on the documented patch plan);
    "I need a long-term solution instead of just a hotfix";
    "I expect the UACP to run in a fully autonomous mode [...] even if it is not ready
    right now, we still have to save a slot for it";
    "make sure you deeply understand exactly how Hermes works instead of just guessing";
    "as long as u can note down our conversation as document for checkpoint, u are
    good to go, or even u can use the same practice/pattern of UACP or Trustless ACP
    for proceeding in the lifecycle."
  escalation_required_before: phase_4
  escalation_reason: >
    Phase 4 introduces the autonomous mode slot and requires one Hermes core seam
    (async escalation surface). Operator must confirm the Hermes-core seam approach
    before Phase 4 implementation begins. This is NOT a block on Phases 0-3.

scope:
  in_scope:
    - runtime-adapters/hermes/plugins/uacp_guardian/ (kernel.py, __init__.py)
    - skills/devops/uacp/ (all 7 SKILL.md files: YAML frontmatter additions)
    - state/current.yaml (uacp_mode field addition)
    - state/gate-ledger/ (new directory and schema)
    - state/run-registry.yaml (new file)
    - config/autonomy-policy.yaml (new file, Phase 4)
    - docs/skill-enforcement-spec.md (new canonical doc, Phase 3)
    - docs/proposal-schema.md (new canonical doc, Phase 3)
    - docs/lifecycle-trace-table.md (new canonical doc, Phase 3)
    - docs/index.md (updated inventory for 3 new docs + 2 new configs)
    - docs/runtime-integration-guide.md (post-hook constraint section update)
    - verification/ (Codex review artifacts after each phase)
    - plans/uacp-patch-plan/ (plan directory)
  out_of_scope:
    - Hermes core source (plugin infrastructure, scheduler, hooks engine) for Phases 0-3
    - Any project outside UACP_ROOT and HERMES_ROOT/skills/devops/uacp/
    - PRIVATE_ROOT
    - Production services, external APIs, public publications
    - Honcho memory
    - Any other active UACP runs (no cross-run mutation)

declared_side_effects:
  - kind: file_write
    paths:
      - runtime-adapters/hermes/plugins/uacp_guardian/kernel.py
      - runtime-adapters/hermes/plugins/uacp_guardian/__init__.py
      - skills/devops/uacp/uacp-triage/SKILL.md
      - skills/devops/uacp/uacp-propose/SKILL.md
      - skills/devops/uacp/uacp-plan/SKILL.md
      - skills/devops/uacp/uacp-execute/SKILL.md
      - skills/devops/uacp/uacp-verify/SKILL.md
      - skills/devops/uacp/uacp-resolve/SKILL.md
      - skills/devops/uacp/uacp-state/SKILL.md
    authority: operator-authorized scope above
  - kind: file_create
    paths:
      - state/gate-ledger/ (directory + JSONL files per run)
      - state/run-registry.yaml
      - config/autonomy-policy.yaml
      - docs/skill-enforcement-spec.md
      - docs/proposal-schema.md
      - docs/lifecycle-trace-table.md
    authority: operator-authorized scope above
  - kind: state_mutation
    description: state/current.yaml gets uacp_mode field; run-registry tracks active runs
    authority: operator-authorized scope above
  - kind: git_commit
    description: One commit per phase after Codex review gate passes
    authority: operator-authorized scope above

phase_sequence:
  - phase: 0
    label: Guardian bug fixes
    deliverables:
      - filesystem_guard_verified set correctly in contained-shell attestation flow
      - enforce mode decision logic real (warn→block in enforce mode for uacp_bound)
      - post-hook architectural constraint documented in runtime-integration-guide.md
    review_gate: Codex full-dimension pass required before Phase 1
    plugin_only: true

  - phase: 1
    label: Mechanical pre-flight contracts
    deliverables:
      - state/gate-ledger/ schema and uacp_gate_ledger_append tool
      - phase_exit_invariants in each skill YAML frontmatter
      - allowed_tools + forbidden_tools in each skill YAML frontmatter
      - PIV (post-phase verification) protocol defined and gate-ledger-enforced
    review_gate: Codex full-dimension pass required before Phase 2
    plugin_only: true
    drift_dependency: Phase 0 review findings propagated before Phase 1 begins

  - phase: 2
    label: Artifact structure
    deliverables:
      - scope artifact schema (uacp.scope kind)
      - evidence disposition pairs (verified-facts + assumptions with formal dispositions)
      - run intent doc pattern (uacp.intent kind)
      - structured lessons pattern (uacp.lessons kind) with knowledge/ auto-copy
    review_gate: Codex full-dimension pass required before Phase 3
    plugin_only: true
    drift_dependency: Phase 1 review findings propagated before Phase 2 begins

  - phase: 3
    label: Governance completeness
    deliverables:
      - plan validation gate (structural pre-EXECUTE check, gate-ledger recorded)
      - state/run-registry.yaml (write-path overlap detection)
      - docs/skill-enforcement-spec.md
      - docs/proposal-schema.md
      - docs/lifecycle-trace-table.md
      - docs/index.md inventory updated
    review_gate: Codex full-dimension pass required before Phase 4
    plugin_only: true
    drift_dependency: Phase 2 review findings propagated before Phase 3 begins

  - phase: 4
    label: Autonomous mode slot
    deliverables:
      - uacp_mode field in state schema (manual|semi_auto|supervised_auto|full_auto)
      - config/autonomy-policy.yaml (escalation trigger registry)
      - mode-aware behavior stubs in all 7 skills
      - uacp_escalation_event tool stub (writes to state/escalations/)
    review_gate: Codex full-dimension pass required before Phase 4 is closed
    hermes_core_seam_required: true
    hermes_core_seam_description: >
      Async escalation surface for supervised_auto/full_auto modes. Stub implementation
      writes to state/escalations/ and operator polls. Full push notification is Phase 5.
      Operator must confirm approach before Phase 4 implementation begins.
    drift_dependency: Phase 3 review findings propagated before Phase 4 begins

  - phase: 5
    label: Full autonomous mode
    status: reserved_slot
    prerequisites:
      - Phases 0-4 complete and Codex-reviewed
      - Three full supervised-auto UACP runs verified
      - Operator confirms Phase 5 authorization
    not_scheduled: true

viability:
  assessment: viable
  rationale: >
    Authority is explicit. Scope is contained within UACP_ROOT and the Guardian plugin.
    Phases 0-3 are entirely plugin/skill/YAML work requiring no Hermes core changes.
    Phase 4 requires one core seam (escalation surface) which is a stub in Phase 4 and
    full implementation in Phase 5. The Codex review gate pattern matches the PIV protocol
    being introduced in Phase 1, so the patch plan self-demonstrates the pattern it
    introduces.
  risks:
    - id: r1
      description: >
        filesystem_guard_verified fix may reveal additional unguarded paths in the
        contained-shell flow. If so, Phase 1's allowed-tools scope expands.
      mitigation: Phase 0 Codex review explicitly checks for this.
    - id: r2
      description: >
        Gate ledger schema (Phase 1) may conflict with existing transition artifact
        vocabulary. If so, Phase 2's evidence disposition pairs must reconcile.
      mitigation: Phase 1 Codex review checks cross-schema consistency.
    - id: r3
      description: >
        Phase 4 autonomous mode slot may require Hermes core changes beyond a stub.
        If so, Phase 4 scope is reduced to schema + stubs only, and core changes
        are deferred to Phase 5.
      mitigation: Operator escalation before Phase 4 begins.

write_containment_record: >
  All writes are within UACP_ROOT (docs/, config/, state/, verification/, plans/,
  proposals/) and HERMES_ROOT/skills/devops/uacp/ (skill SKILL.md files) and
  HERMES_ROOT/uacp/runtime-adapters/hermes/plugins/uacp_guardian/ (plugin source).
  No writes outside these boundaries are authorized.

blocker_synthesis: none

warnings: []

accepted_exceptions: []
