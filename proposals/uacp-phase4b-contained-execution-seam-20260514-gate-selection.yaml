  verification_difficulty: 8
  calculation_notes:
    - Phase 4B can change protected shell execution policy and therefore has high impact.
    - The change is somewhat reversible because allow paths can be disabled, but runtime evidence and docs will need revalidation.
    - Multiple domains are involved: governance, runtime adapter, filesystem containment, and verification.
    - Runtime count is high because the proposal must bridge Hermess runtime, Guardian, and host containment.
    - Verification is difficult because proving a real contained execution seam requires live positive and negative tests.
invariant_checks:
  - id: authority.explicit
    status: pass
    reason: Mike explicitly authorized continuing after Phase 4 completion checks passed.
  - id: side_effects.declared
    status: pass
    reason: The proposal declares only proposal/gate-selection artifacts and no allow-path enablement.
  - id: writes.contained
    status: pass
    reason: Artifacts are contained under UACP_ROOT and the proposal stays within the governed artifact tree.
  - id: privacy_safety.constrained
    status: pass
    reason: No private data is being expanded or exposed.
  - id: state.traceable
    status: pass
    reason: Proposal traces to the active triage artifact and will trace to later plan/verification artifacts.
  - id: failure.conservative
    status: pass
    reason: Missing contained execution seam blocks any allow-path claim.
  - id: mutation.visible
    status: pass
    reason: All changes remain tracked in UACP artifacts.
