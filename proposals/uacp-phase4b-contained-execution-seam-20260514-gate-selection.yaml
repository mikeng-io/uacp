    reason: No marketing or public-facing content is being produced.
  - cluster_id: public_distribution
    reason: This is a private governance change.
  - cluster_id: execute_code_backend_containment
    reason: Explicitly deferred until terminal containment is proven.
ranking_basis:
  similar_scenarios:
    - uacp-phase4-filesystem-containment-20260513-215531
    - uacp-runtime-guardian-implementation-checkpoint-1
  templates_considered:
    - universal_cluster_families
    - runtime_containment_template
    - lifecycle_phase_transition_template
  scoring_notes:
    - The containment seam must be treated as a runtime security boundary, not a mere doc/config update.
    - Prior Phase 4 evidence-only work informs the seam but does not satisfy it.
transition_requirements:
  - Proposal must be reviewed by Agent Council before plan-to-execute claims are made.
  - The plan must define a concrete contained shell execution seam with rollback to fail-closed.
  - Live proof must demonstrate actual execution inside containment, not just a separate evidence checker.
  - execute_code remains out of scope until shell containment is proven.
reasoning: >
  This gate selection focuses the proposal on the minimum evidence needed to decide whether
  a real contained execution seam can exist without weakening the current fail-closed posture.
