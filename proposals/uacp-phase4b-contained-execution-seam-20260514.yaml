schema_version: '0.1'
kind: uacp.proposal
proposal_id: uacp-phase4b-contained-execution-seam-20260514
run_id: uacp-phase4b-contained-execution-seam-20260514-082154
phase: propose
status: draft
summary: Design and prove a real contained runtime execution seam for UACP-bound shell commands inside verified bwrap/read-only-root containment, without enabling execute_code or broad standard terminal allow paths prematurely.
originating_triage_artifact: state/runs/uacp-phase4b-contained-execution-seam-20260514-082154-triage.yaml
authority:
  status: pass
  source: "Mike current private Telegram control prompt to continue after Phase 4 completion"
problem_statement: >
  Phase 4 proved that bwrap read-only-root containment can block writes to UACP_ROOT
  and that shell/code remain fail-closed, but the standard Hermes terminal and
  execute_code paths are still not actually executing inside a proven contained
  runtime seam. An evidence-only checker is not enough to enable a shell allow path.
objective: >
  Create a bounded runtime seam that actually runs UACP-bound shell commands inside
  verified filesystem containment, with Guardian consuming the evidence and
  preserving fail-closed behavior by default.
non_goals:
  - Enable execute_code backend containment before shell containment is proven.
  - Push Hermes Agent upstream or open a public PR.
  - Broaden standard terminal execution beyond the contained seam.
  - Claim protection against out-of-band/manual host mutation.
in_scope:
  - contained shell/runtime execution seam design
  - bwrap-backed runtime wrapper or equivalent host/runtime containment proof
  - Guardian evidence consumption model for the contained seam
  - positive/negative live proof cases for allow/block behavior
  - TTL/revalidation and rollback to fail-closed
  - explicit path/side-effect boundaries for the new contained surface
out_of_scope:
  - execute_code backend containment until shell seam is proven
  - broad allow paths for standard Hermes terminal or generic tool dispatch
  - Hermes Agent upstream push or PR
  - weakening security posture or disabling Guardian outside scoped tests
  - non-cooperative or host-side mutation claims
side_effects_declared:
  - New proposal, gate-selection, and later plan/verification artifacts under UACP_ROOT.
  - Potential later runtime adapter source and policy changes only if proposal/plan are approved.
  - No allow-path enablement in this phase.
constraints:
  - Standard terminal and execute_code remain fail-closed until containment is proven and verified.
  - uacp_sandbox_check remains evidence-only and must not be treated as a permission grant.
  - Any implementation must preserve UACP runtime trust boundary and out-of-band revalidation language.
accepted_residual_risks:
  - The contained execution seam is not yet implemented.
  - execute_code backend containment remains explicitly deferred.
  - Guardian can verify evidence but cannot yet execute inside the seam because the seam does not exist.
phase_local_granularity:
