schema_version: '0.1'
kind: uacp.proposal
proposal_id: uacp-phase5-kanban-guard-20260514
run_id: uacp-phase5-kanban-guard-20260514-130416
phase: propose
status: draft_for_review
triage_artifact: state/runs/uacp-phase5-kanban-guard-20260514-130416-triage.yaml
summary: >-
  Phase 5 proposes a Kanban guard for UACP-bound tasks: Kanban task completion
  must carry mandatory UACP evidence and Guardian metadata before a worker can
  claim completion for governed work. Kanban remains a coordination substrate;
  UACP phase state remains in UACP artifacts.
authority:
  requested_by: Mike
  authorization_source: current private Telegram instruction, "Let go"
  authority_status: pass
problem_statement: >-
  Hermes Kanban can persist and coordinate UACP work, but UACP-bound task
  completion currently risks becoming an ungoverned assertion if a worker marks
  done without evidence, Guardian context, declared side effects, or traceability
  to the active UACP run. Phase 5 should close that gap without converting Kanban
  into the lifecycle state machine.
objectives:
  - Define the required evidence contract for UACP-bound Kanban task completion.
  - Ensure UACP-bound completions include Guardian metadata: run id, phase, authority artifact, policy version, declared side effects, and evidence references.
  - Add or update runtime checks so missing required UACP completion metadata blocks or flags completion for governed tasks.
  - Preserve non-UACP Kanban task behavior unless a task explicitly opts into UACP/governance context.
  - Record verification evidence proving both positive and negative completion paths.
non_goals:
  - Do not make Kanban the UACP lifecycle state machine.
  - Do not weaken Guardian or Heartgate.
  - Do not implement broad autonomous Phase 5 execution without proposal review and focused council.
  - Do not change external/public Hermes upstream without explicit operator approval.
  - Do not require UACP metadata for ordinary non-governed Kanban tasks.
affected_surfaces:
  - Hermes Kanban task completion protocol and metadata validation.
  - UACP state/run artifacts for task-to-run traceability.
  - Guardian metadata propagation or verification surfaces used by Kanban workers.
  - Live proof/verification harnesses for positive and negative Kanban completion cases.
declared_side_effects:
  - Create Phase 5 proposal and gate-selection artifacts.
  - Later implementation may modify UACP-owned runtime adapter/source or Hermes Kanban integration code after PLAN/EXECUTE approval.
  - No destructive action, push, public upstream change, or security weakening is authorized by this proposal alone.
constraints:
  - Use governed UACP writers for docs/config/state/artifacts.
  - Keep standard terminal/execute_code fail-closed for UACP-bound execution unless contained evidence exists.
  - Keep Kanban as coordination memory; UACP state/current remains canonical lifecycle state.
  - Proposal must be reviewed by focused council before PLAN/EXECUTE because completion semantics affect evidence integrity.
risks:
  - id: false_positive_completion
    severity: high
    mitigation: Add negative tests/probes where UACP-bound completion lacking evidence is blocked or flagged.
  - id: global_kanban_regression
    severity: medium
    mitigation: Scope checks to UACP-bound tasks only and preserve ordinary Kanban behavior.
  - id: metadata_sprawl
    severity: medium
    mitigation: Define a compact canonical metadata shape rather than ad hoc fields.
  - id: hidden_lifecycle_drift
    severity: high
    mitigation: Explicitly prohibit treating Kanban task status as UACP phase state.
review_plan:
  proposal_review: focused_agent_council
  required_roles:
    - Kanban lifecycle reviewer
    - Guardian/security reviewer
    - Runtime integration reviewer
  council_before_execute: true
rollback_plan:
  - Revert Phase 5 implementation commit if Kanban completion behavior regresses.
  - Disable any UACP-specific Kanban guard hook/config if ordinary Kanban tasks are affected unexpectedly.
  - Preserve current UACP state artifacts and do not rely on Kanban status as rollback authority.
verification_plan:
  - Positive probe: UACP-bound task completion with required evidence and Guardian metadata succeeds.
  - Negative probe: UACP-bound task completion missing evidence is blocked or clearly rejected.
  - Negative probe: UACP-bound task completion missing run/phase/authority/policy metadata is blocked or clearly rejected.
  - Regression probe: non-UACP Kanban task completion remains unaffected.
  - Artifact traceability: completed UACP-bound task links to active run and evidence artifact.
