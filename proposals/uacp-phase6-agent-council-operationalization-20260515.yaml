title: Phase 6 Agent Council Operationalization
objective: >-
  Close the gap between existing canonical Agent Council doctrine and executable UACP
  operations: repeatable council dispatch, retrieval-led evidence obligations, synthesis
  artifact shape, blocker/concern rerun handling, and transition references.
problem_statement: >-
  Phase 5 proved that council review must be grounded in repository/docs/config/runtime
  evidence, not the orchestrator's inferred understanding. UACP already contains substantial
  Agent Council doctrine across docs/orchestration-model.md, docs/lifecycle-reference.md,
  config/review-routing.yaml, and config/phase-transitions.yaml. Phase 6 should not create
  parallel doctrine; it should make the existing doctrine operationally executable through
  bounded artifacts, skills, validator checks, and dispatch/runbook patterns.
baseline_sources:
  canonical_docs:
    - docs/orchestration-model.md
    - docs/lifecycle-reference.md
    - docs/runtime-enforcement.md
  canonical_config:
    - config/review-routing.yaml
    - config/phase-transitions.yaml
    - config/evidence-clusters.yaml
    - config/state.yaml
  prior_plan_set:
    path: plans/uacp-agent-council-followthrough/
    required_plan_action: PLAN must inventory this plan set and mark each relevant item as reused, superseded, deferred, or out of scope.
  phase5_lessons:
    - knowledge/phase5-kanban-guard-resolve-lessons-20260514.md
scope:
  in_scope:
    - Define an executable Agent Council operational protocol derived from existing canonical doctrine.
    - Define retrieval-led evidence checklist and require inspected_paths/file evidence in council synthesis artifacts.
    - Bind phase-local council outputs to config/phase-transitions.yaml council_synthesis_schema.
    - Define distinct artifact conventions for phase-local council synthesis vs Heartgate Council/coherence artifacts.
    - Define unified blocker/concern rerun protocol using existing escalation semantics and Phase 5 rerun lessons.
    - Clarify interaction boundaries among UACP lifecycle state, Heartgate Council/coherence, Agent Council, Kanban coordination memory, and runtime tools.
    - Decide in PLAN whether proposal/triage artifact validation is added now or accepted as a structured deferred risk.
    - Decide in PLAN whether evidence_domain_registry/runtime selector work is included or explicitly deferred.
    - Update canonical UACP docs/config/skills/validators only if PLAN approves exact surfaces and governed writer boundaries.
  out_of_scope:
    - Replacing Hermes Kanban or treating Kanban as lifecycle state.
    - Kanban-backed council automation while current dogfood posture pauses Kanban for UACP design dogfood, unless PLAN explicitly reopens with evidence.
    - Public Hermes Agent upstream PR/push.
    - New external runtime bridge implementation unless later council evidence shows it is necessary.
    - Weakening Guardian/Heartgate/security boundaries to improve convenience.
declared_side_effects:
  - Writes UACP proposal/gate-selection/state/verification artifacts locally.
  - Later phases may modify UACP docs/config/skills/validators through governed writer tools.
  - No public/upstream push, destructive action, or security weakening is authorized by this proposal.
authority:
  requested_by: Mike
  authorization_source: current private Telegram instruction, "continue"
  status: pass
trust_boundary:
  protected_state: UACP lifecycle state and Guardian/Heartgate config remain governed.
  state_mutation_boundary: Any state-touching operationalization must route through uacp-state or governed state writer surfaces, not generic writes.
  docs_config_boundary: Canonical docs/config mutations must use governed UACP writer tools.
  external_repos: Public Hermes Agent upstream remains gated and out of scope unless separately approved.
  private_repo_push: not authorized by this proposal; ask later if needed.
operational_constraints:
  current_mode: manual_semi_auto
  kanban_for_uacp_design_dogfood: paused unless PLAN explicitly reopens it with evidence
  delegate_model_routing: Use configured Delegate Task routing/operator constraints; do not hardcode model names in canonical docs/config.
  external_council_escalation: Escalate beyond local role-diverse council only when runtime diversity, scale, or verification confidence materially justifies it.
planned_deliverables:
  - id: retrieval_led_council_protocol
    summary: Minimum evidence retrieval checklist, inspected_paths requirement, and file/path evidence expectations for governance/runtime councils.
  - id: council_synthesis_artifact_contract
    summary: Phase-local council outputs use uacp.council_synthesis; transition artifacts reference council_synthesis_artifact separately from heartgate_coherence.artifact_path.
  - id: blocker_concern_rerun_protocol
    summary: Define how blockers/concerns are patched, accepted, deferred, rerun, and recorded before phase transitions.
  - id: prior_plan_set_reconciliation
    summary: Inventory plans/uacp-agent-council-followthrough/ and mark reuse/supersede/defer/out-of-scope.
  - id: validator_coverage_decision
    summary: Prefer adding validator coverage for uacp.proposal/uacp.triage; otherwise record structured accepted risk with owner/condition.
  - id: evidence_domain_registry_decision
    summary: Decide whether evidence_domain_registry/runtime selector becomes part of Phase 6 or remains deferred.
risks:
  - id: council_state_collapse
    severity: high
    owner: phase6_plan
    residual_risk: Council protocol could accidentally become state or coordination memory.
    condition: PLAN must preserve UACP state, Kanban coordination, and Agent Council cognition separation.
    mitigation: Keep state in UACP artifacts, Kanban as coordination memory, council as deliberative evidence.
  - id: false_confidence_from_summary_only_review
    severity: high
    owner: phase6_execute
    residual_risk: Council may endorse governance claims without ground-truth retrieval.
    condition: Council synthesis must record inspected_paths and file/path evidence.
    mitigation: Require retrieval-led council prompts and synthesis artifacts.
  - id: duplicate_or_parallel_doctrine
    severity: high
    owner: phase6_plan
    residual_risk: Phase 6 could restate or fork existing Agent Council doctrine.
    condition: PLAN must baseline against canonical docs/config and prior followthrough plan set.
    mitigation: Reuse existing doctrine and implement missing operational seams only.
  - id: over_automation_without_authority
    severity: medium
    owner: phase6_execute
    residual_risk: Runtime automation could exceed current manual_semi_auto posture.
    condition: Any runtime automation requires explicit PLAN scope and Heartgate validation.
    mitigation: Separate protocol/docs/config from runtime automation; gate external/runtime changes.
  - id: model_routing_drift
    severity: medium
    owner: phase6_plan
    residual_risk: Canonical artifacts could hardcode transient model preferences.
    condition: Keep canonical docs/config model-agnostic and route through configured delegate/profile policy.
    mitigation: Use configured routing/operator constraints rather than model names in canonical rules.
  - id: unvalidated_proposal_triage_shape
    severity: medium
    owner: phase6_plan
    residual_risk: Proposal/triage artifacts can drift because validator coverage is incomplete.
    condition: PLAN must add validator coverage or explicitly accept/defer with owner and condition.
    mitigation: Prefer validator coverage as an EXECUTE deliverable.
