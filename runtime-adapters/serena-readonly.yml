# UACP read-only Serena mode — symbol/diagnostic queries ONLY.
#
# Serena is wired as a read-only LSP overlay (see runtime-adapters/serena.md).
# This custom mode is referenced by absolute path from .claude-plugin/plugin.json
# (--mode ${CLAUDE_PLUGIN_ROOT}/runtime-adapters/serena-readonly.yml). It excludes
# EVERY mutator — including rename_symbol / safe_delete_symbol, which no built-in
# mode excludes — plus Serena's project-memory + onboarding tools (which would
# create ungoverned .serena/memories/* outside UACP's governed state). The prompt
# is empty so Serena injects no behavioral framing into the host agent.
#
# Keeps the read-only LSP set: find_symbol, find_declaration, find_implementations,
# find_referencing_symbols, get_symbols_overview, get_diagnostics_for_file.
description: UACP read-only LSP overlay — symbol/diagnostic queries only; all editing, refactoring, shell, and memory/onboarding tools disabled.
prompt: ""
excluded_tools:
  # editing / file mutators (the planning-mode set)
  - create_text_file
  - replace_symbol_body
  - insert_after_symbol
  - insert_before_symbol
  - delete_lines
  - replace_lines
  - insert_at_line
  - replace_content
  - execute_shell_command
  # refactoring mutators NOT covered by any built-in mode (Codex P1)
  - rename_symbol
  - safe_delete_symbol
  # project-memory + onboarding — would write ungoverned .serena/memories/* (Codex P2)
  - write_memory
  - read_memory
  - list_memories
  - edit_memory
  - delete_memory
  - rename_memory
  - onboarding
included_optional_tools: []
