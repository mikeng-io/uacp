# Vendored third-party skills — manifest for the (deferred) `update-vendored-skills`
# tooling. Each entry pins the upstream source + commit so the copy under
# skills/<name>/ is auditable and upgradable. The copy ships WITH the UACP plugin
# (depth-2, auto-discovered); this manifest is how it stays manageable. A skill dir
# is recognized as vendored (and lint-exempt) by the presence of a NOTICE file.
#
# Backlog: see TASKS.jsonl T-001 (build the updater; evaluate the
# vercel-labs/agent-skills + `npx skill` model as a management/source option).

