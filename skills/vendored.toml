license      = "MIT"
path         = "skills/code-review"
vendored     = "2026-06-21"
# MIT-permitted modifications applied at vendor time (see skills/code-review/NOTICE):
modifications = [
  "relocated to skills/code-review (depth-2) so it installs with the CC plugin",
  "renamed code-review-skill -> code-review (dir + SKILL.md name)",
]
