kind: uacp.run_state
run_id: uacp-governed-lifecycle-dry-run
status: closed
current_stage: resolve
current_phase: resolve
authority:
  status: pass
  source: "operator requested continued UACP development after bootstrap closure"
transition_artifact: "state/runs/uacp-governed-lifecycle-dry-run-verify-to-resolve-transition.yaml"
council_synthesis_artifact: "verification/uacp-governed-lifecycle-dry-run-verify-council.yaml"
bootstrap_closed: true
governed_mutation_active: true
artifacts:
  triage: "proposals/uacp-governed-lifecycle-dry-run-triage.yaml"
  proposal: "proposals/uacp-governed-lifecycle-dry-run-proposal.yaml"
  plan: "plans/uacp-governed-lifecycle-dry-run-plan.yaml"
  execution: "executions/uacp-governed-lifecycle-dry-run.yaml"
  verification: "verification/uacp-governed-lifecycle-dry-run-resolve.yaml"
  resolution: "outputs/uacp-governed-lifecycle-dry-run-summary.yaml"
  learning: "knowledge/lessons/uacp-governed-lifecycle-dry-run.yaml"
selected_clusters:
  - document_authority
  - state_traceability
  - version_control_binding
  - memory_lessons
  - council_checkpoint
  - write_containment
  - blocker_synthesis
  - adaptive_gate_selection
  - hermes_kanban_boundary
kanban:
  enabled: false
  board_slug: ""
  root_task_ids: []
  parent_child_graph: []
  assignee_profile: ""
  workspace:
    kind: scratch
    path_policy: "UACP_ROOT-relative"
  completion_summary_ref: ""
  metadata: {}
invariants:
  - id: document_authority
    status: pass
    evidence: "docs/index.md"
  - id: state_traceability
    status: pass
    evidence: "config/state.yaml"
  - id: write_containment
    status: pass
    evidence: "UACP_ROOT only"
  - id: kanban_boundary
    status: pass
    evidence: "docs/lifecycle-reference.md states Kanban is task substrate, not phase state"
  - id: stage_phase_consistency
    status: pass
    evidence: "current_stage and current_phase both equal resolve"
  - id: checkpoint_blocked
    status: pass
    evidence: "Verify checkpoint passed and the run closed at resolve."
deferred_items:
  - id: kanban_binding
    reason: "Kanban remains intentionally unbound for the dry run."
  - id: knowledge-bank-service
    reason: "Service remains deferred until local artifacts and retrieval needs are proven."
state_history:
  - event: initialized
    source: "governed lifecycle dry run"
    artifact: "state/current.yaml"
  - event: triage_completed
    source: "proposal artifact creation"
    artifact: "proposals/uacp-governed-lifecycle-dry-run-triage.yaml"
  - event: proposal_created
    source: "governed lifecycle dry run"
    artifact: "proposals/uacp-governed-lifecycle-dry-run-proposal.yaml"
  - event: gate_selection_created
    source: "governed lifecycle dry run"
    artifact: "proposals/uacp-governed-lifecycle-dry-run-gate-selection.yaml"
  - event: council_synthesis_recorded
    source: "governed lifecycle dry run"
    artifact: "verification/uacp-governed-lifecycle-dry-run-council.yaml"
  - event: plan_created
    source: "governed lifecycle dry run"
    artifact: "plans/uacp-governed-lifecycle-dry-run-plan.yaml"
  - event: plan_verified
    source: "local verification"
    artifact: "verification/uacp-governed-lifecycle-dry-run-plan-verification.yaml"
  - event: execution_started
    source: "governed lifecycle dry run"
    artifact: "executions/uacp-governed-lifecycle-dry-run.yaml"
  - event: plan_to_execute_transition_recorded
    source: "governed lifecycle dry run"
    artifact: "state/runs/uacp-governed-lifecycle-dry-run-plan-to-execute-transition.yaml"
  - event: execute_checkpoint_reviewed
    source: "local council review"
    artifact: "verification/uacp-governed-lifecycle-dry-run-execute-checkpoint.yaml"
  - event: execution_package_verified
    source: "local verification"
    artifact: "verification/uacp-governed-lifecycle-dry-run-verification.yaml"
  - event: resolve_package_completed
    source: "local execution"
    artifact: "outputs/uacp-governed-lifecycle-dry-run-summary.yaml"
  - event: execute_to_verify_transition_recorded
    source: "governed lifecycle dry run"
    artifact: "state/runs/uacp-governed-lifecycle-dry-run-execute-to-verify-transition.yaml"
  - event: verify_started
    source: "local verification"
    artifact: "verification/uacp-governed-lifecycle-dry-run-verify.yaml"
  - event: verify_checkpoint_reviewed
    source: "local council review"
    artifact: "verification/uacp-governed-lifecycle-dry-run-verify-council.yaml"
  - event: verify_to_resolve_transition_recorded
    source: "governed lifecycle dry run"
    artifact: "state/runs/uacp-governed-lifecycle-dry-run-verify-to-resolve-transition.yaml"
  - event: resolve_completed
    source: "local verification"
    artifact: "verification/uacp-governed-lifecycle-dry-run-resolve.yaml"
