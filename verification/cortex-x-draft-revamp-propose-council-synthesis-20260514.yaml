schema_version: "0.1"
kind: uacp.council_synthesis
artifact_id: cortex-x-draft-revamp-propose-council-synthesis-20260514
run_id: cortex-x-draft-revamp-20260514
phase: propose
mode: propose
council_tier: tier_1_bounded
status: concerns
reviewed_artifacts:
  - "proposals/cortex-x-draft-revamp-20260514.yaml"
  - "proposals/cortex-x-draft-revamp-20260514-gate-selection.yaml"
  - "CORTEX_ROOT/src/cortex/activities/casual_compose.py"
  - "CORTEX_ROOT/src/cortex/workflows/x_casual_composer.py"
  - "CORTEX_ROOT/config/x_casual.yaml"
roles:
  - role: architecture_reviewer
    verdict: concerns
    key_findings:
      - "MaterialBundle and AngleContract already exist; proposal should frame the revamp as additive, not a rewrite."
      - "Real deltas are ContentIntentContract/DraftPlan, StanceLedgerCheck, and multi-language support."
      - "draft_lang is hardcoded across compose/state/model/Discord surfaces; PLAN must inventory all call sites."
      - "Stance ledger boundary is unresolved: new DB table vs query over existing x_originals/editorial index vs in-memory recent cache."
      - "XInteractionWorkflow has separate drafting logic and must be explicitly in/out of scope."
  - role: voice_coherence_reviewer
    verdict: concerns
    key_findings:
      - "Current prompt forbids Cantonese vernacular and hardcodes HK Traditional written register, conflicting with hybrid-by-context requirement."
      - "PLAN must define register selector examples, not leave hybrid language to the LLM."
      - "Tone selection should become context-aware or rebalance away from analytical dominance."
      - "Practitioner voice needs grounding to avoid fake authority."
      - "Pulse fallback needs telemetry/rate limits or stricter quality gates because pulses are synthetic context."
      - "Tool/repo praise and criticism must be scoped to avoid fake endorsements or reversals."
  - role: verification_reviewer
    verdict: concerns
    key_findings:
      - "Existing tests cover many safety gates, but x_casual dry_run coverage is currently minimal."
      - "No content-diversity, language-mode, or stance-ledger tests exist yet."
      - "CJK density ratio needs per-language length calibration rather than one flat zh-hk ceiling."
      - "Acceptance evidence must include fixtures for content types, language modes, contradiction/evolution cases, dry_run side-effect isolation, and Discord metadata."
      - "Reviewer unexpectedly wrote CORTEX_ROOT/docs/design/editorial-mass-restructure/x-draft-verification-review.md; this is recorded as an out-of-band side effect requiring operator disposition."
blockers:
  - id: language_mode_taxonomy_undefined
    severity: high
    description: "PLAN needs concrete examples and rules for each language mode/register."
  - id: stance_ledger_boundary_undefined
    severity: high
    description: "PLAN must choose DB/config/artifact/existing-index boundary before implementation."
  - id: draft_lang_hardcoded_surface_inventory
    severity: high
    description: "PLAN must inventory all hardcoded zh-hk surfaces and conditionalize language-specific gates."
  - id: verification_fixture_gap
    severity: high
    description: "PLAN must define representative fixtures and acceptance evidence before code execution."
concerns:
  - "Preserve existing AngleContract and gates; do not rewrite the whole compose lane."
  - "Keep zh-hk current path stable behind config/default while introducing auto/hybrid modes incrementally."
  - "Define gate ordering: ContentIntent pre-compose; StanceLedger likely post-compose blocking/advisory with pre-compose prior context."
  - "Do not add expensive LLM checks on every tick without thresholding."
  - "Decide if XInteractionWorkflow is explicitly out of initial scope."
out_of_band_side_effects:
  - path: "CORTEX_ROOT/docs/design/editorial-mass-restructure/x-draft-verification-review.md"
    status: untracked_created_by_delegate
    disposition_required: true
    note: "This write was not in the declared current side effects. Do not rely on it as canonical until Mike decides whether to keep, move, or delete it."
proposal_patch_requirements_before_plan:
  - "Patch proposal/gate-selection to include council blockers above or carry them explicitly into PLAN."
  - "If proceeding, split PLAN package under plans/cortex-x-draft-revamp/: ground truth, requirements, design, execution plan, verification."
  - "Before any Cortex code change, create a branch/worktree and declare allowed/forbidden files."
overall_verdict: >
  Proposal may continue to PLAN after concerns are incorporated. No implementation,
  DB migration, live schedule change, or public posting should occur before PLAN approval.
