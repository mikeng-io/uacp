      - Added heartgate runtime negative fixture fail-execute-deferred-required-piv-ready.yaml.
    status: resolved
  - id: HIGH-1
    source: kimi
    severity: high
    summary: RESOLVE runtime could drop VERIFY residual risks.
    remediation:
      - Runtime RESOLVE gate now validates resolve package and closure through the canonical validator.
      - Added heartgate runtime negative fixture fail-resolve-dropped-residual-risk.yaml.
    status: resolved
  - id: HIGH-2
    source: kimi
    severity: high
    summary: VERIFY runtime self-remediation and fact-source semantics were shallow.
    remediation:
      - Runtime VERIFY gate now validates verification package and readiness through the canonical validator, including self-approval/fact/assumption rules.
