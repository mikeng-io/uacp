schema_version: '0.1'
kind: uacp.resolve_closure_evidence_model_review
review_id: resolve-closure-evidence-model-review-20260520
phase: resolve
status: draft
scope:
  - final closure evidence
  - residual risk / deferred item preservation
  - lessons disposition
  - state / memory / skill decisions
  - operator handoff
  - bypass risks
source_artifacts:
  - verification/resolve-phase-gap-audit-20260519.yaml
  - config/phase-transitions.yaml
  - docs/reference/operator-phase-return-schema.md
  - /home/norty/.hermes/skills/devops/uacp/uacp-resolve/SKILL.md
recommendation: >-
  Introduce a canonical resolve closure package plus a smaller operator-facing
  closure artifact. Keep full evidence in the package; emit only decision-grade
  summary in operator handoff.

canonical_field_model:
  resolve_package:
    kind: uacp.resolve_package
    required_fields:
      - schema_version
      - kind
      - package_id
      - run_id
      - phase
      - status
      - created_at
      - closure_artifact
      - evidence_index
      - verify_readiness_ref
      - final_decision
      - residual_risks
      - deferred_items
      - lessons_disposition
      - state_memory_skill_decisions
      - operator_handoff
      - bypass_risks
      - provenance
    machine_checkable_constraints:
      - kind_must_equal: uacp.resolve_package
      - phase_must_equal: resolve
      - status_enum: [pass, warn, block]
      - verify_readiness_ref_required: true
      - closure_artifact_required: true
      - evidence_index_must_have_artifact_paths: true
      - residual_risks_must_be_list_of_maps: true
      - deferred_items_must_be_list_of_maps: true
      - lessons_disposition_must_be_list_of_maps: true
      - state_memory_skill_decisions_must_be_list_of_maps: true
      - operator_handoff_required: true
      - bypass_risks_required: true
  closure_artifact:
    kind: uacp.resolve_closure
    required_fields:
      - schema_version
      - kind
      - closure_id
      - run_id
      - phase
      - decision
      - authority
      - evidence_pointer
      - final_state
      - open_items
      - preserved_risks
      - disposition_summary
      - handoff_summary
    machine_checkable_constraints:
      - kind_must_equal: uacp.resolve_closure
      - phase_must_equal: resolve
      - decision_enum: [pass, warn, block, no_action]
      - final_state_required: true
      - evidence_pointer_required: true
      - open_items_must_expose_owner_condition_acceptance: true
      - preserved_risks_must_not_be_empty_when_decision_is_warn_or_block: true
  lessons_disposition:
    kind: list[uacp.resolve_lesson_disposition]
    required_fields:
      - lesson_id
      - source
      - disposition
      - rationale
      - owner
      - target_store
    disposition_enum: [memory, skill, docs, knowledge, no_action]
    machine_checkable_constraints:
      - each_item_requires_source: true
      - each_item_requires_rationale: true
      - no_action_requires_rationale: true
      - memory_requires_stable_fact_scope: true
      - skill_requires_repo_or_skill_store_target: true
      - docs_requires_document_path_target: true
      - knowledge_requires_durable_knowledge_path_target: true
  state_memory_skill_decisions:
    kind: list[uacp.resolve_followup_decision]
    required_fields:
      - decision_id
      - target_type
      - target_ref
      - action
      - rationale
      - owner
      - boundary
    target_type_enum: [state, memory, skill, docs, no_action]
    action_enum: [write, defer, none]
    machine_checkable_constraints:
      - state_decisions_require_state_ref: true
      - memory_decisions_require_stable_fact_only: true
      - skill_decisions_require_store_boundary_clarification: true
      - no_action_requires_explicit_reason: true
  operator_handoff:
    kind: uacp.operator_phase_return
    required_fields:
      - kind
      - version
      - run_id
      - phase
      - status
      - conclusion
      - what_changed
      - why_it_matters
      - decision
      - invariants_preserved
      - risks
      - next_action
      - evidence_pointer
      - raw_details_available
    machine_checkable_constraints:
      - phase_must_equal_resolve: true
      - raw_details_available_must_be_boolean_true_or_false: true
      - risks_items_require_severity_summary_handling: true
      - next_action_requires_requires_operator_boolean: true
  bypass_risks:
    required_fields:
      - risk_id
      - bypass_surface
      - trigger
      - impact
      - detection
      - prevention
      - residual_risk
      - owner
      - status
    machine_checkable_constraints:
      - bypass_surface_required: true
      - trigger_required: true
      - impact_required: true
      - prevention_required: true
      - status_enum: [open, mitigated, accepted, blocked]
      - must_include_manual_drill_or_runtime_escape_hatch_risks: true

canonical_field_definitions:
  package_id: 'stable identifier for the resolve package, usually run-scoped'
  closure_id: 'identifier for the compact closure artifact'
  verify_readiness_ref: 'path or artifact id for verification/{run_id}-resolve-readiness.yaml'
  evidence_index: 'index of all closure evidence files and hashes or pointers'
  final_decision: 'final lifecycle outcome and rationale'
  residual_risks: 'remaining risks that are not solved by closure'
  deferred_items: 'owned carry-forward items with condition and acceptance'
  lessons_disposition: 'where each lesson goes and why'
  state_memory_skill_decisions: 'explicit decision record for state, memory, skill, docs, or no_action'
  operator_handoff: 'summary layer for human control channels'
  bypass_risks: 'known escape hatches or unguarded paths that could bypass policy'

bypass_risk_notes:
  - 'Treat any manual-drill exception as a bypass risk unless explicitly bounded to a local reversible artifact.'
  - 'Do not collapse residual risk into pass status; warn or block must preserve the risk record.'
  - 'Do not record volatile task progress in memory; memory is for durable stable facts only.'
  - 'Skill updates outside the repo boundary must be labeled as external skill-store dependencies.'
  - 'Operator handoff should never be the only evidence pointer; it points to the package, not replace it.'

next_steps:
  - 'Codify these fields in the RESOLVE validator schema.'
  - 'Require closure package + operator handoff in phase exit invariants.'
  - 'Add negative tests for missing readiness ref, dropped residuals, and unowned deferred items.'
