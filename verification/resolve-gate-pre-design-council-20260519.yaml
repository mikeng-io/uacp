  - id: resolve-design-001
    severity: block_if_ignored
    summary: RESOLVE must own closure semantics, not truth judgment.
    design_constraint: Consume VERIFY readiness, preserve unresolved items, and produce closure/handoff/lessons without re-litigating evidence.
    status: accepted_for_implementation
  - id: resolve-design-002
    severity: block_if_ignored
    summary: RESOLVE must bind to verification/{run_id}-resolve-readiness.yaml and block if not ready.
    design_constraint: Closure artifact must load run-bound readiness and reject stale/unrelated readiness artifacts.
    status: accepted_for_implementation
  - id: resolve-design-003
    severity: block_if_ignored
    summary: Residual risks, assumptions, deferred items, warnings, and blockers cannot be dropped during closure.
    design_constraint: Closure must preserve or explicitly disposition every unresolved item with owner/condition/accepted_by.
    status: accepted_for_implementation
  - id: resolve-design-004
    severity: block_if_ignored
    summary: Lessons and memory/skill/doc updates require explicit disposition.
    design_constraint: Lesson records must classify memory, skill, docs, knowledge, or no_action with rationale, owner, durability, and risk_if_persisted.
    status: accepted_for_implementation
  - id: resolve-design-005
    severity: block_if_ignored
    summary: Operator handoff must be decision-grade, not raw inventory.
    design_constraint: Handoff requires conclusion, decision, risks, next/not-next, and evidence pointer.
    status: accepted_for_implementation
residual_risks:
