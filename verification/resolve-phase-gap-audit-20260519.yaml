mode: retrieval_led_gap_audit
inspected_paths:
  - config/phase-transitions.yaml
  - docs/architecture/0013-adaptive-verify-evidence.md
  - /home/norty/.hermes/skills/devops/uacp/uacp-resolve/SKILL.md
  - outputs/uacp-patch-plan-20260515-resolve.yaml
  - outputs/uacp-patch-plan-20260515-lessons.yaml
  - state/runs/*verify-to-resolve-transition.yaml
conclusion:
  status: block_until_resolve_gate_designed
  summary: >-
    RESOLVE remains the final under-modeled lifecycle phase. VERIFY now produces
    run-bound resolve readiness, but RESOLVE itself only requires an outputs glob
    and VERIFY->RESOLVE ledger. It does not yet enforce closure packages,
    final decision provenance, residual-risk preservation, lesson disposition,
    memory/skill/doc update decisions, or operator handoff quality.
current_ground_truth:
  phase_config:
    resolve_exit_invariants:
      - artifact_glob: outputs/{run_id}*
      - gate_ledger_entry: VERIFY->RESOLVE
    missing:
      - adaptive_resolve_closure_gate
      - canonical outputs/{run_id}/ semantic closure package
      - uacp.resolve_closure validation
      - uacp.resolve_package validation
      - verify_resolve_readiness intake binding
      - lessons/memory/skill/doc disposition validation
  verify_boundary:
    present:
      - verification/{run_id}-resolve-readiness.yaml
      - verified facts and assumptions separation
      - Heartgate coherence status
      - self-approval guard
    missing_in_resolve:
      - enforcement that RESOLVE consumed current run readiness
      - enforcement that residual risks/deferred items were carried forward
      - enforcement that RESOLVE did not discard unresolved VERIFY obligations
identified_gaps:
  - id: resolve_package_missing
    severity: block
    evidence: config/phase-transitions.yaml lines 144-164
    summary: RESOLVE accepts any outputs/{run_id}* artifact without canonical package or index.
    required_design_constraint: Require outputs/{run_id}/00-index.md and semantic closure modules for selected governed/non-trivial work.
  - id: readiness_consumption_unenforced
    severity: block
    evidence: VERIFY produces resolve-readiness but RESOLVE has no validator kind consuming it.
    summary: RESOLVE can close without proving it consumed the run-bound VERIFY readiness artifact.
    required_design_constraint: Resolve closure must bind to verification/{run_id}-resolve-readiness.yaml and block if ready_for_resolve is not true.
  - id: residual_risk_drop_possible
    severity: block
    evidence: Current outputs can summarize closure without carrying VERIFY residual risks/deferred items.
    summary: RESOLVE may accidentally launder residual risks into silence.
    required_design_constraint: Closure must import or explicitly disposition residual risks, assumptions, deferred items, and open warnings from VERIFY readiness.
  - id: lessons_disposition_missing
    severity: warn
    evidence: uacp-resolve skill says decide memory/skill/docs updates, but validator has no schema.
    summary: Durable lessons can be lost or mis-saved to personal memory.
    required_design_constraint: >-
      Require lesson disposition records classified as memory, skill, docs,
      knowledge, or no_action with rationale and owner.
  - id: final_operator_handoff_missing
    severity: warn
    evidence: Operator summary rule exists but RESOLVE has no phase-specific handoff package.
    summary: Final closure may return raw file inventory or omit decision/risks/next action.
    required_design_constraint: Resolve package must include operator handoff summary with conclusion, residual risks, next/not-next, and evidence pointer.
pre_design_questions:
  - What must RESOLVE add beyond VERIFY readiness rather than duplicating VERIFY?
  - How should residual risks and deferred items be carried into closure without pretending they are solved?
  - What memory/skill/doc lessons belong in durable stores versus no_action?
  - How should RESOLVE prove final state and operator handoff are coherent?
recommended_next_step: pre_design_agent_council
