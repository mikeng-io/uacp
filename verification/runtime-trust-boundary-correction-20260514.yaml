  yaml_outputs_parse: pass
  runtime_docs_updated: pass
  decision_log_updated: pass
residual_risk:
- Manual edits outside the governed runtime cannot be prevented by UACP; they require revalidation before trust.
- Full filesystem containment remains unimplemented.
