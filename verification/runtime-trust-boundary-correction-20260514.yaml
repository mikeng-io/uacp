correction:
  uacp_responsibility:
  - Define lifecycle, authority, evidence, and required runtime posture.
  - Treat out-of-band mutation as untrusted until revalidated.
  guardian_responsibility:
  - Enforce UACP rules inside the controlled runtime/tool path.
  - Verify runtime-provided containment evidence before allowing protected shell/code.
  host_runtime_responsibility:
  - Provide actual containment when UACP-bound shell/code should be enabled.
  - If containment is unavailable or unproven, protected execution remains fail-closed.
