kind: uacp.council_review
review_id: uacp-bootstrap-stage-3-state-binding
scope: "State/version-control checkpoint review"
verdict: blocked
domains_covered:
  - governance
  - state
  - runtime_boundary
  - verification
  - integration
findings:
  high:
    - id: H1
      title: "Missing verification/council artifacts"
      evidence: "The checkpoint manifest previously referenced stage-3 verification and council artifacts that did not exist."
      remediation: "Create the missing artifacts or stop claiming they exist."
    - id: H2
      title: "State manifest was ahead of its evidence"
      evidence: "Proposal and plan pointers were empty while current_stage/current_phase were plan."
      remediation: "Create proposal and plan artifacts or downgrade the run state."
    - id: H3
      title: "Version-control binding unresolved"
      evidence: "UACP_ROOT is not yet a git worktree; tombstone commit pointers remain placeholder values."
      remediation: "Define the git boundary before closing the checkpoint."
  medium:
    - id: M1
      title: "Invariant status schema was too permissive"
      evidence: "Non-waivable invariants allowed warn."
      remediation: "Normalize warn to block for invariants."
    - id: M2
      title: "Registry did not enumerate live state artifacts"
      evidence: "state/current.yaml and state/runs/ were not in the active inventory."
      remediation: "Register runtime state explicitly."
summary: >
  The checkpoint is now documented, but remains blocked. The main failure mode
  was a manifest that claimed council and verification evidence before those
  artifacts existed. The supporting schemas and registry have been tightened to
  reduce future drift, but the git/version-control decision remains deferred.
