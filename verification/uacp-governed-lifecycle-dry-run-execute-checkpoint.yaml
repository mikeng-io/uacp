    - id: H1
      title: "Transition pointer mismatch"
      evidence: "Run manifest still referenced the propose transition while the live state had already advanced to execute."
      remediation: "Point the run manifest at the plan-to-execute transition artifact."
  medium:
    - id: M1
      title: "Stale stage consistency evidence"
      evidence: "The run manifest still claimed stage_phase_consistency with plan-era evidence."
      remediation: "Refresh the evidence text to match execute."
resolution:
  - finding_id: H1
    status: resolved
    evidence: "Run manifest transition pointer now references the plan-to-execute transition artifact."
  - finding_id: M1
    status: resolved
    evidence: "stage_phase_consistency evidence now states current_stage and current_phase both equal execute."
summary: >
  The execute checkpoint is valid and traceable after the pointer and evidence
  refresh. Kanban remains intentionally unbound, and no external side effects
  are introduced by this checkpoint.
conditions:
  - "Keep all writes inside UACP_ROOT."
  - "Do not bind Hermes Kanban yet."
  - "Preserve delete-by-default handling for temporary notes."
