  title: Guardian path resolution uses CWD for relative paths
  evidence: &id003
  - runtime-adapters/hermes/plugins/uacp_guardian/kernel.py Guardian._resolve_path
    resolves relative paths against Path.cwd(), conflicting with UACP_ROOT-relative
    path convention.
  disposition: must_fix_for_enforcement_correctness
- id: B4
  title: uacp_heartgate_check transition path whitelist may be too narrow
  evidence: &id004
  - runtime-adapters/hermes/plugins/uacp_guardian/__init__.py restricts transition_path
    to state/, verification/, executions/.
  disposition: review_and_fix_or_document_as_intentional
