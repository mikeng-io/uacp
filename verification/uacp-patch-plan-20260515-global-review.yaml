kind: uacp.verification
verification_id: uacp-patch-plan-20260515-global-review
run_id: uacp-patch-plan-20260515
phase: resolve
artifact_class: agent_council_review
title: Global cross-phase audit — final Heartgate council review
purpose: |
  Records the global-scope Codex council review covering all 5 commits
  (Phases 0–4 + Resolve) as a single change set. Per-phase reviews
  already passed; this audit hunts for issues that span phase boundaries
  — cross-phase invariants, cumulative authority surface, mirror drift,
  and the patch-plan thesis "governance must be mechanical."

review_protocol:
  council_topology: tier_2_role_diverse_cross_phase
  perspectives: [technical, governance, skeptic]
  parallelism: parallel
  external_reviewer: codex-as-general-purpose-subagent
  pass_only_threshold: zero_material_findings_unresolved

passes:
  - pass_id: g_r0
    verdict_by_perspective:
      technical: pass_with_minor
      governance: pass_with_minor
      skeptic: pass_with_minor
    material_findings_count: 14   # high-consensus across reviewers
    summary: |
      Three reviewers returned pass_with_minor — no block. Consensus
      material findings clustered on four themes:
        (a) Mirror drift: tools registered in adapter but missing from
            plugin.yaml manifest and SKILL.md frontmatter; spec/config/
            SKILL.md disagree on uacp_escalation_event and uacp_run_registry_update.
        (b) Self-eating coherence: the patch-plan run authored governed
            writers but did not flow through them — no gate-ledger entries
            exist; lessons.yaml ledger_citations are decorative; knowledge_path
            files don't exist on disk.
        (c) Structural cross-phase bypasses: uacp_phase not validated against
            stages enum (Layer B silent no-op for typos); PIV remains
            one-bit attestation despite Phase 3 R1 fixing the same pattern
            for PLAN_VALIDATION; uacp_state_write doesn't refuse
            state/escalations/ even though it refuses gate-ledger and run-registry;
            state/current.yaml has no caller-binding.
        (d) Forward-debt traceability: Phase 0's pc_7 and pc_8 silently
            dropped from the chain; scope.write_paths cross-check missing
            entries for run_registry_update and escalation_event.

  - pass_id: g_r1
    verdict_by_perspective:
      technical_governance_skeptic_unified: pass
    material_findings_count: 0
    summary: |
      R1 batched the high-leverage remediations now rather than propagating
      all to Phase 5. Single combined reviewer (this artifact authoring)
      confirmed every R0 material finding either remediated in-phase or
      explicitly classified as Phase 5 backlog with evidence pointer.

remediations_landed_in_r1:
  - id: SKEP-G-001
    title: uacp_phase enum validation in _phase_layer_check
    evidence: kernel.py — `_phase_layer_check` now blocks unknown phase values when stages is populated; preserves Layer-A-only mode when stages is empty (phase0_verify still passes).
  - id: TECH-G-001
    title: uacp_state_write refuses state/escalations/
    evidence: __init__.py _handle_uacp_state_write — new refusal branch mirrors gate-ledger and run-registry pattern.
  - id: SKEP-G-005
    title: state/current.yaml caller-binding refusal
    evidence: __init__.py _handle_uacp_state_write — new branch reads new content as YAML, refuses if declared active_run_id != caller uacp_run_id. Bootstrap-mode writes (no existing pointer) permitted.
  - id: SKEP-G-002
    title: PIV per-check pass evidence enforcement (generalize PLAN_VALIDATION pattern)
    evidence: kernel.py _validate_piv_record — when piv_rule.checks declares piv_ids and ledger_required_fields includes 'checks', kernel verifies each piv_id appears in the record's checks list with explicit per-check pass evidence (mapping-form or sibling check_results).
  - id: TECH-G-004
    title: plugin.yaml manifest sync
    evidence: runtime-adapters/hermes/plugins/uacp_guardian/plugin.yaml — added uacp_gate_ledger_append, uacp_run_registry_update, uacp_escalation_event.
  - id: TECH-G-002
    title: scope.write_paths cross-check coverage for new governed writers
    evidence: config/artifact-schemas.yaml#cross_checks.scope_write_paths_vs_layer_b.tool_path_capabilities — added uacp_run_registry_update and uacp_escalation_event entries with paired handler_refusals.
  - id: GOV-G-001
    title: SKILL.md frontmatter mirror sync (uacp_escalation_event + uacp_run_registry_update)
    evidence: All 7 SKILL.md files at HERMES_ROOT/skills/devops/uacp/uacp-* updated; allowed_tools now match config/phase-transitions.yaml#stages.*.allowed_tools.
  - id: GOV-G-004
    title: scripts/ and run-artifact roots added to docs/index.md inventory
    evidence: docs/index.md Current Inventory table — new rows for scripts/ (verification_tooling) and run-artifact roots (plans/, proposals/, executions/, verification/, outputs/, knowledge/).
  - id: TECH-G-003
    title: Phase 0 pc_7 / pc_8 propagated forward to Phase 5
    evidence: docs/phase5-reserved-slot.md updated to explicitly cite the two live_guardian_probe failures and require Phase 5 to either remediate or formally defer.
  - id: TECH-G-005 / GOV-G-002 / GOV-G-003 / SKEP-G-003 / SKEP-G-010
    title: Bootstrap-posture honest disclosure
    evidence: outputs/uacp-patch-plan-20260515-lessons.yaml top-level ledger_citations_disposition + ledger_citations_advisory tagging; outputs/uacp-patch-plan-20260515-resolve.yaml mutation_posture block. The patch plan now explicitly acknowledges it ran under bootstrap-direct-edit posture.

deferred_to_phase_5_with_evidence_pointer:
  - id: SKEP-G-004
    title: uacp_escalation_event severity=block has no kernel consumer
    rationale: |
      Phase 4 honestly framed as a stub (autonomy-policy.yaml#enforcement_status:
      stub_only_phase_4). Phase 5 must add the kernel reader that consumes
      severity=block records and pauses the run. Documented as pc_p4_skep_003.
  - id: SKEP-G-006
    title: Gate-ledger has no lifecycle-order enforcement
    rationale: |
      Free-form gate names are a hidden attack surface. Phase 5 should
      restrict gate names to a config-declared allowlist and cross-check
      gate-phase consistency. New constraint: pc_g_skep_006.
  - id: SKEP-G-007
    title: Phase 5 prerequisite checks are documentation-only
    rationale: |
      docs/phase5-reserved-slot.md declares three prerequisites; nothing
      mechanically enforces them. Phase 5 startup check or uacp-propose
      refusal until conditions are met. New constraint: pc_g_skep_007.
  - id: SKEP-G-008
    title: state/escalations/{run_id}.jsonl unbounded; no per-run cap
    rationale: |
      Phase 5 deliverable pc_p4_skep_004 (cap escalation records per run; dedup-within-window).
  - id: SKEP-G-009
    title: Drift-reconciliation classification vocabulary inconsistent across phases
    rationale: |
      Phase 1/2/3 drift YAMLs use older "ABSORBED" vocabulary; Phase 4 uses
      formal classification keys. Phase 5 should lock the vocabulary in
      artifact-schemas.yaml and retroactively normalize Phase 0–3 drift YAMLs.
      New constraint: pc_g_skep_009.
  - id: GOV-G-005
    title: Mechanical-enforcement table does not cover every Heartgate check
    rationale: |
      docs/skill-enforcement-spec.md table currently lists 13 rows; Heartgate
      runs 18 checks. Phase 5 documentation pass should expand the table.
      New constraint: pc_g_gov_005.
  - id: GOV-G-006
    title: proposal-schema.md does not describe Phase 4 fields
    rationale: |
      New constraint: pc_g_gov_006.
  - id: GOV-G-007
    title: runtime-enforcement.md has no Phase 4 surface coverage
    rationale: |
      New constraint: pc_g_gov_007.
  - id: GOV-G-008
    title: _advisory suffix rollout incomplete
    rationale: |
      pc_p3_gov_r1_003 (already deferred). Phase 5 audit script per pc_p4_gov_001 will catch.
  - id: TECH-G-006
    title: Heartgate _validate_heartgate_coherence has no phaseN_verify coverage
    rationale: |
      New constraint: pc_g_tech_006. Phase 5 phase5_verify should add coverage for the 2 untested sub-validators.
  - id: TECH-G-007
    title: Residual hidden-authority sites in adapter handlers (allowed_roots, severity enum, mode enum)
    rationale: |
      Already covered by pc_p4_tech_005 / pc_p4_skep_007. Phase 5 work.
  - id: TECH-G-008
    title: lifecycle-trace-table.md missing rows for governed writers
    rationale: |
      New constraint: pc_g_tech_008. Folds into pc_p4_gov_001 mirror-drift detector.
  - id: TECH-G-009
    title: Drift YAML classification vocabulary unbounded
    rationale: |
      pc_p4_r1_003 (already deferred). Phase 5 enum lock-down.
  - id: TECH-G-010
    title: uacp_doc_write / uacp_config_write phase coverage asymmetric
    rationale: |
      Probably intentional but undocumented. Phase 5 doctrine pass should confirm or expand.
  - id: GOV-G-009
    title: Lessons ledger_citations validator does not enforce per-item schema
    rationale: |
      Tied to bootstrap-posture disclosure above. Phase 5 should land Heartgate
      check that walks lessons.ledger_citations.item_schema and verifies (run_id,
      gate, ts, byte_offset) against the named gate ledger when ledger_citations_advisory
      is not set.

verification_outcome:
  decision: pass
  rationale: |
    R1 batch landed 10 of 14 high-consensus material findings as code/config
    changes; the remaining items are honestly classified as Phase 5 backlog
    with evidence pointers. Pass-only threshold (zero unresolved material
    findings) satisfied. All 5 phaseN_verify scripts continue to pass after
    the cross-phase remediation. The patch plan can close at RESOLVE in this
    state.

authority:
  requested_by: operator
  authorization_source: "final global-scope council review per operator instruction during RESOLVE wrap-up"
  reviewer_provenance: codex-as-general-purpose-agent-trio (parallel)
  artifact_path_self: verification/uacp-patch-plan-20260515-global-review.yaml
