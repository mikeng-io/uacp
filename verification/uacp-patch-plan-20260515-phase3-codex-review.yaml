kind: uacp.verification
verification_id: uacp-patch-plan-20260515-phase3-codex-review
run_id: uacp-patch-plan-20260515
phase: execute
artifact_class: agent_council_review
title: Phase 3 Codex council review — three passes
purpose: |
  Records the three-pass Codex review gate for Phase 3 (mechanical
  governance hardening): plan_validation_gate, run_registry, three
  authority docs, and Phase 2 propagated-constraint absorption.

review_protocol:
  council_topology: tier_2_role_diverse
  perspectives: [technical, governance, skeptic]
  parallelism: parallel
  external_reviewer: codex-as-general-purpose-subagent
  pass_only_threshold: zero_material_findings_unresolved
  drift_propagation: classified_per_review

passes:
  - pass_id: r0
    verdict_by_perspective:
      technical: pass_with_minor
      governance: pass_with_minor
      skeptic: block
    material_findings_count: 14
    summary: |
      Initial review exposed missing fail-closed branches, hidden-authority
      patterns in run_registry, run-registry exclusivity declared but not
      enforced, 16-row check list stale, PLAN_VALIDATION as one-bit
      assertion, all-NA cluster bypass, tilde-fence bypass, etc.
    findings:
      - id: TECH-001
        title: _validate_plan_validation_gate fail-OPEN on corrupt ledger lines
      - id: TECH-002
        title: write_paths normalization false-positives on lookalike prefixes
      - id: TECH-003
        title: hardcoded plan->execute transition string
      - id: TECH-004
        title: tool_path_capabilities wildcard filter incomplete
      - id: TECH-005
        title: blocker message hardcodes gate name
      - id: TECH-006
        title: phase3_verify pc_p2_n1 check too weak
      - id: TECH-007
        title: malformed registry entries silently pass
      - id: TECH-008
        title: intent regex misses tilde fences and colon-suffixed headers
      - id: GOV-001
        title: state/run-registry.yaml not in inventory; no schema
      - id: GOV-002
        title: exclusive_mutator declared but not enforced
      - id: GOV-003
        title: 16-step Heartgate check list stale
      - id: GOV-004
        title: PLAN_VALIDATION no ledger discipline
      - id: SKEP-001
        title: PLAN_VALIDATION is a self-attested boolean
      - id: SKEP-002
        title: run-registry exclusivity documentation-only
      - id: SKEP-003
        title: path normalization bypass via ./plans/
      - id: SKEP-004
        title: intent doc only recognizes triple-backtick fences
      - id: SKEP-005
        title: pending-assumption parser substring bypass
      - id: SKEP-006
        title: all-NA cluster bypass at VERIFY->RESOLVE
      - id: SKEP-007
        title: tool_path_capabilities loader treats 'description' key as tool
      - id: SKEP-008
        title: scope.write_paths laundering via state/gate-ledger
      - id: SKEP-009
        title: runtime-enforcement.md 16-row list contradicts kernel
      - id: SKEP-010
        title: corrupted active_runs silently passes
    remediation_actions:
      - PIPE_BUF arithmetic noted as conservative (Linux-only)
      - Fail-closed JSONL parsing added to _validate_piv_record and _ledger_contains_gate
      - PurePosixPath segment normalization replaces ad-hoc string match
      - Metadata-key filter (description, purpose, notes, documentation)
      - Tilde-fence detection added; YAML frontmatter skip
      - Exact-column-name assumptions parser
      - All-NA escape-hatch via handled_findings_chain or accepted_exceptions
      - State machine rejects malformed registry entries
      - state/run-registry.yaml added to docs/index.md inventory
      - artifact-schemas.yaml#run_registry block declared
      - skill-enforcement-spec.md, proposal-schema.md, lifecycle-trace-table.md created
      - docs/runtime-enforcement.md rows 16 (plan_validation_gate) and 17 (run_registry_overlap) added
      - uacp_run_registry_update tool created; uacp_state_write refuses state/run-registry.yaml
      - plan_validation_gate.ledger_required_fields + ledger_required_phase + per-check coverage
      - phase3_verify.py extended to 23 checks (added 12 R1 regression tests)
      - state/gate-ledger handler_refusals added (uacp_state_write and uacp_gate_ledger_append)

  - pass_id: r1
    verdict_by_perspective:
      technical: pass_with_minor
      governance: pass_with_minor
      skeptic: block
    material_findings_count: 10
    summary: |
      Second pass confirmed R0 closures and surfaced second-tier bypasses:
      registry handler skipped UACP context, registry caller could squat
      any run_id, write_paths with .. silently cloaked, flat-string checks
      list bypass, bogus escape-hatch lists, empty scope.write_paths
      bypass, three SKILL.md/spec mirrors stale, writer_tool field
      contradicted the new mechanism.
    findings:
      - id: TECH-R1-001
        title: uacp_run_registry_update skipped UACP context enforcement
      - id: TECH-R1-002
        title: write_paths with '..' cloak from overlap (silent canon-empty)
      - id: GOV-R1-001
        title: skill-enforcement-spec uacp-state Allowed-tools stale
      - id: GOV-R1-002
        title: uacp-plan/SKILL.md missing PLAN_VALIDATION obligation
      - id: GOV-R1-003
        title: uacp-state/SKILL.md missing run-registry exclusivity
      - id: GOV-R1-004
        title: run_registry_rule.writer_tool stale
      - id: SKEP-R1-001
        title: caller could register/deregister any run_id (no binding)
      - id: SKEP-R1-002
        title: bogus handled_findings_chain bypassed all-NA block
      - id: SKEP-R1-003
        title: flat-string checks list without per-check evidence bypassed gate
      - id: SKEP-R1-004
        title: empty scope.write_paths trivially passed
    remediation_actions:
      - _required_uacp_context_missing wired into _handle_uacp_run_registry_update
      - Canonicalize-on-write for entry.write_paths; reject uncanonicalizable
      - SKEP-R1-001 caller binding: entry.run_id == args.uacp_run_id
      - Escape-hatch shape validation via _valid_handled / _valid_exception
      - SKEP-R1-003 per-check pass evidence (mapping-form or sibling check_results)
      - SKEP-R1-006 unknown pv_ids rejected
      - SKEP-R1-007 multi-record DoS resistance (scan all, accept any clean)
      - Empty scope.write_paths blocks unless no_writes_intended sentinel
      - writer_tool corrected, exclusive_mutator renamed to exclusive_mutator_advisory
      - uacp-plan/SKILL.md and uacp-state/SKILL.md updated with R1/R2 sections
      - skill-enforcement-spec.md uacp-state Allowed-tools and Mechanical-enforcement table updated
      - phase3_verify.py extended to 30 checks (added 7 R2 regression tests)

  - pass_id: r2_confirmation
    verdict_by_perspective:
      technical_governance_skeptic_unified: pass_with_minor
    material_findings_count: 0
    summary: |
      Third pass (single combined reviewer) confirmed every pass-1 finding
      remediated with code+test backed evidence at cited lines. Five minor
      forward-looking concerns surfaced; all propagated to Phase 4.
    minor_findings:
      - id: MINOR-R2-001
        title: registry-update docstring overpromised scope-existence check (fixed inline)
      - id: MINOR-R2-002
        title: escape-hatch validator does not surface garbage entries as warnings
      - id: MINOR-R2-003
        title: no_writes_intended not in scope schema or uacp-plan SKILL.md
      - id: MINOR-R2-004
        title: PLAN_VALIDATION DoS-resistance could produce large warning payloads
      - id: MINOR-R2-005
        title: caller uacp_run_id not run through _is_safe_run_id (belt-and-braces)

verification_outcome:
  decision: pass
  rationale: |
    All material findings from R0 and R1 are remediated and verified by
    deterministic phase3_verify checks (30/30 pass). The five minor R2
    findings are propagated to Phase 4 as forward-looking constraints,
    not blockers. The verification protocol's "pass-only" threshold
    (zero material findings unresolved) is satisfied.

propagated_constraints:
  classification_protocol: |
    Each finding is classified as remediated (fix landed in-phase),
    justified (intentional design), or deferred (Phase 4 propagated_constraints).
  to_phase_4:
    - id: pc_p3_tech_r1_001
      description: Every governed writer must call _validate_common_write_args at handler entry. Add a structural audit to phase4_verify.
      rationale: TECH-R1-001 root cause was structural omission.
    - id: pc_p3_tech_r1_002
      description: Canonicalize write_paths at WRITE time, not just at compare. Reject uncanonicalizable entries with a loud error.
      rationale: TECH-R1-002 — currently enforced for registry; also needed in any future writer.
    - id: pc_p3_tech_r1_003
      description: Canonicalize both sides of every path-prefix refusal comparison through _canon_write_path.
      rationale: TECH-R1-004 and TECH-R1-006 — raw startswith leaves whitespace and dot-slash bypass surfaces.
    - id: pc_p3_tech_r1_004
      description: Resolve all canonical state file paths through one config-driven helper.
      rationale: TECH-R1-005 — three sources of truth for the registry path.
    - id: pc_p3_tech_r1_005
      description: Uniform body+envelope record resolver for Heartgate validators.
      rationale: TECH-R1-003.
    - id: pc_p3_tech_r1_006
      description: Every fail-closed validator branch must have a dedicated phase_verify check.
      rationale: TECH-R1-008/009.
    - id: pc_p3_tech_r1_007
      description: Registry mutation must be atomic (tmp + os.replace + advisory lock) before Phase 4 multi-run support.
      rationale: TECH-R1-007 / pc_p3_skep_r1_005.
    - id: pc_p3_gov_r1_001
      description: Add scripts/check_authority_mirror.py to fail verification when tool registrations, policy classifications, and SKILL.md frontmatter drift.
      rationale: Phase 3 introduced uacp_run_registry_update across 5 mirror surfaces; one (uacp-state SKILL.md) drifted before R2 caught it.
    - id: pc_p3_gov_r1_002
      description: Heartgate must cross-check active_runs[*] entries against artifact_schemas.run_registry per-entry schema.
      rationale: GOV-R1-005 — schema currently documentation-grade only.
    - id: pc_p3_gov_r1_003
      description: Adopt _advisory suffix for documentation-only YAML fields. Audit state.yaml#gate_ledger.writer_tool for the same pattern.
      rationale: GOV-R1-004 baseline; pc_p3_skep_r1_007 reinforces.
    - id: pc_p3_gov_r1_004
      description: Require Phase-4 plans to include run_registry_registration + paired deregistration at RESOLVE.
      rationale: Mechanism exists; lifecycle does not yet mandate it.
    - id: pc_p3_skep_r1_001
      description: Cross-verify plans/{run_id}-scope.yaml exists during op=register (close MINOR-R2-001).
      rationale: Docstring promised this; handler defers to Heartgate.
    - id: pc_p3_skep_r1_002
      description: Apply non-empty AND shape-valid idiom to every "escape hatch" check; emit warnings for garbage entries.
      rationale: MINOR-R2-002.
    - id: pc_p3_skep_r1_003
      description: Require per-check evidence in PIV / any future council-driven gate.
      rationale: Generalization of SKEP-R1-003.
    - id: pc_p3_skep_r1_004
      description: Document no_writes_intended in config/artifact-schemas.yaml#scope and uacp-plan SKILL.md.
      rationale: MINOR-R2-003.
    - id: pc_p3_skep_r1_005
      description: Registry atomicity + advisory locking before parallel-run support lands.
      rationale: Phase 4 prerequisite.
    - id: pc_p3_skep_r1_006
      description: Bound PLAN_VALIDATION DoS-resistance warning payload to N defects.
      rationale: MINOR-R2-004.
    - id: pc_p3_skep_r1_007
      description: Add _is_safe_run_id check on caller uacp_run_id (belt-and-braces).
      rationale: MINOR-R2-005.

authority:
  requested_by: operator
  authorization_source: |
    "Enter fully automation mode. Complete each of the phases by yourself.
    At the end of each phase, make sure the agent council is run to perform
    the review and audit ... Also, don't forget to use Codex to do the
    external review."
  reviewer_provenance: codex-as-general-purpose-agent-trio
  artifact_path_self: verification/uacp-patch-plan-20260515-phase3-codex-review.yaml
