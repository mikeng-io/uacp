kind: uacp.verification
verification_id: uacp-patch-plan-20260515-skill-structure-audit
run_id: uacp-patch-plan-20260515
phase: resolve
artifact_class: audit_note
title: Hermes-audit note on post-restructure SKILL.md sizes (out-of-band)
purpose: |
  Documents the informal audit conducted by the Hermes/Norty agent on 2026-05-17
  that surfaced the post-restructure SKILL.md sizes at HERMES_ROOT/skills/devops/uacp/
  as still 11–15 KB each — too large for ACP-style lean conductors. Recorded
  here as the evidence artifact backing the Phase 5 propagated constraint
  `pc_g_skill_structure_cleanup`.

  This is INFORMAL (not a Codex council review); the audit was conducted
  by direct file inspection during the closing window of the patch-plan
  run. Phase 5 should either re-run as a structured council review or
  treat this note as sufficient evidence to schedule the cleanup.

posture: informal_audit_note
audit_date: 2026-05-17
auditor: hermes-norty-agent

observed_state:
  skill_directory: HERMES_ROOT/skills/devops/uacp/
  router_size_kb: 4    # uacp/SKILL.md
  phase_skill_sizes_kb:
    uacp-triage: 6.6
    uacp-propose: 9.0
    uacp-plan: 15.2
    uacp-execute: 14.9
    uacp-verify: 14.5
    uacp-resolve: 11.8
    uacp-state: 14.6
  observation: |
    Router-only file (4 KB) is appropriately lean — the restructure successfully
    reduced router bloat. However the 7 phase skills remain 6.6–15.2 KB each,
    which is large for what should be lean conductors per the ACP pattern.
  comparison_pattern: |
    Trustless ACP and similar projects use SKILL.md as a thin conductor pointing
    at references/, schemas/, scripts/ subdirectories that carry the heavy
    operational detail. UACP's current phase skills inline the operational
    detail directly into SKILL.md.

recommended_cleanup:
  scope: |
    Split each phase skill into:
      SKILL.md                 (lean conductor; <= 4 KB target)
      references/contract.md
      references/checklist.md
      references/pitfalls.md
      references/mode-behavior.md
      schemas/*                (if the skill carries schemas)
      scripts/*                (if the skill needs scripts)
  pilot: |
    Start with uacp-verify as the template since (a) it is both large and
    authority-sensitive, and (b) it carries the self-approval guard
    ("VERIFY must not remediate its own material findings and then self-certify
    final closure") that should be in a dedicated reference doc, not buried
    in SKILL.md.

scope_classification: out_of_band
classification_rationale: |
  The skills live under HERMES_ROOT/skills/devops/uacp/ — outside the UACP_ROOT
  versioned tree (this repository). The cleanup is therefore a Hermes-side
  refactor, not a UACP-core change. It is tracked in the UACP Phase 5 backlog
  as a propagated constraint because UACP doctrine (specifically the authority
  chain in docs/reference/skill-enforcement-spec.md) depends on the skill
  surface being legible, and because the cleanup pattern (SKILL + references/
  + schemas/ + scripts/) is generalizable.

related_findings:
  - id: 1
    finding: |
      Shared root references/ under HERMES_ROOT/skills/devops/uacp/references/
      is still "legacy/quarantined" per the router. Phase 5 cleanup should
      decide which entries are retired vs absorbed into per-skill references/.
  - id: 2
    finding: |
      Some relative links inside SKILL.md files use ambiguous syntax (e.g.
      "uacp/references/adversarial-runtime-review.md" — from inside
      uacp-verify/SKILL.md the resolved path is wrong). Should be normalized
      to either repo-relative or skill-relative consistently.
  - id: 3
    finding: |
      The skill directory is not currently versioned (HERMES_ROOT is not a
      git repo). Provenance for SKILL.md edits relies on filesystem state,
      not git history. Phase 5 should clarify whether the canonical skill
      source is this UACP repository (nortrix-labs/uacp) or a separate
      Hermes skill repo.

propagated_constraint:
  id: pc_g_skill_structure_cleanup
  registered_in: docs/plans/phase5-reserved-slot.md
  related_in_roadmap: ROADMAP.md (Skill structure cleanup section)
  scope: phase_5_or_separate_hermes_run

authority:
  requested_by: operator
  authorization_source: |
    Operator shared the Hermes/Norty agent's post-restructure audit message
    during the doc-restructure closing window. The audit was informational;
    this artifact records it as durable evidence so the Phase 5 backlog
    citation has a traceable target.
  artifact_path_self: verification/uacp-patch-plan-20260515-skill-structure-audit.yaml
