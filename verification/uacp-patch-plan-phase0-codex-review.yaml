tier: tier_2_role_diverse
purpose: >
  Codex full-dimension, full-perspective review gate for Phase 0 of the UACP
  patch plan. Verdict must be pass with zero unresolved material findings
  before Phase 1 begins, per the patch plan's gate specification.

roles:
  - role: technical
    coverage: code correctness, test coverage, fixture and integration semantics
  - role: governance
    coverage: authority chain integrity, non-waivable invariants, documentation completeness, patch-plan compliance
  - role: skeptic
    coverage: regressions, bypass paths, edge cases, silent failure modes

dispatch_surfaces:
  - subagent: general-purpose
    invocation: three parallel agents (one per role), then a final consolidated re-review after remediation

inspected_paths:
  - runtime-adapters/hermes/plugins/uacp_guardian/__init__.py
  - runtime-adapters/hermes/plugins/uacp_guardian/kernel.py
  - config/guardian-policy.yaml
  - docs/runtime-integration-guide.md
  - docs/constitution.md
  - docs/runtime-enforcement.md
  - scripts/phase0_verify.py
  - scripts/live_guardian_probe.py
  - plans/uacp-patch-plan/01-phase0-guardian-bugs.md
  - proposals/uacp-patch-plan-20260515.yaml

# --- First-pass review (3 parallel agents) ---

first_pass_findings:
  - id: SK-001
    severity: material
    category: regression
    description: >
      uacp_artifact_write, uacp_sandbox_check, uacp_contained_shell, uacp_heartgate_check
      were not in policy tool_classification → classified as runtime.extension
      (default block_pending_heartgate) → blocked when UACP-bound. The attestation
      chain Phase 0.1 was designed to enable was dead code: uacp_contained_shell
      itself could not run UACP-bound, so no attestation could be minted, so
      terminal/execute_code could never get a valid attestation_id.
    handling_classification: remediated
    remediation: >
      Added 4 protected_categories (artifact.uacp, evidence.containment,
      exec.shell.contained, lifecycle.transition) with allowed_tools, and added
      4 tool_classification entries in config/guardian-policy.yaml.
    handling_artifact_path: config/guardian-policy.yaml

  - id: G0-01
    severity: material
    category: invariant
    description: >
      Observe mode downgraded containment-missing for UACP-bound shell/code to
      allow_with_audit. Constitution lists "Write containment" as non-waivable.
      This silently waived a non-waivable constitutional invariant.
    handling_classification: remediated
    remediation: >
      Reverted the containment-missing observe-mode downgrade hunk in
      kernel.py. Containment-missing now blocks unconditionally in both modes.
      Added inline comment stating the constitutional non-waivability.
    handling_artifact_path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py

  - id: SK-004
    severity: material
    category: consistency
    description: >
      docs/runtime-integration-guide.md line 350 ("All hooks must be fail-closed")
      contradicted the new line 362 (post-hook is fail-open by architecture).
      Same Pitfalls section carried a self-contradicting contract for adapter authors.
    handling_classification: remediated
    remediation: >
      Rescoped line 350 to pre-hooks only with explicit forward-reference to
      the post-hook pitfall. The two paragraphs are now consistent.
    handling_artifact_path: docs/runtime-integration-guide.md

  - id: G0-04
    severity: material
    category: doc
    description: >
      New policy.mode semantics and the generalized allowed-tools branch were
      undocumented in canonical docs. Operators reading the integration guide
      would not know that observe mode now materially changes decisions or
      that docs.uacp/config.uacp have a new authority surface.
    handling_classification: remediated
    remediation: >
      Updated docs/runtime-integration-guide.md Section 10 with mode resolution
      (YAML + env override), read-once-at-load semantics, and an explicit
      "What observe mode does NOT waive" subsection listing all non-waivable
      blocks. The doc matches the code paths.
    handling_artifact_path: docs/runtime-integration-guide.md

  - id: F1
    aliases: [SK-002]
    severity: material
    category: correctness
    description: >
      kernel.py is_uacp_bound() inspected UACP_GUARDIAN_MODE env directly,
      creating a second, drift-prone source of truth for mode in addition to
      policy.mode. The first branch was a strict subset of the second
      (dead code).
    handling_classification: remediated
    remediation: >
      Removed the redundant env-mode branch in is_uacp_bound(). Mode resolution
      now flows exclusively through GuardianPolicy.__init__ → self.policy.mode.
      Decision-preserving simplification verified by mental trace.
    handling_artifact_path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py

  - id: G0-02
    aliases: [SK-005]
    severity: material
    category: authority
    description: >
      _SELF_ATTESTING_TOOLS is a hardcoded frozenset in adapter code that
      determines whether Guardian's filesystem-containment requirement is
      satisfied. The runtime integration guide forbids inline policy decisions
      in adapter code. This list is a hidden source of truth.
    handling_classification: deferred
    remediation: null
    deferred_to: phase_1
    deferred_rationale: >
      The canonical replacement — allowed_tools declarations in skill YAML —
      is itself a Phase 1 deliverable (item 1.3). Resolving in Phase 0 would
      create either temporary infrastructure to be discarded or two competing
      sources of truth during Phase 1. Phase 1's drift-reconciliation step
      must produce a single source-of-truth mapping for these 7 tool names.
    owner: phase_1_drift_reconciliation
    next_phase_obligation: >
      Phase 1 must move _SELF_ATTESTING_TOOLS into config/guardian-policy.yaml
      (e.g. as per-category self_attests_containment: true), AND reconcile
      against per-skill allowed_tools so that one declaration governs each
      tool's policy effect.

  - id: G0-06
    severity: material
    category: scope
    description: >
      Phase 1 plan item 1.3 introduces allowed_tools/forbidden_tools in skill
      YAML. Phase 0 introduced _SELF_ATTESTING_TOOLS in adapter code as a
      separate (undocumented) source of truth for a related concept. Phase 1
      will need to reconcile two adjacent lists.
    handling_classification: deferred
    deferred_to: phase_1
    deferred_rationale: Same as G0-02 — Phase 1 owns the reconciliation by design.
    owner: phase_1_drift_reconciliation
    next_phase_obligation: >
      Phase 1's drift-reconciliation step must explicitly enumerate the
      tool-classification mapping, allowed_tools per skill, and self-attestation
      effect, producing a single doctrine that the kernel reads.

  - id: F2
    aliases: [SK-003]
    severity: material
    category: design
    description: >
      _CONTAINED_SHELL_ATTESTATIONS is an unbounded in-memory dict with no
      pruning. _policy() caches at module level forever; policy file edits
      mid-run are not reloaded. Process-restart loses all attestations silently.
    handling_classification: deferred
    deferred_to: phase_1
    deferred_rationale: >
      Pre-existing behavior not introduced by Phase 0. Resolution does not
      affect any Phase 0 invariant. Phase 1 (state hardening) is the
      appropriate place; alternatively Phase 3 (governance completeness).
    owner: phase_1_or_phase_3
    next_phase_obligation: >
      Add periodic pruning of expired attestations. Document that attestation
      lifetime is bounded by process lifetime. Optionally: stat-based policy
      reload or explicit reload-on-event.

  - id: F3
    severity: minor
    category: correctness
    description: _filesystem_guard_verified may attempt policy load on every call. Fail-closed via False return path is preserved.
    handling_classification: remediated
    remediation: Verified fail-closed behavior; documented in code comment.

  - id: F4
    severity: minor
    category: coverage
    description: Original phase0_verify.py did not exercise the policy-default-block observe downgrade branch.
    handling_classification: remediated
    remediation: Added check `observe_mode_downgrades_policy_default_block` exercising the branch with a synthetic attestation.

  - id: F5
    severity: minor
    category: coverage
    description: uacp_config_write not directly exercised by the verification script.
    handling_classification: remediated
    remediation: Added check `config_write_authorized_via_governed_tool_branch`.

  - id: G0-03
    severity: minor
    category: invariant
    description: Self-attestation soundness — governed writers DO enforce path-bounded containment (verified via code reading of _resolve_uacp_path).
    handling_classification: justified
    justification: Path validators are correct; only the source-of-truth location needs to move (G0-02 deferral).

  - id: G0-05
    severity: minor
    category: scope
    description: >
      The generalized allowed-tools branch (covering docs.uacp/config.uacp)
      was not explicitly in the Phase 0 plan items. Functionally needed but
      technically scope creep.
    handling_classification: justified
    justification: >
      Required to make Phase 0.1 (filesystem_guard_verified wiring) operationally
      complete — without this branch, uacp_doc_write and uacp_config_write are
      blocked by their categories' policy defaults even when correctly wired.
      Recorded here as a propagated_constraint into Phase 1 for explicit doc updates.

  - id: G0-07
    severity: info
    category: doc
    description: Post-hook constraint paragraph accurate, complete, and slightly generalized from plan text in a useful way.
    handling_classification: justified

  - id: G0-08
    severity: info
    category: invariant
    description: Plan's "warn→block escalation" framing was technically inaccurate (Guardian doesn't emit warn verdicts); landed code achieves the intent through policy.mode-aware downgrade.
    handling_classification: justified
    justification: Behavioural acceptance is what matters; the literal escalate_to_block method shape was not the goal.

  - id: F6
    severity: info
    category: design
    description: Observe mode also bypasses Heartgate clearance (block_pending_heartgate → allow_with_audit).
    handling_classification: justified
    justification: Documented in the new "What observe mode does NOT waive" section by elimination — Heartgate is policy-driven, not constitutional.

  - id: F7
    severity: info
    category: doc
    description: Post-hook paragraph stylistic voice slightly inconsistent with surrounding bullets.
    handling_classification: justified

  - id: F8
    severity: info
    category: correctness
    description: audit_artifact field is never threaded back through. Pre-existing minor gap.
    handling_classification: deferred
    deferred_to: phase_1_or_phase_3

  - id: SK-006
    severity: minor
    category: edge_case
    description: _filesystem_guard_verified catches only GuardianPolicyError; future drift in _validate_contained_shell_attestation could bubble.
    handling_classification: justified
    justification: Currently fail-closed; flagged for awareness during future changes.

  - id: SK-007
    severity: minor
    category: edge_case
    description: Empty tool_name in observe mode → allow_with_audit (rather than block).
    handling_classification: deferred
    deferred_to: phase_1
    next_phase_obligation: Treat empty tool_name as a non-waivable block in all modes.

  - id: SK-008
    severity: minor
    category: edge_case
    description: Pre-existing live probe assertion brittleness — expects "block" but policy returns "block_pending_heartgate".
    handling_classification: deferred
    deferred_to: phase_3
    next_phase_obligation: Fix the probe assertion to accept both block and block_pending_heartgate.

  - id: SK-009
    severity: info
    category: edge_case
    description: Mode resolution edge cases verified — invalid mode falls back to enforce; env wins over YAML; missing both defaults to enforce.
    handling_classification: justified

  - id: SK-010
    severity: info
    category: bypass
    description: Mutual exclusivity of state.uacp and new general allowed-tools branch is structural-incidental rather than guard-explicit.
    handling_classification: deferred
    deferred_to: phase_1
    next_phase_obligation: Add explicit `category != state.uacp` guard or restructure to elif for defensive coding.

  - id: SK-011
    severity: info
    category: edge_case
    description: require_approval policy defaults unaffected by observe mode; converted to allow_with_audit unconditionally.
    handling_classification: justified

