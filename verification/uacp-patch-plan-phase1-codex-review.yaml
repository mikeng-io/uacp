# --- First pass findings (consolidated across 3 role-diverse agents) ---

first_pass_findings:
  - id: SK-F1
    severity: material
    category: bypass
    description: >
      `uacp_state_write` could forge gate-ledger records. The ledger lives
      under `state/`, and `uacp_state_write` allows any write under `state/`.
      Heartgate read the ledger blindly — accepting any line with
      `gate: PIV, result: pass, phase: <from_phase>` as proof. The append-only
      semantic was bypassable through the broader state writer.
    handling_classification: remediated
    remediation: >
      `_handle_uacp_state_write` now explicitly refuses any path under
      `state/gate-ledger/` with error `"uacp_state_write may not write under
      state/gate-ledger/; use uacp_gate_ledger_append"`. The append-only
      ledger writer is the only authorized writer to that subtree.
    handling_artifact_path: runtime-adapters/hermes/plugins/uacp_guardian/__init__.py

  - id: SK-F2
    severity: material
    category: bypass
    description: >
      `self_attesting_tools.names` was not validated at policy load. A policy
      edit adding `terminal` or `execute_code` to the list would have allowed
      those tools to short-circuit Guardian's containment check at the
      `_filesystem_guard_verified()` level.
    handling_classification: remediated
    remediation: >
      `GuardianPolicy.validate()` now rejects any `self_attesting_tools`
      entry that is not in `tool_classification` or targets a non-governed
      category. Governed categories explicitly allowlisted:
      state.uacp, docs.uacp, config.uacp, artifact.uacp,
      evidence.containment, exec.shell.contained, lifecycle.transition.
    handling_artifact_path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py

  - id: SK-F3
    severity: material
    category: bypass
    description: >
      `_glob_matches_any` matched symlinks pointing outside UACP_ROOT. A
      symlink under plans/ pointing to an out-of-root file would satisfy a
      phase_exit_invariant without producing a real artifact in UACP_ROOT.
    handling_classification: remediated
    remediation: >
      `_glob_matches_any` now resolves each glob match strictly. Symlinks
      whose target is outside UACP_ROOT are rejected; only real files under
      the root count as matches. Empty-files and directories are also
      rejected as matches.
    handling_artifact_path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py

  - id: SK-F5
    severity: material
    category: edge_case
    description: >
      Heartgate crashed on malformed config: `stages` as a list instead of a
      dict, or `piv_rule.max_attempts` as a non-integer string. Both raised
      uncaught exceptions in Heartgate evaluation rather than fail-closing
      with an explanatory blocker.
    handling_classification: remediated
    remediation: >
      `_phase_layer_check` and `_validate_phase_exit_invariants` check
      `isinstance(stages, Mapping)` before access. `_validate_piv_record`
      wraps `int(max_attempts)` in try/except, appending a blocker on
      failure instead of crashing.
    handling_artifact_path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py

  - id: SK-F6
    severity: material
    category: edge_case
    description: >
      `max_attempts=0` silently bypassed the second-failure block.
      `int(piv_rule.get("max_attempts") or 2)` short-circuits `0 or 2 = 2`,
      so the value was never observed as 0.
    handling_classification: remediated
    remediation: >
      Use `raw_max = piv_rule.get("max_attempts"); raw_max = 2 if raw_max is None else raw_max`,
      preserving 0. Explicit `max_attempts <= 0` blocker added.
      `second_failure_action` allowlist `{block_unconditional, warn}` —
      unknown values produce a blocker instead of silently relaxing.
    handling_artifact_path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py

  - id: T-F1
    severity: material
    category: correctness
    description: >
      `_validate_piv_record` and `_ledger_contains_gate` constructed the
      ledger path from `artifact["run_id"]` without sanitization. A
      transition artifact carrying a path-traversal run_id would have
      probed file existence outside `state/gate-ledger/`.
    handling_classification: remediated
    remediation: >
      Added `_is_safe_run_id()` (regex `^[A-Za-z0-9._-]{1,128}$`). Both
      read paths call it; unsafe values produce explicit blockers.
    handling_artifact_path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py

  - id: SK-F14
    severity: material (reported)
    category: regression (claimed)
    description: >
      First-pass skeptic claimed `skills/devops/uacp/uacp-*/SKILL.md` did
      not exist. Investigation showed the agent searched the wrong tree.
    handling_classification: justified
    justification: >
      False alarm. The 7 SKILL.md mirrors live in
      `HERMES_ROOT/skills/devops/uacp/uacp-*/SKILL.md` (verified by
      `find /home/norty/.hermes/skills/devops/uacp -name SKILL.md`). All 7
      files carry `authority_source: config/phase-transitions.yaml`. The
      mirror is correctly populated.

  - id: GOV-101..GOV-110
    severity: info
    category: authority/invariant
    description: >
      Governance reviewer verified Phase 0 propagated_constraints pc_1..pc_6
      are closed by Phase 1 changes (self_attesting moved to policy,
      Layer A+B model, gate ledger governed, PIV preserves conservative-
      failure, phase_exit_invariants preserves traceability, attestation
      pruning + reload doc, empty tool_name non-waivable, state.uacp
      mutual-exclusivity guard, audit-reason consistency).
    handling_classification: justified

  - id: GOV-111..GOV-114
    severity: minor
    category: doc/scope
    description: >
      Governance reviewer flagged 4 minor items to propagate to Phase 2:
      docs/index.md inventory should register state/gate-ledger/; scope
      artifact write_paths must cross-check Layer B admissibility; lessons
      artifact should cite ledger byte_offsets; runtime-enforcement doc
      should enumerate Heartgate's check list.
    handling_classification: deferred
    deferred_to: phase_2

  - id: T-F2_through_T-F7
    severity: minor/info
    category: correctness/coverage/doc
    description: >
      Minor improvements: silent JSON parse skips in PIV reader; byte_offset
      semantics (CPython-specific); missing run_id message wording; PIPE_BUF
      atomicity for records >4KB; control characters in run_id beyond regex.
    handling_classification: deferred
    deferred_to: phase_2_or_phase_3

  - id: SK-F4_F7_F8_F9_F10_F11_F12_F13_F15
    severity: minor/info
    category: bypass/race/coverage/doc
    description: >
      Empty-placeholder file matching artifact_glob; dead-code newline check;
      byte_offset race under concurrent appends; pruning race; coverage
      gaps (phase parametrization, observe-mode invariant test); doc
      rewording; Heartgate-vs-adapter independent yaml load.
    handling_classification: deferred
    deferred_to: phase_2_or_phase_3

# --- Remediation summary ---

