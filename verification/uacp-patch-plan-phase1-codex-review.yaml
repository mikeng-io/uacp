    closes: [SK-F3]
  - description: _is_safe_run_id; sanitize run_id in Heartgate read paths
    path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py
    closes: [T-F1]
  - description: Shape-validate stages/piv_rule; tolerate malformed values
    path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py
    closes: [SK-F5]
  - description: max_attempts=0 distinct from missing; second_failure_action allowlist
    path: runtime-adapters/hermes/plugins/uacp_guardian/kernel.py
    closes: [SK-F6]
  - description: Phase 1 verification extended with 7 remediation regression tests R1-R7
    path: scripts/phase1_verify.py

# --- Second pass findings ---

second_pass_findings:
  - id: CRR-1
    severity: low
    category: test_quality
    description: >
      R1 test invocation omits `reason` field, so uacp_state_write returns
      "reason is required" before reaching the gate-ledger refusal branch.
      Test still passes (any error satisfies the assertion). Code remediation
      is correct; the test does not exercise the intended branch directly.
    handling_classification: deferred
    deferred_to: phase_2
    next_phase_obligation: pc_p1_t1

  - id: CRR-2
    severity: info
    category: hardening
    description: >
      _is_safe_run_id regex permits literal "." and "..", but the constructed
      path `state/gate-ledger/{run_id}.jsonl` neutralizes them as filename
      segments. No exploit; defense-in-depth reject would harden future
      code paths that might omit the .jsonl suffix.
    handling_classification: deferred
    deferred_to: phase_2
    next_phase_obligation: pc_p1_t2

