schema_version: '0.1'
kind: uacp.council_synthesis
council_id: uacp-phase4-filesystem-containment-propose-plan-council-20260513
run_id: uacp-phase4-filesystem-containment-20260513-215531
mode: propose
tier: tier_2_role_diverse
phase: propose
phase_local_granularity:
  phase: propose
  entry_estimate: 8
  exit_actual: 8
  downstream_projection:
    plan: 8
    execute: 8
    verify: 8
    resolve: 5
roles:
  - Security/Guardian reviewer
  - Runtime/Filesystem isolation reviewer
  - Lifecycle/Verification reviewer
dispatch_surfaces:
  - delegate_task configured delegation runtime
findings:
  - id: concrete_containment_mechanism_required
    severity: high
    status: concern
    summary: PLAN must name the concrete sandbox/containment mechanism and exact evidence checks before EXECUTE.
    required_plan_action: Define mechanism, workspace isolation, symlink/mount escape prevention, and separate terminal/execute_code handling.
  - id: sandbox_check_should_be_required
    severity: high
    status: concern
    summary: A trusted boolean filesystem_guard_verified is insufficient without a standardized evidence-producing check.
    required_plan_action: Make uacp_sandbox_check or equivalent evidence mechanism required for any allow decision.
  - id: execute_code_backend_mapping_required
    severity: high
    status: concern
    summary: execute_code may share the host filesystem differently from terminal and must remain blocked if backend containment cannot be proven.
    required_plan_action: Add backend-specific mapping and positive/negative probes for execute_code.
  - id: symlink_mount_escape_and_write_probe_required
    severity: high
    status: concern
    summary: Path.resolve checks are necessary but not sufficient for containment proof.
    required_plan_action: Add symlink-aware path checks, mount inspection where applicable, and actual write-probe failure from the execution context.
  - id: non_standard_dispatch_paths_scope
    severity: high
    status: concern
    summary: Plugin dispatch, slash commands, and hook-error fail-open paths must not be implicitly enabled by this phase.
    required_plan_action: Scope Phase 4 allow path to standard guarded tool-call paths or explicitly keep other paths blocked/out of scope.
  - id: rollback_and_cache_invalidation_required
    severity: medium
    status: concern
    summary: PLAN must define rollback to fail-closed and evidence expiry/invalidation.
    required_plan_action: Define TTL or revalidation triggers, rollback trigger, and audit artifact requirements.
  - id: traceability_and_gate_selection
    severity: medium
    status: pass_with_note
    summary: Triage/proposal/gate-selection are traceable and consistent; PLAN needs a fresh PLAN-phase gate-selection artifact.
    required_plan_action: Generate PLAN-phase gate selection before PLAN->EXECUTE transition.
verdict: concerns
human_escalation:
  required: false
  reason: Concerns are plan-level constraints; no new destructive or external authority is required yet.
  authority_needed: none before drafting PLAN
artifact_paths:
  - state/runs/uacp-phase4-filesystem-containment-20260513-215531-triage.yaml
  - proposals/uacp-phase4-filesystem-containment-20260513.yaml
  - proposals/uacp-phase4-filesystem-containment-20260513-gate-selection.yaml
recommended_next_step: >
  Proceed from PROPOSE to PLAN with council constraints embedded. Do not enter EXECUTE until PLAN includes the required containment mechanism, evidence tool/schema, terminal and execute_code proofs, rollback, and Heartgate-checked transition.
