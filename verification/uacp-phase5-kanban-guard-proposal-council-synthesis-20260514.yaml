schema_version: '0.1'
kind: uacp.council_synthesis
synthesis_id: uacp-phase5-kanban-guard-proposal-council-synthesis-20260514
run_id: uacp-phase5-kanban-guard-20260514-130416
phase: propose
status: completed_with_mixed_validity
summary: >-
  A focused 3-role proposal council was dispatched for Phase 5. The Guardian/security
  review produced actionable, path-consistent findings. The Kanban lifecycle and
  runtime integration reviews reported path/environment confusion and are treated
  as low-confidence except where they identify generic risks that match the proposal.
roles:
  - role: Kanban lifecycle reviewer
    result_status: blocked_low_confidence
    validity: low
    reason: Reviewer reported UACP_ROOT missing despite main-session verification that artifacts exist. Treat as environment/tooling failure, not a proposal blocker.
    usable_findings:
      - Re-run or replace lifecycle review during PLAN if exact Kanban surfaces are needed.
  - role: Guardian/security reviewer
    result_status: conditionally_accept
    validity: high
    reason: Reviewer read the expected proposal/gate/triage files and inspected relevant Kanban/Guardian surfaces.
    blockers_or_conditions:
      - Completion-time metadata enforcement is missing today; existing guards cover creation/dispatch but not completion.
      - complete_task metadata is free-form and requires an explicit UACP completion schema.
    concerns:
      - Board-level UACP fallback may block legacy tasks or allow bypass if completion is called directly.
      - Evidence references, authority artifact, and declared side effects need a storage/validation contract.
      - Negative tests for missing completion evidence and non-UACP regression are currently absent.
    recommendations:
      - Add completion guard for UACP-bound tasks before transition to done.
      - Define _UACP_COMPLETION_REQUIRED or equivalent explicit schema.
      - Add tests for missing evidence, missing run/phase/authority/policy fields, and non-UACP regression.
  - role: Runtime integration reviewer
    result_status: conditionally_approve_with_reservations_low_confidence
    validity: partial
    reason: Reviewer appeared to use an old patch file rather than current proposal artifacts, but some runtime concerns overlap with Phase 5 risk model.
    usable_findings:
      - Plan should identify migration/legacy-task behavior explicitly.
      - Plan should avoid surprising ordinary Kanban task completion regressions.
      - Plan should document spawn/env propagation requirements if worker context is involved.
overall_verdict: proceed_to_plan_with_conditions
conditions_for_plan:
  - PLAN must include completion-time enforcement as the central implementation target.
  - PLAN must define canonical UACP completion metadata/evidence schema.
  - PLAN must preserve ordinary non-UACP Kanban completion behavior with regression tests.
  - PLAN must identify legacy UACP-bound board behavior and migration/compatibility stance.
  - PLAN must include positive and negative probes before EXECUTE closure.
blockers_for_execute:
  - Do not execute code changes until PLAN specifies exact files, tests, rollback, and completion schema.
  - Do not claim council approval as clean/pass; accepted concerns must be represented as warnings/deferred constraints in transition artifacts.
follow_up:
  - The low-confidence reviewer failures should inform PLAN verification routing: use direct main-session inspection or narrower delegates with explicit file contents if needed.
