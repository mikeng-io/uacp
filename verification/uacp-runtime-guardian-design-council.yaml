schema_version: "0.1"
kind: uacp.verification.council_checkpoint
checkpoint: runtime_guardian_design
status: pass_after_patch
scope:
  objective: "Define production-ready runtime Guardian and Heartgate enforcement requirements before implementation."
  artifacts:
    - "docs/runtime-enforcement.md"
    - "config/guardian-policy.yaml"
    - "plans/uacp-runtime-guardian-implementation-plan.md"
    - "docs/index.md"
base_references:
  uacp_base_commit: "63e7f32"
  hermes_runtime_reference_commit: "242da9db9"
council:
  initial_review:
    verdict: block
    reviewers:
      - role: authority_boundary
        result: block
        findings:
          - "Rollback could disable Guardian without full breakglass authority."
          - "Config made UACP context optional where prose required it for protected actions."
          - "delegate_task mapped to undefined runtime.subagent category."
      - role: runtime_hooks
        result: block
        findings:
          - "delegate_task/runtime.subagent policy category was undefined."
          - "Hook and plugin dispatch gaps were accurately captured."
      - role: kanban_delegation
        result: block
        findings:
          - "Delegation context propagation was not enforceable."
          - "UACP-bound Kanban metadata lacked a concrete storage/creation path."
          - "VERIFY missing-verdict schema was underspecified."
      - role: mutation_surface
        result: block
        findings:
          - "Home Assistant and browser tool classifications missed exact Hermes tool names."
          - "Dynamic MCP/plugin tools needed wildcard or provenance-based classification."
  second_review:
    verdict: block
    reviewers:
      - role: deployment_audit
        result: warn
        findings:
          - "Commit/provenance plan was under-specified."
          - "Rollback breakglass scope and symbolic root usage passed."
      - role: adversarial_bypass
        result: block
        findings:
          - "Shell state-write bypass required filesystem-level containment, not command-string matching."
          - "Plugin/internal dispatch had to be an activation blocker."
          - "UACP-bound Kanban detection needed an authoritative detector."
          - "Plugin tool names required provenance, not only name patterns."
  final_synthesis:
    verdict: pass
    findings:
      - "Prior blocker themes are now represented as explicit requirements and activation blockers."
resolved_blockers:
  - id: breakglass_rollback
    resolution: "Rollback is now explicitly a breakglass action with authority, reason, scope, expiry, audit, and follow-up verification."
  - id: conditional_uacp_context
    resolution: "Guardian event schema now has conditionally required fields for UACP-bound/protected actions."
  - id: runtime_subagent
    resolution: "runtime.subagent is now a protected category and delegate_task is explicitly classified."
  - id: exact_tool_classification
    resolution: "Home Assistant and browser Hermes tool names are explicitly classified."
  - id: dynamic_tool_provenance
    resolution: "Policy now requires tool_provider/provenance; plugin/MCP/unknown tools default to protected runtime.extension."
  - id: kanban_bound_detector
    resolution: "Policy and plan define UACP-bound task detection through explicit context, UACP board/root/descendant state, lifecycle tool creation, or guarded marker."
  - id: kanban_context_storage
    resolution: "Plan requires task_uacp_context storage, with task_events fallback only during migration."
  - id: shell_containment
    resolution: "Shell/code enforcement now requires filesystem-level protected path containment or fail-closed blocking."
  - id: plugin_dispatch_activation
    resolution: "Enforce activation now requires guarded plugin/internal dispatch and fail-closed hook behavior."
  - id: audit_provenance
    resolution: "Audit and verification schemas now include policy, UACP commit, runtime commit, audit artifact, and rollback provenance fields."
activation_preconditions:
  - "Guardian hook errors fail closed for protected actions."
  - "PluginContext.dispatch_tool and plugin/internal dispatch use guarded dispatch."
  - "Tool provenance is present for core, plugin, MCP, inline-agent-loop, and control-plane actions."
  - "Protected filesystem containment is active for shell/code execution or enforce mode blocks those categories."
  - "Kanban UACP-bound detector works across CLI, dashboard, API, dispatcher, and worker paths."
  - "Negative proof tests pass and are recorded in UACP verification artifacts."
verification:
  yaml_parse:
    status: pass
    command: "python3 - <<'PY' ... yaml.safe_load(config/*.yaml) ... PY"
  category_reference_check:
    status: pass
    command: "python3 - <<'PY' ... verify guardian classifications target defined categories ... PY"
  diff_check:
    status: pass
    command: "git diff --check"
decision:
  result: pass_for_design_checkpoint
  implementation_status: not_started
  next_step: "Implement runtime Guardian core, Heartgate core, Hermes adapter, state mutation tool, hook hardening, Kanban guard, and live proof tests."
